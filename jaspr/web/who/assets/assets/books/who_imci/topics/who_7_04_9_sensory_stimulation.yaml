topic:
  id: "who-imci-7-4-9-sensory-stimulation"
  title: "Step 9 · Sensory Stimulation"
  list_subtitle: "7.4.9 · play · loving care · maternal involvement"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["sensory stimulation", "SAM", "play therapy", "development", "pediatric"]
  aliases:
    - "SAM Stimulation"
  category: "medical"

  page_number: 215

  blocks:

    - type: "prose"
      title: "Provide"
      highlight: true
      markdown: |
        - **tender loving care**
        - a **cheerful, stimulating environment**
        - **structured play therapy for 15–30 min/day**
        - **physical activity** as soon as the child is well enough
        - **support for as much maternal involvement as possible** (comforting,
          feeding, bathing, playing).

        Provide suitable **toys and play activities** for the child.

    - type: "prose"
      title: "Why it matters — and why it is often skipped"
      markdown: |
        Psychosocial stimulation is **not optional**: meta-analysis shows it
        **reduces mortality** (RR ≈ **0.36**) and improves **neurodevelopment**.
        The **2023 WHO guideline** frames it as the sensory input a child receives
        from **interactions with people and a varied environment**, and includes
        **responsive feeding** as part of responsive caregiving. Despite this, it
        is **rarely implemented** in practice (few trained staff, competing
        priorities) — make it a **deliberate, rostered part of care**.
