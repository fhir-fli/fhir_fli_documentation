# ============================================================
# WHO IMCI §1.4 — Emergency treatment for a child with severe malnutrition
# Pocket Book of Hospital Care for Children (2nd ed, 2013), pp.19–20
# OpenEvidence review applied 2026-06-20 — MAJOR update (GASTROSAM):
#   - The 2013 blanket "no IV fluids in SAM dehydration → risk of fatal
#     heart failure" was NEVER evidence-based and is now refuted. GASTROSAM
#     (Maitland, NEJM 2025, n=272): 100 ml/kg IV over 3–8 h gave ZERO
#     pulmonary oedema / heart failure / fluid overload; mortality no
#     different (trend favouring IV). Removed the "IV causes heart failure"
#     claim; the chart now presents WHO 2013 default (oral/NG) WITH the
#     evidence note that IV appears safe & guideline revision is pending.
#   - ORS: WHO-ORS equivalent to ReSoMal (GASTROSAM, Lancet Child Adolesc
#     Health 2026, n=415); ReSoMal → MORE severe hyponatraemia (seizures at
#     Na 108). WHO 2023 already allows WHO-ORS when ReSoMal unavailable.
#     Red danger emphasis MOVED from "no IV" → ReSoMal hyponatraemia.
#   - Dehydration dx unreliable in SAM strengthened: high false-positive
#     rate for severe dehydration; 93% of GASTROSAM oral group needed NG,
#     9% progressed to shock.
#   - Shock threshold clarified: multiple concurrent signs, not tachycardia
#     alone. Added severe hyponatraemia to the screen-&-treat list.
# 🛑 Formal WHO guideline revision still PENDING — wording reflects that.
# OpenEvidence-reviewed 2026-07:
#   - Removed the unverifiable "2026 meta-analysis (Dewez ADC; 3 RCTs
#     n=484, RR 0.71)" specifics (reviewer could not confirm the citation);
#     the claim now rests on the solid GASTROSAM NEJM 2025 trial (n=272,
#     zero overload) alone.
#   - Softened the "~76% false-positive rate" (unverifiable exact DHAKA
#     figure) to "a high false-positive rate."
#   - GASTROSAM 93%-NG / 9%-shock and the ReSoMal hyponatraemia warning
#     re-confirmed against source; unchanged.
# ============================================================

topic:
  id: "who-imci-1-4-sam-emergency"
  title: "SAM — Emergency Treatment"
  list_subtitle: "1.4 · oral/NG rehydration · GASTROSAM update · cautious shock fluids"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · GASTROSAM (NEJM 2025 / Lancet CAH 2026)"
  tags: ["severe malnutrition", "sam", "resomal", "who-ors", "dehydration", "shock", "gastrosam", "hyponatraemia", "imci", "pediatric"]
  aliases:
    - "Severe Malnutrition"
    - "Malnutrition"
    - "ReSoMal"
  category: "medical"

  page_number: 19

  blocks:

    - type: "prose"
      title: "Every SAM child is a priority"
      highlight: true
      markdown: |
        - **All** children with severe malnutrition are flagged at triage
          as **priority** — prompt assessment and treatment.
        - A **few** will have **emergency signs**. Treat
          **airway / breathing** or **coma / convulsions** per the
          emergency charts ([Chart 4](topic:who-imci-chart4-airway),
          [Chart 9](topic:who-imci-chart9-diazepam); pp.5–17).

    - type: "prose"
      title: "Severe dehydration without shock"
      highlight: true
      markdown: |
        WHO 2013 restricts IV fluids in SAM to **frank shock** and
        rehydrates everyone else by mouth:
        - **Rehydrate orally or by NG tube** with **ReSoMal or standard
          low-osmolarity WHO-ORS** — see Chapter 7 (p.204).
        - **Dehydration is hard to diagnose in SAM** — signs (sunken eyes,
          slow skin pinch) overlap with malnutrition itself. The IMCI
          algorithm has a **high false-positive rate** for severe
          dehydration here, so **do not over-diagnose**.

    - type: "prose"
      title: "Evidence update — IV fluids appear safe in SAM"
      highlight: true
      # Per-block palette: blue marks this as newer evidence than the 2013
      # WHO text above (guideline revision still pending).
      palette:
        accent: "0xFF1565C0"
      markdown: |
        The old fear that IV fluids cause **fatal heart failure** in SAM
        was **never evidence-based** and is now refuted:
        - **GASTROSAM** (NEJM 2025) gave **100 ml/kg IV over 3–8 h** with
          **zero** pulmonary oedema, heart failure or overload; mortality
          no different (trend favouring IV).
        - Oral rehydration often **fails** — 93% of the GASTROSAM oral
          group needed an NG tube and **9% progressed to shock**.

        Until WHO updates its guideline, **oral/NG is still the default**,
        but **IV rehydration appears safe** when oral fails.

    - type: "prose"
      title: "⚠ ReSoMal — watch for hyponatraemia"
      callout: true
      # Genuine remaining danger → red.
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        **ReSoMal carries a higher risk of severe hyponatraemia** (RCT
        seizures at Na 108). **Standard low-osmolarity WHO-ORS is an
        equivalent, safer alternative** (GASTROSAM, Lancet CAH 2026; WHO
        already allows it when ReSoMal is unavailable). **Check sodium.**

    - type: "prose"
      title: "Shock in SAM"
      markdown: |
        - Individual **signs of shock can appear even when there is no
          shock**.
        - **Shock = lethargy or reduced consciousness PLUS cold
          peripheries, capillary refill > 3 s, AND a fast weak pulse.** A
          **single sign** (e.g. tachycardia alone) is **not** shock.
        - For true shock, give SAM-specific shock fluids
          ([Chart 8](topic:who-imci-chart8-iv-fluids-sam)).

    - type: "prose"
      title: "Why SAM shock treatment differs"
      markdown: |
        - Shock from **dehydration and sepsis often coexist** and are hard
          to tell apart on clinical grounds.
        - Older teaching held that SAM children **tolerate fluids poorly**;
          recent RCTs show **normal cardiac function and fluid
          responsiveness**. Still **guide the amount by the child's
          response** and watch for overload.
        - **Monitor pulse and breathing at the start and every 5–10 min.**
        - The **type of IV fluid differs** for SAM and the **rate is
          slower** (see [Chart 8](topic:who-imci-chart8-iv-fluids-sam)).

    - type: "prose"
      title: "Also screen & treat in every SAM child"
      markdown: |
        Promptly assess and treat — and **prevent** where not yet present:
        - **Hypoglycaemia** ([Chart 10](topic:who-imci-chart10-glucose))
        - **Hypothermia**
        - **Severe infection**
        - **Severe anaemia**
        - **Severe hyponatraemia** (especially if ReSoMal is used)
        - **Potentially blinding eye problems**
