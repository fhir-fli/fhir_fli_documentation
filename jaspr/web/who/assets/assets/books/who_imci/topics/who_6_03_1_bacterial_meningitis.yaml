# ============================================================
# WHO IMCI §6.3.1 — Bacterial meningitis. Pocket Book 2nd ed (2013),
# pp.167–170 (supportive care pp.172–174).
# ✅ OpenEvidence-reviewed 2026-07: ceftriaxone positioned as preferred (add
# vancomycin where pneumococcal ceftriaxone-resistance > 1%); chloramphenicol +
# ampicillin downgraded to last-resort; 5–7-day option for uncomplicated cases;
# dexamethasone refined (high-income benefit, no proven LMIC benefit, Listeria
# contraindication); CSF multiplex PCR noted.
