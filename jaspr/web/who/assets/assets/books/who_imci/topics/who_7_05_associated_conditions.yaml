      title: "Conditions that commonly accompany SAM"
      highlight: true
      markdown: |
        Alongside the [10 general-management steps](topic:who-imci-7-4-general-management),
        look for and treat these associated conditions:
        - [Eye problems (vitamin A deficiency)](topic:who-imci-7-5-1-eye-problems)
        - [Severe anaemia](topic:who-imci-7-5-2-severe-anaemia)
        - [Skin lesions in kwashiorkor](topic:who-imci-7-5-3-skin-kwashiorkor)
        - [Continuing diarrhoea](topic:who-imci-7-5-4-continuing-diarrhoea)
        - [Tuberculosis](topic:who-imci-7-5-5-tuberculosis)

        **Screen for TB systematically** in **every** child hospitalised with SAM
        (high prevalence, unreliable skin testing) — not only those with obvious
        clinical suspicion.
