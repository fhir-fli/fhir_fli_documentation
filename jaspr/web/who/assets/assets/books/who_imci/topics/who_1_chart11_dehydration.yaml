# ============================================================
# WHO IMCI Chart 11 — Treat severe dehydration in an emergency
# (after initial management of shock)
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.17
# OpenEvidence review applied 2026-06-24:
#   - ⚠ REVIEWER'S "70→100 ml/kg" CHANGE REJECTED (verified against source):
#     the reviewer conflated Chart 11 with Plan C / Chart 13. Chart 11 (p.17)
#     is the POST-shock continuation = 70 ml/kg (the rapid 30 ml/kg phase was
#     already given during shock resus, Charts 7/8). Plan C / Chart 13
#     (p.131) is the full 100 ml/kg = 30 fast + 70. 70 ml/kg here is CORRECT;
#     changing it would over-resuscitate. Added a clarifying note instead.
#   - Added prominent SAM carve-out (red callout): do NOT use this chart for
#     SAM → Chart 8 if shock, else oral WHO-ORS (NOT ReSoMal — higher
#     hyponatraemia risk; GASTROSAM, Lancet CAH 2026).
#   - "run drip more rapidly" replaced with structured reassessment + fluid-
#     overload monitoring (IDSA 2017).
#   - Added slow-rehydration evidence note (GASTRO phase II: 100 ml/kg over
#     8 h ≈ Plan C) and dehydration-assessment-imprecision caveat.
#   - Ringer's lactate preference confirmed (Cochrane 2023). ORS 5 ml/kg/h ok.
# OpenEvidence-reviewed 2026-07: reviewer flagged the final sentence as
#   "cut off" — this was a paste-truncation artifact; the source file already
#   completes it ("...maintain hydration with ORS by mouth"). 70 ml/kg
#   post-shock volume, SAM carve-out, RL preference all re-confirmed. No
#   content change.
# ============================================================

topic:
  id: "who-imci-chart11-dehydration"
  title: "Severe Dehydration (Emergency)"
  list_subtitle: "IMCI Chart 11 · 70 ml/kg RL · then ORS"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO Plan C/Chart 13 / GASTRO / GASTROSAM"
  tags: ["dehydration", "diarrhoea", "ringers lactate", "ors", "rehydration", "plan c", "imci", "pediatric"]
  aliases:
    - "Diarrhoea"
    - "Rehydration"
  category: "medical"

  page_number: 17

  blocks:

    - type: "prose"
      title: "When to use this chart"
      highlight: true
      markdown: |
        - **Severe dehydration but NO shock** → use diarrhoea
          **treatment Plan C** (p.131), not this chart.
        - **If the child is in shock**, first follow
          [Chart 7](topic:who-imci-chart7-iv-fluids-shock) /
          [Chart 8](topic:who-imci-chart8-iv-fluids-sam) (SAM). Switch
          to this chart once the **pulse slows** or **capillary refill
          speeds up**.

    - type: "prose"
      title: "⚠ Severely malnourished children — do NOT use this chart"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        SAM children need a different approach
        ([§1.4](topic:who-imci-1-4-sam-emergency)):
        - **In shock:** [Chart 8](topic:who-imci-chart8-iv-fluids-sam)
          (15 ml/kg over 1 h).
        - **Dehydrated, not in shock:** **oral WHO-ORS** — **not ReSoMal**
          (higher risk of severe hyponatraemia; GASTROSAM 2026).

    - type: "prose"
      title: "IV rehydration"
      markdown: |
        Give **70 ml/kg of Ringer's lactate (Hartmann's)** — or **normal
        saline** if unavailable:
        - **over 5 h** in infants **(< 12 months)**, or
        - **over 2.5 h** in children **(12 months – 5 years)**.

        **Note:** this 70 ml/kg is the **post-shock deficit phase** — the
        rapid 30 ml/kg was already given during shock resuscitation. The
        **full Plan C** (severe dehydration **without** shock, p.131) is
        **100 ml/kg = 30 ml/kg fast + 70 ml/kg**.

    - type: "table"
      title: "IV fluid — 70 ml/kg total (rate per hour)"
      columns: ["Weight", "< 12 mo · over 5 h", "12 mo–5 yr · over 2.5 h"]
      column_flex: [2, 3, 3]
      rows:
        - cells: ["< 4 kg", "200 ml (40 ml/h)", "—"]
        - cells: ["4–6 kg", "350 ml (70 ml/h)", "—"]
        - cells: ["6–10 kg", "550 ml (110 ml/h)", "550 ml (220 ml/h)"]
        - cells: ["10–14 kg", "850 ml (170 ml/h)", "850 ml (340 ml/h)"]
        - cells: ["14–19 kg", "—", "1200 ml (480 ml/h)"]

    - type: "prose"
      title: "Reassess"
      markdown: |
        - Reassess **every 1–2 h**.
        - **If not improving, reassess before just speeding the drip:** Is
          the **diagnosis** correct? Are **ongoing losses** being replaced?
          Is there an **underlying cause** (sepsis, ileus)?
        - If truly dehydrated and not improving, increase the rate
          **modestly** — and **watch for fluid overload** (respiratory
          distress, hepatomegaly, periorbital oedema).

    - type: "prose"
      title: "Add ORS as soon as the child can drink"
      markdown: |
        Give **oral rehydration salt (ORS) ~5 ml/kg per hour** as soon as
        the child can drink — usually after **3–4 h** (infants) or
        **1–2 h** (children).

    - type: "table"
      title: "ORS — volume per hour"
      columns: ["Weight", "ORS per hour"]
      column_flex: [3, 2]
      rows:
        - cells: ["< 4 kg", "15 ml"]
        - cells: ["4–6 kg", "25 ml"]
        - cells: ["6–10 kg", "40 ml"]
        - cells: ["10–14 kg", "60 ml"]
        - cells: ["14–19 kg", "85 ml"]

    - type: "prose"
      title: "Then reclassify & continue"
      markdown: |
        - Reassess after **6 h** (infants) or **3 h** (children).
          **Classify dehydration** and choose **Plan A / B / C**
          (pp.138 / 135 / 131) to continue.
        - If possible, **observe ≥ 6 h** after rehydration to confirm the
          mother can maintain hydration with ORS by mouth.

    - type: "prose"
      title: "Evidence notes"
      highlight: true
      palette:
        accent: "0xFF1565C0"
      markdown: |
        - **Slow rehydration is a valid alternative** for the full Plan C
          pathway: **100 ml/kg over 8 h, no boluses** matched standard Plan C
          for safety and efficacy (GASTRO phase II) and is simpler where
          staff oversight is limited.
        - **Clinical dehydration assessment is imprecise** — the WHO scale
          has limited accuracy (only ~29% of "severely dehydrated" children
          had ≥ 10% weight loss). **Reassess by clinical response**, not the
          initial classification alone.
