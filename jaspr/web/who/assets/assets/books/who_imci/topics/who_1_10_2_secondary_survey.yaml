# ============================================================
# WHO IMCI §1.10.2 — Secondary survey. Pocket Book 2nd ed (2013), pp.39–40.
# OpenEvidence review applied 2026-06-24:
#   - Fluid bolus 20 → 10 ml/kg balanced crystalloid; minimise crystalloid;
#     early balanced blood products (1:1, or LTOWB) for haemorrhagic shock
#     (ERC 2021; Pediatric Traumatic Hemorrhagic Shock consensus 2023).
#   - Added TXA 15–20 mg/kg IV (max 1 g) within 3 h (EAST 2025 meta).
#   - Added permissive hypotension (except TBI).
#   - Morphine analgesia unchanged.
# OpenEvidence-reviewed 2026-07:
#   - TXA: added the maintenance infusion 2 mg/kg/h for ≥ 8 h after the
#     loading dose (ERC 2021; only the loading dose was previously shown).
#   - Permissive hypotension: noted that specific paediatric BP targets are
#     NOT established (adult SBP 80–90 does not apply) — goal is minimum
#     haemodynamic stability.
#   - 10 ml/kg crystalloid + early balanced blood products and morphine
#     dosing re-confirmed accurate — unchanged.
# ============================================================

topic:
  id: "who-imci-1-10-2-secondary-survey"
  title: "Trauma — Secondary Survey"
  list_subtitle: "1.10.2 · head-to-toe, investigations, treatment"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + ERC 2021 / PTHSCC 2023"
  tags: ["trauma", "secondary survey", "head-to-toe", "analgesia", "transfusion", "imci", "pediatric"]
  aliases:
    - "Secondary Survey"
  category: "medical"

  page_number: 39

  blocks:

    - type: "prose"
      title: "When"
      highlight: true
      markdown: |
        Do the secondary survey **only when airway, breathing, circulation
        and consciousness are stable**.

    - type: "prose"
      title: "Head-to-toe examination"
      markdown: |
        - **Head:** scalp and ocular abnormalities, external ears,
          periorbital soft-tissue injuries
        - **Neck:** penetrating wounds, subcutaneous emphysema, tracheal
          deviation, neck-vein appearance
        - **Neurological:** level of consciousness (**AVPU**), spinal-cord
          motor activity, sensation, reflexes
        - **Chest:** clavicles and all ribs, breath sounds, heart sounds
        - **Abdomen:** penetrating wound (needs surgical exploration), blunt
          trauma, rectal exam when needed
        - **Pelvis & limbs:** fractures, peripheral pulses, cuts, bruises

    - type: "prose"
      title: "Investigations"
      markdown: |
        - **X-rays** as indicated: chest, lateral neck, pelvis, cervical
          spine (all seven vertebrae), long bones, skull.
        - **Ultrasound** of the abdomen for internal haemorrhage or organ
          injury.

    - type: "prose"
      title: "Treatment"
      highlight: true
      markdown: |
        - **Shock:** give **10 ml/kg balanced crystalloid** (not 20 ml/kg)
          and reassess; **minimise total crystalloid**
          ([Chart 7](topic:who-imci-chart7-iv-fluids-shock)).
        - **Haemorrhagic shock:** move early to **balanced blood products**
          (1:1 plasma : pRBC, or **low-titre group O whole blood**) —
          **20 ml/kg whole blood** or **10 ml/kg packed cells**.
        - **Tranexamic acid 15–20 mg/kg IV (max 1 g) within 3 h** of injury,
          **then 2 mg/kg/h infusion for ≥ 8 h**.
        - **No head injury:** **morphine 0.05–0.1 mg/kg IV** for pain, then
          **0.01–0.02 mg/kg** increments every 10 min to effect.
        - **Manage hypoglycaemia**
          ([Chart 10](topic:who-imci-chart10-glucose)).

    - type: "prose"
      title: "Permissive hypotension"
      markdown: |
        In **uncontrolled haemorrhage without head injury**, target
        **minimum haemodynamic stability** (permissive hypotension) rather
        than normal blood pressure. **Specific paediatric BP targets are not
        established** (the adult SBP 80–90 mmHg goal does not apply to
        children) — aim for minimum stability, not a number. In **TBI with
        haemorrhage, maintain normal blood pressure**.
