      title: "Common causes of envenoming"
      highlight: true
      markdown: |
        Bites and stings from venomous animals are common in some regions.
        Management is complex — know the **common local animals**, recognise
        **clinically relevant envenoming early**, and use both **symptomatic
        and specific** (antivenom) treatment.

