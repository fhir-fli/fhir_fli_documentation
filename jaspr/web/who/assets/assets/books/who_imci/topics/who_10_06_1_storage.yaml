  title: "Storage of Blood"
  list_subtitle: "10.6.1 · screened · not expired · < 2 h out of fridge"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["supportive care", "blood transfusion", "storage", "pediatric"]
  aliases:
    - "Storage of blood"
  category: "medical"

  page_number: 308

  blocks:

    - type: "prose"
      title: "Use safe, in-date blood"
      highlight: true
      markdown: |
        - Use blood that has been **screened and found negative** for
          transfusion-transmissible infections.
        - **Do not** use blood that has **passed its expiry date** or has been **out
          of the refrigerator for more than 2 h**.
        - **Large-volume, rapid transfusion (> 15 ml/kg per h)** of blood stored at
          **4 °C** may cause **hypothermia**, especially in small infants — **use a
          blood warmer where available** for large-volume or rapid transfusion,
          particularly in **neonates and small infants**.
