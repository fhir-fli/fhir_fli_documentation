topic:
  id: "who-imci-5-2-1-severe-dehydration"
  title: "Severe Dehydration (Plan C)"
  list_subtitle: "5.2.1 · rapid IV rehydration · Table 13"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["severe dehydration", "plan C", "IV fluids", "Ringer's lactate", "cholera", "azithromycin", "malnutrition", "ORS", "zinc", "pediatric"]
  aliases:
    - "Diarrhoea Plan C"
    - "Severe Dehydration"
  category: "medical"

  page_number: 129

  blocks:

    - type: "prose"
      title: "Diagnosis"
      highlight: true
      markdown: |
        Diagnose **severe dehydration** if **two or more** signs are present
        (Table 12): **lethargy/unconsciousness**, sunken eyes, unable to drink or
        drinks poorly, and a **skin pinch that goes back very slowly (≥ 2 s)**.
        These children need **rapid IV rehydration** with close monitoring,
        followed by oral rehydration and **zinc** once they improve.

    - type: "prose"
      title: "🛑 Severe acute malnutrition — do NOT use Plan C"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        **In a severely malnourished child, do NOT give the rapid Plan C
        schedule.** Their heart cannot handle a rapid fluid load — aggressive IV
        rehydration can precipitate **fatal heart failure**. Use the **slower,
        smaller-volume** regimen for SAM (**ReSoMal** orally/NG where possible;
        cautious IV only for shock, ~**10 ml/kg** boluses with frequent
        reassessment) — see **Chapter 7** ([Chart 8](topic:who-imci-chart8-iv-fluids-sam)).

    - type: "prose"
      title: "Treatment — start IV immediately (Plan C)"
      markdown: |
        - **Start IV fluids immediately.** While the drip is set up, give **ORS
          by mouth** if the child can drink.
        - Give **100 ml/kg** of the chosen solution, divided as in Table 13.
        - If IV is not possible, rehydrate by **nasogastric tube or mouth** with
          ORS **20 ml/kg/h for 6 h (total 120 ml/kg)** — reassess every 1–2 h.
        - Refer **urgently** for IV treatment if you cannot give it and cannot use
          an NG tube and the child cannot drink.
        - **Slower alternative (non-malnourished only):** a **slow strategy —
          100 ml/kg over 8 h without boluses** — gave outcomes similar to Plan C
          in a recent trial and needs less staff oversight. **Plan C remains the
          standard**, but the slow strategy is an option where monitoring is
          limited.

    - type: "prose"
      title: "Which IV fluid"
      callout: true
      markdown: |
        **Ringer's lactate (Hartmann's) is preferred** over 0.9% saline — balanced
        crystalloids give **shorter hospital stays, better acid-base correction
        and less hypokalaemia** (2023 Cochrane review). Use **0.9% saline only if
        Ringer's lactate is unavailable**. **Do NOT use 5% glucose (dextrose) or
        0.18% saline with 5% dextrose** — they raise the risk of **hyponatraemia
        and cerebral oedema**.

    - type: "table"
      title: "Table 13 · IV fluids for a severely dehydrated child (100 ml/kg)"
      column_flex: [3, 4, 4]
      columns: ["Age", "First give 30 ml/kg in:", "Then give 70 ml/kg in:"]
      rows:
        - cells: ["**Infants < 12 months**", "**1 hour**", "**5 hours**"]
        - cells: ["**≥ 12 months**", "**30 min**", "**2½ hours**"]
        - cells: ["**Note**", "Repeat the first amount (30 ml/kg) if the radial pulse is still weak or not detectable.", ""]

    - type: "prose"
      title: "Monitoring"
      markdown: |
        - Reassess every **15–30 min** until a strong radial pulse returns; then
          reassess skin pinch, consciousness and ability to drink at least
          **hourly** to confirm hydration is improving.
        - When the full IV volume is given, reassess fully (Chart 7):
          - **still severe** → repeat the IV infusion (unusual)
          - **improved but still some dehydration** → switch to **ORS (Plan B)**
            for 4 h; encourage breastfeeding
          - **no dehydration** → follow **Plan A**; observe ≥ 6 h before discharge
            to confirm the mother can maintain hydration with ORS.
        - **When severe dehydration is corrected, prescribe zinc.**

    - type: "prose"
      title: "Cholera"
      markdown: |
        Suspect **cholera** in a child **> 2 years** with acute watery diarrhoea
        and severe dehydration or shock, if cholera is present in the area.
        - **Assess and treat dehydration** as for other acute diarrhoea.
        - Give an **oral antibiotic** to which local **V. cholerae** strains are
          sensitive. Preferred now: **azithromycin (single 20 mg/kg dose, max
          1 g)** for children; **doxycycline (single dose)** for older
          children/adults; **ciprofloxacin** as an alternative. **Erythromycin
          and co-trimoxazole are no longer preferred** (resistance).
        - **Prescribe zinc** as soon as vomiting stops.
