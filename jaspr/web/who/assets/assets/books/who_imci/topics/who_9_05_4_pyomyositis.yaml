# WHO IMCI §9.5.4 — Pyomyositis. Pocket Book 2nd ed (2013), p.291.
# ⚠️ OpenEvidence-reviewed 2026-07: ULTRASOUND is the primary bedside
# imaging (finds collections, guides aspiration; MRI gold standard "where
# available"); most common site is the PELVIS (iliopsoas/obturator, ~52–57%)
# not the thigh; NOT all cases need drainage — early "invasive" stage (before
# frank abscess) often responds to antibiotics alone, drainage for the
# suppurative stage / failure to improve; duration 5–10 days → 3–4 WEEKS
# total (IV until improving then oral); add clindamycin where MRSA prevalent;
# S. pyogenes is the 2nd pathogen. Refs: Vij J Pediatr Orthop 2021; Weber
# PIDJ 2024; Cadete PIDJ 2025.
# ============================================================

