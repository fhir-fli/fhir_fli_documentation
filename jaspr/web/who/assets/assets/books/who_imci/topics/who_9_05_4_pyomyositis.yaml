  blocks:

    - type: "prose"
      title: "Pus within a muscle"
      highlight: true
      markdown: |
        In pyomyositis there is **pus within the substance of a muscle**.
        - **Fever, tenderness and swelling** of the involved muscle. A fluctuant
          mass may **not** be detected if the inflammation is deep in the muscle.
        - The **most common site is the pelvis** (iliopsoas / obturator muscles,
          ~52–57%), then the **lower limb including the thigh**. Pelvic pyomyositis
          can mimic a hip or abdominal problem.
        - Organisms: **S. aureus** predominates; **Streptococcus pyogenes** is the
          second most common.

    - type: "prose"
      title: "Treatment"
      callout: true
      markdown: |
        - **Ultrasound** is the primary bedside imaging — it identifies
          intramuscular collections and guides aspiration, and is widely available;
          **MRI** is the gold standard **where available**. Use imaging (or X-ray)
          to look for underlying **osteomyelitis**.
        - **Not every case needs surgery.** In the **early ("invasive") stage
          before a frank abscess forms**, antibiotics alone often succeed. **Drain
          (incision or image-guided aspiration) for the suppurative stage or
          failure to improve** — leave a drain 2–3 days; large collections may need
          general anaesthesia.
        - **Antibiotics: cloxacillin 50 mg/kg IV 4× daily** first-line (covers
          S. aureus and S. pyogenes); **clindamycin** where MRSA is prevalent.
        - **Duration is longer than the old 5–10 days:** give **IV until clinical
          improvement** (typically 1–2 weeks), then **oral to complete ~3–4 weeks
          total**, guided by clinical response and CRP.
