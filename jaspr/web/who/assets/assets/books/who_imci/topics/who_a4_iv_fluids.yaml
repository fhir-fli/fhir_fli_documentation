    - type: "prose"
      title: "Table footnotes"
      markdown: |
        - **(a)** Half-strength Darrow's solution often comes without
          glucose, and glucose must be added before use.
        - **(b)** These fluids can be used mainly in the first few days of
          life, but **not** in other infants or children.

    - type: "prose"
      title: "A4.1 Choice of intravenous fluids"
      highlight: true
      markdown: |
        The risk of **hyponatraemia** may be increased by solutions
        containing very low sodium, compared with fluids of sodium content
        75–150 mmol/litre. Low-sodium solutions — such as **0.18% sodium
        chloride with 4% glucose**, or **5% glucose in water** — should
        **not** be used for rehydration or fluid maintenance. Appropriate
        sodium-containing IV maintenance fluids should contain glucose, to
        avoid hypoglycaemia and starvation ketosis in children who cannot
        feed orally or by nasogastric tube.

    - type: "prose"
      markdown: |
        - **Resuscitation:** children who are severely dehydrated or in
          shock should be resuscitated with **isotonic IV solutions**
          (normal saline 0.9% or Ringer's lactate).
        - **Intravenous maintenance fluid:** children who require IV fluids
          for maintenance should be managed with **Ringer's lactate with
          5% dextrose**, or **0.9% normal saline with 5% glucose**, or
          **half-normal saline (0.45% NaCl) with 5% glucose**.
