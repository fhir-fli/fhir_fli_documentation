  blocks:

    - type: "prose"
      highlight: true
      markdown: |
        Composition of IV fluids commonly used for neonates, infants and
        children. For which fluid to use in particular circumstances, see
        the disease-specific chapters — **shock, the sick young infant,
        severe acute malnutrition, surgical procedures and supportive
        care**. Note that **none of these fluids contains sufficient
        calories for long-term nutritional support** (some contain less
        than others). When feeds and fluids can be given by mouth or
        nasogastric tube, that is the safest, preferable route.

    - type: "table"
      title: "Composition of intravenous fluids"
      layout: "scroll"
      columns: ["IV fluid", "Na+ (mmol/l)", "K+ (mmol/l)", "Cl− (mmol/l)", "Ca++ (mmol/l)", "Lactate (mmol/l)", "Glucose (g/l)", "Calories (cal/l)"]
      column_widths: [204, 118, 112, 114, 120, 142, 120, 130]
      rows:
        - cells: ["Ringer's lactate (Hartmann's)", "130", "5.4", "112", "1.8", "27", "–", "–"]
        - cells: ["Normal saline (0.9% NaCl)", "154", "–", "154", "–", "–", "–", "–"]
        - cells: ["10% glucose", "–", "–", "–", "–", "–", "100", "400"]
        - cells: ["0.45 NaCl / 5% glucose", "77", "–", "77", "–", "–", "50", "200"]
        - cells: ["Darrow's solution", "121", "35", "103", "–", "53", "–", "–"]
        - cells: ["Half-strength Darrow with 5% glucose (a)", "61", "17", "52", "–", "27", "50", "200"]
