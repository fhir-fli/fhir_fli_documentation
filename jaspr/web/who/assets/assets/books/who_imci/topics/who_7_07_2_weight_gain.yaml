# ============================================================
# WHO IMCI §7.7.2 — Weight gain during rehabilitation. Pocket Book 2nd
# ed (2013), p.222.
# ✅ OpenEvidence-reviewed 2026-07: thresholds confirmed but framed as
# INPATIENT-specific (outpatient gain is much lower, ~3 g/kg/day); added
# refeeding syndrome to the poor-gain checklist.
# ============================================================

topic:
  id: "who-imci-7-7-2-weight-gain"
  title: "Weight Gain During Rehabilitation"
  list_subtitle: "7.7.2 · inpatient poor <5 / mod 5–10 / good >10"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["weight gain", "SAM", "rehabilitation", "inadequate feeding", "pediatric"]
  aliases:
    - "SAM Weight Gain"
  category: "medical"

  page_number: 222

  blocks:

    - type: "prose"
      title: "Standardize weighing"
      highlight: true
      markdown: |
        **Calibrate the scales every day.** Weigh children at the **same time
        each day** (e.g. morning) after removing clothes (but avoid hypothermia).
        Weight gain is graded (**inpatient** rehabilitation):
        - **poor: < 5 g/kg per day**
        - **moderate: 5–10 g/kg per day**
        - **good: > 10 g/kg per day**.

        **Outpatient** weight gain is normally much lower — pooled mean ≈
        **3.0 g/kg/day (2–4)** — so do **not** judge outpatient progress against
        the inpatient thresholds.

    - type: "prose"
      title: "If weight gain is poor (< 5 g/kg/day)"
      markdown: |
        Determine whether this is happening in **all children** (→ a major review
        of case management is required) or in **specific children** (reassess as
        if they were new admissions). General aspects to check:

        **Inadequate feeding** — check that:
        - **night feeds** are given
        - **target energy and protein** intakes are achieved (recalculate actual
          intake = offered minus left over; is the child vomiting/ruminating?)
        - **feeding technique** — frequent feeds in unlimited amounts?
        - **quality of care** — motivated, gentle, patient staff?
        - **feed preparation** — scales, ingredient measurement, mixing, taste,
          hygienic storage, adequate stirring
        - **complementary foods** are energy-dense enough
        - **multivitamin composition and shelf-life** are adequate
        - **mineral mix** is correctly prepared and given (in goitrous regions,
          check **potassium iodide is added** to the electrolyte/mineral mix
          (12 mg/2500 ml), or give **Lugol iodine 5–10 drops/day**).

    - type: "prose"
      title: "Other causes of poor gain"
      markdown: |
        - **At night:** consider **hypothermia** from insufficient covering or no
          night feeds.
        - **When beginning F-100 or RUTF:** consider **too rapid a transition**
          from starter to catch-up feeds, and **refeeding syndrome**
          (hypophosphataemia — [§7.4.4](topic:who-imci-7-4-4-electrolytes)).
        - Also reconsider **untreated infection** (including TB, UTI, otitis media,
          HIV) and **psychological problems**.
