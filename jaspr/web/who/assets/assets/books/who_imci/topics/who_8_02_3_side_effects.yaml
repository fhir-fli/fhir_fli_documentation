    - type: "prose"
      title: "DTG and neural tube defects"
      markdown: |
        An early signal (Tsepamo, Botswana) suggested a small risk of **neural
        tube defects** with **periconceptional DTG**. Updated data show the risk is
        **very small** (**~0.19% vs ~0.09%** background). DTG can be used in
        **adolescents of childbearing potential** with appropriate counselling.
        General long-term ART effect: **lipodystrophy** (historically driven by
        d4T, now removed).

    - type: "prose"
      title: "Immune reconstitution inflammatory syndrome (IRIS)"
      callout: true
      markdown: |
        **IRIS** is a spectrum of signs and symptoms from immune recovery weeks to
        months after starting ART — most often in children who start with **very
        low CD4 (< 15%)**. It reflects **unmasking** of latent/subclinical
        infection or reactivation of previously treated conditions. Commonest:
        **TB**, PCP/cryptosporidiosis, **HSV**, and fungal/parasitic infections.
        Where BCG immunization is routine, **BCG-associated IRIS** is frequent.

        Most paradoxical IRIS resolves spontaneously or with NSAIDs, but some
        episodes are severe and can be fatal:
        - **Give specific treatment** for the opportunistic infection.
        - **Start anti-inflammatory therapy.**
        - If progressively worse, a short course of **corticosteroids** and,
          rarely, temporary discontinuation of ART. **Restart the same regimen**
          once IRIS has improved.

    - type: "prose"
      title: "Monitoring schedule"
      markdown: |
        **Viral load is the preferred monitoring tool.** Check VL at **6 months**
        after starting ART, at **12 months**, then **every 12 months** if
        suppressed (< 1000 copies/ml). CD4 every 6 months remains useful but is
        **secondary** to viral load.

        After starting ART, review at **1–2 weeks** for tolerability and adherence,
        then at **2–4 weeks** for laboratory testing.
        - **infants < 12 months:** weeks 2, 4 and 8, then every 4 weeks in year 1.
        - **children > 12 months:** weeks 2, 4, 8 and 12, then every 2–3 months
          once stabilized.
        - any time there is **caregiver concern** or intercurrent illness.

        **Signs of a good response:** improved growth; improvement in neurological
        symptoms and development; decreased frequency of infections.

    - type: "prose"
      title: "Long-term follow-up"
      markdown: |
        - A **clinician** should see the child at least every **3 months**.
        - A **non-clinician** (e.g. pharmacist) assesses adherence and provides
          adherence counselling.
        - Clinically unstable children should be seen **more frequently**.

        **Monitor at each visit:** weight and height; neurodevelopment; adherence;
        **viral load** on schedule (and CD4 every 6 months if available);
        symptom-directed labs (Hb on ZDV, ALT).
