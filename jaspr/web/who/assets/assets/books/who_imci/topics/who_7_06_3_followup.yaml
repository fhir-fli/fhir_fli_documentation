  category: "medical"

  page_number: 221

  blocks:

    - type: "prose"
      title: "Plan follow-up before discharge"
      highlight: true
      markdown: |
        When a child is discharged to outpatient care, make a **plan for
        follow-up until full recovery** and contact the outpatient department,
        nutrition rehabilitation centre, local clinic or health worker who will
        take responsibility for continuing supervision. In general, the child
        should be **weighed weekly**.

    - type: "prose"
      title: "Refer back if not thriving"
      markdown: |
        Refer **back to hospital** for further assessment if the child:
        - **fails to gain weight over a 2-week period**, or **loses weight**
          between two measurements
        - has a **falling MUAC** or MUAC back **< 125 mm**
        - **develops loss of appetite, oedema, or any new illness**.

    - type: "prose"
      title: "🛑 Recovery does not end at discharge"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        **Relapse is common and dangerous.** After discharge from nutritional
        treatment, **6-month relapse rates of 22–63%** (context-dependent) and
        post-discharge mortality up to **~9%** are reported — children are most
        vulnerable in the **first 3 months**. Arrange **surveillance for at least
        6 months** (e.g. monthly), and **higher anthropometry at discharge is
        protective** (see [§7.6.2](topic:who-imci-7-6-2-discharge-criteria)).

    - type: "prose"
      title: "Post-discharge support (evolving evidence)"
      markdown: |
        WHO guidance on **post-discharge interventions** is still limited, but
        several show promise beyond anthropometric monitoring: **unconditional
        cash transfers** (fewer relapses), **zinc** (less morbidity),
        **psychosocial stimulation** (lower mortality), and **integrated
        biomedical + nutrition + malaria** packages. This is an area of **active
        research** — follow national/programmatic guidance.
