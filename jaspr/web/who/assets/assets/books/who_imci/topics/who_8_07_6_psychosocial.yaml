  blocks:

    - type: "prose"
      title: "Support the whole family"
      highlight: true
      markdown: |
        Helping parents and siblings through their emotional reaction to the dying
        child is one of the **most important** aspects of terminal-stage care. How
        this is done depends on whether care is given **at home, in hospital or in
        a hospice**. At home, much support is given by close family members,
        relatives and friends.

    - type: "prose"
      title: "Link the family to community support"
      markdown: |
        Keep up to date on **local community home-care programmes and HIV/AIDS
        counselling groups**. Find out whether the carers are receiving support
        from these groups; if not, discuss the family's attitude toward them and
        the possibility of **linking the family** with them.

    - type: "prose"
      title: "A fuller framework"
      markdown: |
        - **Shared decision-making** with child and family about goals of care.
        - **Advance care planning** — begin soon after a serious diagnosis and
          revisit as the condition evolves.
        - **Bereavement support** after death, including follow-up contact from the
          clinical team.
        - **Staff debriefing** — a child's death affects the whole team; know the
          local debriefing resources.
