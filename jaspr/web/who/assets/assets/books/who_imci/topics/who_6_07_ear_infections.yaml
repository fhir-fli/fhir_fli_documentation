    - type: "prose"
      title: "Ear infections & fever"
      highlight: true
      markdown: |
        Ear infections are a common cause of fever and range from the serious to
        the chronic:
        - **Mastoiditis** ([§6.7.1](topic:who-imci-6-7-1-mastoiditis)) — a
          bacterial infection of the mastoid bone; can lead to meningitis or
          brain abscess.
        - **Acute otitis media** ([§6.7.2](topic:who-imci-6-7-2-acute-otitis)) —
          ear pain or pus for < 2 weeks.
        - **Chronic otitis media** ([§6.7.3](topic:who-imci-6-7-3-chronic-otitis)) —
          pus draining for ≥ 2 weeks.
