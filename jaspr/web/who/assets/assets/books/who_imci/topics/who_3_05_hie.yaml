topic:
  id: "who-imci-3-5-hie"
  title: "Hypoxic Ischaemic Encephalopathy"
  list_subtitle: "3.5 · post-asphyxia — fits, apnoea, feeding, tone"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07 (therapeutic hypothermia + HELIX caveat)"
  tags: ["hie", "birth asphyxia", "encephalopathy", "apnoea", "hypoxia", "therapeutic hypothermia", "neonate", "pediatric"]
  aliases:
    - "HIE"
