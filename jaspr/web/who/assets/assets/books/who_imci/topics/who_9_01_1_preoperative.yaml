  blocks:

    - type: "prose"
      title: "Consent and fitness"
      highlight: true
      markdown: |
        Prepare both child and parents; obtain **consent**. Explain why the
        procedure is needed, the anticipated outcome, and the potential risks and
        benefits. Ensure the child is **medically fit**:
        - **Correct fluid deficit** and resuscitate — IV bolus of **isotonic
          crystalloid 10–20 ml/kg** (**balanced crystalloid** — Ringer's lactate /
          Hartmann's — preferred over 0.9% saline where available), repeated as
          needed. Restored urine output implies adequate volume resuscitation.
        - **Correct anaemia** — ideally Hb normal for age. Reserve transfusion for
          situations where anaemia must be corrected quickly (emergency surgery);
          for elective surgery use **oral iron**. Children with **haemoglobinopathy**
          (HbSS, HbAS, HbSC, thalassaemia) need special care — refer to standard
          paediatric texts.
        - Ensure the **best nutritional state** possible — good nutrition heals
          wounds.

    - type: "prose"
      title: "Fasting for a general anaesthetic"
      callout: true
      markdown: |
        Ensure an **empty stomach**. Modern paediatric fasting (**all ages**, not
        just infants) is the **6-4-1/2** rule:
        - **solids / formula: 6 h**
        - **breast milk: 4 h**
        - **clear fluids: 1 h** (actively encouraged — 306 000+ children studied;
          traditional limit was 2 h). **Avoid prolonged clear-fluid fasting.**

        If prolonged fasting (> 6 h) is unavoidable, give **IV fluids containing
        glucose**.

    - type: "prose"
      title: "Preoperative laboratory screening"
      markdown: |
        Generally not essential; if possible:
        - **Infants < 6 months:** check **Hb or EVF**.
        - **Children 6 months – 12 years:** minor surgery (e.g. hernia repair) — no
          investigations; **major surgery** — Hb or EVF, **group and cross-match**
          blood.
        - Other investigations as indicated after full clinical examination.

    - type: "prose"
      title: "Surgical antibiotic prophylaxis"
      markdown: |
        Give a **single dose within 120 min before incision** (within 60 min for
        short-half-life agents like cefazolin), and **stop within 24 h** — extended
        courses do **not** reduce surgical-site infection and cause harm. (A
        genuinely **infected** case is treated, not prophylaxed — continue therapy
        as for the infection.)
        - **Bowel surgery:** **ampicillin** (25–50 mg/kg IM/IV) + **gentamicin**
          (5–7.5 mg/kg IM/IV) + **metronidazole** (10 mg/kg).
        - **Urinary tract:** ampicillin + gentamicin (same doses).

    - type: "prose"
      title: "Endocarditis prophylaxis — highest-risk only"
      callout: true
      markdown: |
        Restrict IE prophylaxis to the **highest-risk cardiac conditions** (AHA
        2021): **prosthetic valve, prior IE, unrepaired cyanotic CHD, repaired CHD
        with a residual defect near prosthetic material, transplant with
        valvulopathy**. **Acquired valvular disease alone is no longer an
        indication.** Give only for **dental procedures with gingival
        manipulation** (not broadly for oral/respiratory/oesophageal work):
        - **amoxicillin 50 mg/kg orally** (or **ampicillin 50 mg/kg IV** if unable
          to take oral) within 30–60 min.
        - **Penicillin allergy:** **cephalexin, azithromycin/clarithromycin, or
          doxycycline** — **not clindamycin** (C. difficile risk).

        For major surgery, give **premedication** to allay anxiety.
