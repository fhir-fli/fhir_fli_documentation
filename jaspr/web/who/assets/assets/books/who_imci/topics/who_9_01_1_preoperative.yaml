# ============================================================
# WHO IMCI §9.1.1 — Preoperative care. Pocket Book 2nd ed (2013),
# pp.256–257.
# ⚠️ OpenEvidence-reviewed 2026-07: modernised fasting to 6-4-1/2 for ALL
# ages (not just infants); balanced crystalloid preferred for resuscitation;
# surgical prophylaxis given within 120 min of incision and STOPPED within
# 24 h (not 3–5 days); endocarditis prophylaxis restricted to highest-risk
# cardiac conditions only, clindamycin dropped. Refs: ASA 2023; Frykholm
# 2018; WHO SSI 2016; Seidelman JAMA 2023; AHA IE 2021.
# ============================================================

