topic:
  id: "who-imci-9-2-1-cleft"
  title: "Cleft Lip & Palate"
  list_subtitle: "9.2.1 · feeding · timing of repair · MDT"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["surgery", "cleft lip", "cleft palate", "congenital", "feeding", "pediatric"]
  aliases:
    - "Cleft lip and palate"
  category: "medical"

  page_number: 264

  blocks:

    - type: "prose"
      title: "Reassure the parents"
      highlight: true
      markdown: |
        Cleft lip and palate may occur **together or separately**. Reassure the
        parents that the problem can be dealt with — there may be concern about the
        unattractive appearance.

    - type: "prose"
      title: "Feeding"
      markdown: |
        Infants with **isolated cleft lip** feed normally. **Cleft palate** brings
        feeding difficulty — the infant can swallow but not suck adequately, and
        milk regurgitates through the nose and may be **aspirated**. If **Pierre
        Robin sequence** is present (micrognathia → glossoptosis → airway
        obstruction), there may be **upper airway obstruction during sleep**.

        Feed with **expressed breast milk** from a cup and spoon, a **squeezable
        cleft feeding bottle**, or bottle (if adequate sterility), delivering a
        bolus over the back of the tongue (spoon, pipette, special teat, or pouring
        device); the infant then swallows normally. Monitor feeding and growth
        closely.

    - type: "prose"
      title: "Robin sequence — airway ladder"
      callout: true
      markdown: |
        Sleep-related airway obstruction can cause **hypoxaemia and growth
        failure**. Manage in a **stepwise** way — **~60–70% succeed without
        surgery**:
        - **prone / lateral positioning** first,
        - **nasopharyngeal airway** next,
        - escalate to **mandibular distraction osteogenesis** or **tongue-lip
          adhesion** only for refractory cases (specialist referral).

    - type: "prose"
      title: "Timing of repair"
      callout: true
      markdown: |
        - **Lip:** closure at **3–6 months** (some centres do early lip repair
          earlier). The old **"Rule of 10s"** (10 weeks, 10 lb, Hb > 10) is now a
          **guideline, not a strict rule**.
        - **Palate:** closure at **6–14 months** — **earlier favours speech**
          (TOPS trial); complete **by 18 months** at the latest.

    - type: "prose"
      title: "Multidisciplinary follow-up"
      markdown: |
        Cleft care is a **team pathway**: monitor **hearing** (middle-ear
        infections are common) and **speech**; formal speech evaluation at
        **2–4 years**; velopharyngeal-insufficiency assessment; **alveolar bone
        grafting at ~8–9 years**; orthodontics; and possible orthognathic surgery
        in adolescence. Refer to a **multidisciplinary cleft team**.
