# ============================================================
# WHO IMCI §1.9.1 — Snake bite. Pocket Book 2nd ed (2013), pp.34–37.
# OpenEvidence review applied 2026-06-24:
#   - Pressure bandage: evidence mixed → consider only for neurotoxic
#     (elapid) bites with minimal local effects, if trained; NOT for
#     cytotoxic (viper) bites; splint regardless (2024 AHA/Red Cross;
#     Seifert NEJM 2022).
#   - Premedication: prophylactic SC adrenaline 0.25 ml 1:1000 in high-
#     reaction settings reduces severe reactions ~40% (de Silva 2011);
#     antihistamines/steroids alone don't.
#   - Reaction adrenaline: weight-based 0.01 mg/kg (max 0.3 mg child), not
#     fixed 0.15 ml.
#   - Cut/tourniquet prohibition confirmed correct.
# OpenEvidence-reviewed 2026-07:
#   - Prophylactic adrenaline CORRECTED: 0.25 ml of 1:1000 (= 0.25 mg) is an
#     ADULT/older-child dose. Stated the weight-based paediatric dose
#     0.005 mg/kg SC (≈ 0.005 ml/kg of 1:1000). NB: kept the mg/kg-consistent
#     ml conversion (0.005 mg/kg ÷ 1 mg/ml = 0.005 ml/kg) — the reviewer's
#     "≈ 0.01 ml/kg" is an arithmetic slip and was not propagated.
#   - Reaction adrenaline 0.01 mg/kg, antivenom child=adult dose, and
#     cut/tourniquet prohibition re-confirmed accurate — unchanged.
# ============================================================

topic:
  id: "who-imci-1-9-1-snake-bite"
  title: "Snake Bite"
  list_subtitle: "1.9.1 · diagnosis, first aid, antivenom"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + Seifert NEJM 2022 / de Silva 2011"
  tags: ["snake bite", "envenoming", "antivenom", "neurotoxic", "coagulopathy", "imci", "pediatric"]
  aliases:
    - "Snakebite"
    - "Antivenom"
  category: "medical"

  page_number: 34

  blocks:

    - type: "prose"
      title: "When to suspect"
      highlight: true
      markdown: |
        Suspect snake bite in any **severe limb pain or swelling**, or any
        **unexplained illness** with **bleeding** or **abnormal neurological
        signs**. Some cobras **spit venom into the eyes**, causing pain and
        inflammation.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        - **General:** shock, vomiting, headache. Examine the bite for
          **local necrosis, bleeding, or tender lymph-node enlargement**.
        - **Specific (venom-dependent):**
          - **Shock**
          - **Local swelling** spreading up the limb
          - **Bleeding** — gums, wounds, sores; or internal (esp.
            intracranial)
          - **Neurotoxicity** — respiratory difficulty/paralysis, ptosis,
            bulbar palsy (difficulty swallowing/talking), limb weakness
          - **Muscle breakdown** — muscle pain and **black urine**
        - Check **Hb** and, when possible, **blood clotting**.

    - type: "prose"
      title: "First aid"
      markdown: |
        - **Splint the limb** (whatever the snake type) to reduce movement
          and venom absorption.
        - **Pressure bandage — evidence is mixed.** Consider a firm bandage
          from distal to proximal **only for a likely neurotoxic (elapid)
          bite with minimal local effects**, and only if **trained** in the
          technique. **Do NOT** use it for **cytotoxic (viper)** bites — it
          can worsen local tissue injury.
        - **Clean the wound.** Transport to a hospital with **antivenom** as
          soon as possible — take the snake **if it was killed**.
        - **Do NOT cut the wound or apply a tourniquet.**

    - type: "prose"
      title: "Hospital — shock & respiratory failure"
      markdown: |
        - Treat **shock** if present
          ([Chart 7](topic:who-imci-chart7-iv-fluids-shock)).
        - **Respiratory-muscle paralysis can last days** → intubation and
          mechanical/manual ventilation (relays of staff) until function
          returns; secure the tube carefully, or perform elective
          tracheostomy.

    - type: "prose"
      title: "Antivenom"
      highlight: true
      markdown: |
        Give antivenom for **systemic signs** or **severe local signs**
        (swelling of **> half the limb** or severe necrosis):
        - Have **adrenaline and resuscitation equipment ready**. Where
          antivenom-reaction rates are high, give **prophylactic SC
          adrenaline before** the infusion (reduces severe reactions ~40%):
          **0.005 mg/kg (≈ 0.005 ml/kg of 1:1000)** in a child — the
          **0.25 ml / 0.25 mg** figure is an **adult / older-child** dose.
          **Antihistamines/steroids alone do NOT** prevent reactions.
        - **Monovalent** if the species is known; **polyvalent** if not.
          **Child dose = adult dose.**
        - Dilute in **2–3 volumes of 0.9% saline** and give IV **over 1 h**
          — slowly at first; **monitor closely for anaphylaxis**.

    - type: "prose"
      title: "⚠ Antivenom reaction"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        If itching, urticaria, restlessness, fever, cough or difficult
        breathing develop: **STOP the antivenom** and give **adrenaline IM
        0.01 mg/kg** (max **0.3 mg** in children; ≈ 0.15 ml of 1:1000 in a
        15 kg child). Add bronchodilators, **chlorphenamine 0.25 mg/kg**, and
        steroids as needed. **Restart slowly** once stable.

    - type: "prose"
      title: "Repeat doses & supportive care"
      markdown: |
        - **Repeat antivenom** after **6 h** if a clotting disorder recurs,
          or after **1–2 h** if bleeding briskly or neuro/cardiovascular
          signs worsen. Repeat if **no response**.
        - **Blood transfusion** is usually **not needed** if antivenom is
          given. Anticholinesterases can reverse neuro signs for some
          species.
        - **Surgical opinion** for severe swelling, a pulseless/painful limb
          or necrosis (excision, fasciotomy, skin graft, tracheostomy).
        - **Supportive:** fluids PO/NG to requirements (record intake/
          output); pain relief; **elevate** a swollen limb; **antitetanus**;
          antibiotics **only** if wound necrosis; **avoid IM injections**.
        - **Monitor hourly for ≥ 24 h** — envenoming can develop rapidly.
