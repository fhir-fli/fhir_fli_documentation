  blocks:

    - type: "prose"
      title: "When to suspect it"
      highlight: true
      markdown: |
        May be **acute or chronic** (symptoms over 1 day to 9 months). Presents
        with cranial-nerve deficits, or a more indolent course of headache,
        meningismus and altered mental status; early symptoms are usually
        nonspecific (headache, vomiting, photophobia, fever). Consider TB
        meningitis if any of:
        - fever persisting **≥ 14 days**
        - fever **> 7 days plus a family member with TB**
        - a **chest X-ray suggesting TB**
        - the child is **unconscious and stays so** despite treatment for
          bacterial meningitis
        - **known/exposed HIV**
        - **CSF:** moderately high white cells (typically < 500, mostly
          **lymphocytes**), elevated protein (0.8–4 g/L), low glucose
          (< 1.5 mmol/L) — or this pattern persists despite adequate bacterial
          meningitis treatment.

        Occasionally, when the diagnosis is unclear, add TB treatment to
        bacterial meningitis treatment.

    - type: "prose"
      title: "Treatment — two WHO-recommended options"
      markdown: |
        - **Standard regimen (12 months):** **HRZE for 2 months, then HR for
          10 months**. Daily doses: **H 10 mg/kg** (10–15; max 300), **R 15 mg/kg**
          (10–20; max 600), **Z 35 mg/kg** (30–40), **E 20 mg/kg** (15–25).
        - **6-month intensive regimen (Cape Town regimen)** — a WHO-recommended
          alternative for **drug-susceptible** TB meningitis, using higher doses
          for **6 months**: **isoniazid 15–20 mg/kg/day**, **rifampicin
          22.5–30 mg/kg/day**, **pyrazinamide 35–45 mg/kg/day**, and
          **ethionamide 17.5–22.5 mg/kg/day** (replacing ethambutol). South
          African experience shows markedly better survival and treatment success
          than the 12-month regimen.
        - **Dexamethasone 0.6 mg/kg/day for 2–3 weeks** (then reduce over a
          further 2–3 weeks) in **all** cases of TB meningitis, with either
          regimen.

        **MDR** (proven/suspected): a **fluoroquinolone and other second-line
        drugs** within a functioning MDR-TB programme, decided by a clinician
        experienced in paediatric TB.

    - type: "prose"
      title: "Note — no streptomycin"
      callout: true
      markdown: |
        **Streptomycin is not advised for children** — risk of **ototoxicity and
        nephrotoxicity**, and the injections are painful.
