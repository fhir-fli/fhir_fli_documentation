# ============================================================
# WHO IMCI Chart 3 — How to manage a choking infant or child
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.7–8
# UPDATED per OpenEvidence review (2026-06-09) to the 2025 AHA/AAP
# Pediatric BLS Guidelines (Joyner BL et al., Circulation 2025;
# 152(16_suppl_2):S424-S447, doi:10.1161/CIR.0000000000001370):
#   - Infant chest thrusts: heel of one hand (was: two fingers)
#   - Infant + child: alternating cycles of 5 back blows/slaps and
#     5 thrusts (chest for infants, abdominal for children)
#   - Abdominal thrusts explicitly NOT recommended in infants
#   - No blind finger sweeps (Class 3: Harm) — remove only visible
#     foreign bodies
#   - If unresponsive: start CPR immediately, compressions first,
#     no pulse check
# Source figures (back slaps / chest thrusts / Heimlich) not yet
# extracted — steps carried as text.
# OpenEvidence-reviewed 2026-07: reviewer confirmed full alignment with
#   2025 AHA/AAP BLS (heel-of-hand infant thrusts, back-blows-first in
#   children, no infant abdominal thrusts, no blind finger sweeps, CPR-if-
#   unresponsive) — no change.
# ============================================================

topic:
  id: "who-imci-chart3-choking"
  title: "Choking Infant or Child"
  list_subtitle: "IMCI Chart 3 · back blows / chest or abdominal thrusts"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · 2025 AHA/AAP Peds BLS (no change)"
  tags: ["choking", "airway", "foreign body", "heimlich", "back slaps", "imci", "pediatric"]
  aliases:
    - "Foreign Body Airway Obstruction"
    - "Heimlich"
  category: "medical"

  pages:

  - page_number: 7
    blocks:

    - type: "prose"
      title: "Choking Infant (< 1 year of age)"
      highlight: true
      markdown: |
        - Lay the infant on your arm or thigh in a **head-down position**.
        - Give **five back blows** to the middle of the infant's back with
          the heel of the hand.
        - Turn the infant over and give **five chest thrusts** with the
          **heel of one hand** on the lower half of the sternum.
        - **Repeat in alternating cycles** — 5 back blows, then 5 chest
          thrusts — until the object is cleared or the infant becomes
          unresponsive.
        - When opening the airway, remove a foreign body **only if visible**.
        - **Do not perform blind finger sweeps.**

    - type: "prose"
      title: "Do NOT"
      callout: true
      markdown: |
        - **No abdominal thrusts** in infants — risk of abdominal organ injury
        - **No blind finger sweeps**

    - type: "prose"
      title: "If the infant becomes unresponsive"
      markdown: |
        - **Begin CPR immediately**, starting with **chest compressions**
          — do not pause for a pulse check.
        - Each time the airway is opened to give breaths, look for the
          foreign body and remove it **only if visible**.

  - page_number: 8
    blocks:

    - type: "prose"
      title: "Choking Child (> 1 year of age)"
      highlight: true
      markdown: |
        - Give **five back blows** to the middle of the child's back with
          the heel of the hand, with the child sitting, kneeling or lying.
        - If the obstruction persists, go behind the child and pass your
          arms around the child's body; form a fist with one hand
          immediately **below the child's sternum**; place the other hand
          over the fist and pull **upwards into the abdomen**
          (**five abdominal thrusts** — Heimlich manoeuvre).
        - **Repeat in alternating cycles** — 5 back blows, then
          5 abdominal thrusts — until the object is cleared or the child
          becomes unresponsive.
        - When opening the airway, remove a foreign body **only if visible**.
        - **Do not perform blind finger sweeps.**

    - type: "prose"
      title: "If the child becomes unresponsive"
      markdown: |
        - **Begin CPR immediately**, starting with **chest compressions**
          — do not pause for a pulse check.
        - Each time the airway is opened to give breaths, look for the
          foreign body and remove it **only if visible**.

    - type: "prose"
      title: "References"
      markdown: |
        - WHO Pocket Book of Hospital Care for Children, 2nd ed (2013), p.7–8
        - 2025 AHA/AAP Pediatric BLS Guidelines — Circulation. 2025;152(16_suppl_2):S424–S447
