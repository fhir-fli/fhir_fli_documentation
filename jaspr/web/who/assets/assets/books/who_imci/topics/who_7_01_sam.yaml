# ============================================================
# WHO IMCI §7.1 — Severe acute malnutrition (definition + diagnosis).
# Pocket Book 2nd ed (2013), p.198.
# ✅ OpenEvidence-reviewed 2026-07: diagnostic criteria confirmed current;
# added the 6–59-month age range, a note on the 2023 WHO terminology shift
# ("severe wasting and/or nutritional oedema"), and a discharge forward-ref.
# ============================================================

topic:
  id: "who-imci-7-1-sam"
  title: "Severe Acute Malnutrition"
  list_subtitle: "7.1 · oedema / severe wasting / MUAC < 115"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["severe acute malnutrition", "SAM", "marasmus", "kwashiorkor", "MUAC", "wasting", "oedema", "pediatric"]
  aliases:
    - "SAM"
    - "Malnutrition"
  category: "medical"

  page_number: 198

  blocks:

    - type: "prose"
      title: "Definition"
      highlight: true
      markdown: |
        **Severe acute malnutrition (SAM)** in children **6–59 months** is the
        presence of **oedema of both feet** OR **severe wasting**
        (weight-for-height/length **< −3 SD**, or **mid-upper-arm circumference
        < 115 mm**). **No distinction** is made between the clinical conditions
        of **kwashiorkor** and **marasmus** because their treatment is similar.
        (**Infants < 6 months** are assessed and managed separately —
        [§7.4.10](topic:who-imci-7-4-10-infants-under6m).)

        Children who are **< −3 SD weight-for-age** may be **stunted** (short
        stature) but not severely wasted — stunted children who are not severely
        wasted **do not require hospital admission** unless they have a serious
        illness.

        **Terminology:** the **2023 WHO guideline** frames this condition as
        **severe wasting and/or nutritional oedema** (part of a continuum of
        "wasting"), rather than the older term "SAM" — the diagnostic thresholds
        are unchanged.

    - type: "prose"
      title: "Diagnosis — main features"
      markdown: |
        - **weight-for-length/height < −3 SD** (wasted), OR
        - **mid-upper-arm circumference (MUAC) < 115 mm**, OR
        - **oedema of both feet** (kwashiorkor, with or without severe wasting).

        Assess every child with SAM with a **full clinical examination** to
        confirm whether they have any **general danger sign, medical
        complication or loss of appetite**.

    - type: "prose"
      title: "Complicated vs uncomplicated SAM"
      callout: true
      markdown: |
        - **Complicated SAM** — SAM **with loss of appetite** OR **any medical
          complication**. **Admit for inpatient care.**
        - **Uncomplicated SAM** — a child with a **good appetite and no medical
          complication** can be **managed as an outpatient** with ready-to-use
          therapeutic food (RUTF).

        See [§7.3 organization of care](topic:who-imci-7-3-organization-of-care)
        for the appetite test and admission criteria, and
        [§7.6.2 discharge criteria](topic:who-imci-7-6-2-discharge-criteria)
        (recovery = **WHZ ≥ −2 AND MUAC ≥ 125 mm** with **no oedema for 2 weeks**).
