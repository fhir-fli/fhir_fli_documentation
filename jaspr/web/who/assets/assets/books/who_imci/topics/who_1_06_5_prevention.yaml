    - type: "prose"
      title: "Counsel parents"
      markdown: |
        - Keep **drugs and poisons in proper containers, out of reach** of
          children.
        - Advise on **first aid** if poisoning happens again:
          - **Do NOT induce vomiting** if the child swallowed kerosene,
            petrol or petrol-based products, has **mouth/throat burns**, or
            is **drowsy**.
          - For **bleach or other corrosives**, give **milk or water** to
            drink as soon as possible.
        - Take the child to a health facility **with the substance** —
          container, label, or a sample of tablets/berries.
