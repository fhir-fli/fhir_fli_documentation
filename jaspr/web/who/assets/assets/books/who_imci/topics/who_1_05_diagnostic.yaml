      highlight: true
      markdown: |
        Once the child is **stabilised** and emergency treatment has been
        given, determine the **underlying cause** so you can give specific
        curative treatment.

        These lists and tables are **complemented by the disease-specific
        chapters**. Work through the relevant presentation:
        - [Airway or severe breathing problem](topic:who-imci-1-5-1-airway-dx)
        - [Shock](topic:who-imci-1-5-2-shock-dx)
        - [Lethargy, unconsciousness or convulsions](topic:who-imci-1-5-3-coma-dx)
