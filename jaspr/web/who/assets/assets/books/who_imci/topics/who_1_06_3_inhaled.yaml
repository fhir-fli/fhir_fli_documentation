  blocks:

    - type: "prose"
      title: "Inhaled poisons"
      highlight: true
      markdown: |
        - **Remove the child from the source** of exposure.
        - **Urgently call for help.**
        - Give **supplementary oxygen** for respiratory distress, cyanosis
          or **SpO₂ ≤ 90%**.
        - **Irritant gases** can cause upper-airway swelling/obstruction,
          bronchospasm and **delayed pneumonitis** — intubation,
          bronchodilators and ventilatory support may be needed.
