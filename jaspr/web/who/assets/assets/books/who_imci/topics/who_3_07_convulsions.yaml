topic:
  id: "who-imci-3-7-convulsions"
  title: "Convulsions or Fits"
  list_subtitle: "3.7 · glucose, phenobarbital, calcium"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07 (NEOLEV2, 2023 NEJM)"
  tags: ["convulsions", "seizure", "phenobarbital", "hypoglycaemia", "hypocalcaemia", "neonate", "pediatric"]
  aliases:
    - "Neonatal Seizures"
    - "Fits"
  category: "medical"

  page_number: 53

  blocks:

    - type: "prose"
      title: "Common causes of neonatal fits"
      highlight: true
      markdown: |
        The commonest causes of neonatal convulsions are:
        - **hypoxic ischaemic encephalopathy** (perinatal asphyxia)
        - **central nervous system infection**
        - **hypoglycaemia**
        - **hypocalcaemia**

    - type: "prose"
      title: "Immediate treatment"
      markdown: |
        - Manage the **airway and breathing**.
        - Ensure **circulatory access**.
        - If **hypoglycaemic**, give **glucose IV or nasogastrically — 2 ml/kg
          of 10% glucose** ([IV glucose](topic:who-imci-chart10-glucose)). If
          glucose cannot be measured, **treat empirically** with glucose.
          (For an **asymptomatic** at-risk infant who is **not** convulsing,
          **buccal 40% dextrose gel 200 mg/kg** is a low-cost first option.)

    - type: "prose"
      title: "Anticonvulsant"
      markdown: |
        - Treat convulsions with **phenobarbital — loading dose 20 mg/kg IV**.
          If convulsions persist, give **further 10 mg/kg** doses up to a
          **maximum of 40 mg/kg**.
        - Continue phenobarbital at a **maintenance dose of 5 mg/kg per day**.
        - If fits **persist despite maximal phenobarbital**, add a **second-line
          agent — phenytoin (or fosphenytoin), levetiracetam, or midazolam**
          (limited evidence to choose between them).
        - If **hypocalcaemic**, symptoms may settle with **2 ml/kg of 10%
          calcium gluconate** as a slow IV infusion, then continue **oral**
          supplementation.
        - **Rule out CNS infection** — treat if present
          ([§3.9](topic:who-imci-3-9-meningitis)).

    - type: "prose"
      title: "⚠ Watch for apnoea"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        Phenobarbital can cause **apnoea** — watch the infant closely and
        **always keep a bag and mask available**.
