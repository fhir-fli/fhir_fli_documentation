    - type: "prose"
      title: "Most first wheeze is viral"
      highlight: true
      markdown: |
        Most **first episodes of wheeze in children < 2 years** are associated
        with **cough and cold**. These children are **not** likely to have a
        family history of atopy (hay-fever, eczema, allergic rhinitis), and their
        wheeze episodes become **less frequent as they grow older**. If
        troublesome, the wheeze may be treated with **inhaled salbutamol at
        home** ([§4.5.2](topic:who-imci-4-5-2-asthma) for delivery).
