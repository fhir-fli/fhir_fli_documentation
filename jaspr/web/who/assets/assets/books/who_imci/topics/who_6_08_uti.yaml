  category: "medical"

  page_number: 184

  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        Common in **boys in young infancy** (posterior urethral valves) and in
        **older female infants and children**. When culture is not possible, the
        diagnosis rests on **clinical signs plus urine microscopy** for bacteria
        and white cells.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Often **nonspecific** in young children. Consider UTI with:
        - **fever ≥ 38 °C for ≥ 24 h** with no obvious cause
        - vomiting or poor feeding
        - irritability, lethargy, failure to thrive, abdominal pain, jaundice
          (neonates)
        - older children — increased frequency, pain on passing urine, loin
          (abdominal) pain.

        Half of infants with a UTI have **fever and no other sign** — the only
        way to make the diagnosis is to **check the urine**.

    - type: "prose"
      title: "Investigations"
      markdown: |
        - Examine a **clean, fresh, un-centrifuged** urine specimen under the
          microscope: **> 5 white cells per high-power field**, or a **positive
          dipstick for leukocytes**. If microscopy shows no bacteriuria and no
          pyuria and the dipstick is negative, **rule out UTI**.
        - Obtain a **clean urine sample for culture** where possible. In sick
          infants, a specimen taken by **in-out catheter or suprapubic bladder
          aspiration** may be required.

    - type: "prose"
      title: "Treatment"
      markdown: |
        Treat as an **outpatient**, **except** — admit — when there is **high
        fever / systemic upset** (vomiting or inability to drink/breastfeed),
        signs of **pyelonephritis** (loin pain or tenderness), or the child is an
        **infant**. **Base the choice on local E. coli susceptibility** where
        known:
        - **First choice: oral amoxicillin-clavulanate** (25–50 mg/kg/day of the
          amoxicillin component in 2–3 divided doses) **or a first-generation
          cephalosporin** — cefalexin 50 mg/kg/day in 3–4 divided doses.
        - **Co-trimoxazole** (TMP 8 mg/kg/day + SMX 40 mg/kg/day in 2 doses) is
          now unreliable as empirical therapy — E. coli resistance exceeds
          20–30% in many settings — so use it **only where local susceptibility
          exceeds 80%**. **Adjust to culture results** when available.
        - **Duration:** **7–10 days** for **febrile UTI / pyelonephritis**;
          **3–5 days** is sufficient for **afebrile lower UTI (cystitis)** in
          children ≥ 2 years.
        - **Oral therapy equals IV.** For **uncomplicated pyelonephritis** in a
          child who can tolerate oral intake and is **not toxic-appearing**, oral
          antibiotics alone are as effective as an IV-to-oral course. **Reserve
          parenteral therapy** for toxic-appearing children, those who cannot
          tolerate oral medication, and **young infants**.
        - **Parenteral option** (when indicated): **gentamicin 7.5 mg/kg IM/IV
          once daily ± ampicillin 50 mg/kg IM/IV every 6 h**, or a parenteral
          cephalosporin (**ceftriaxone**).
        - **Infants < 2 months:** parenteral therapy (**gentamicin 7.5 mg/kg
          IM/IV once daily ± ampicillin**) until the fever subsides, then review
          and step down to oral treatment as above.

    - type: "prose"
      title: "Supportive care & follow-up"
      markdown: |
        - Encourage the child to **drink or breastfeed** regularly to help clear
          the infection and prevent dehydration.
        - For pain, give **paracetamol**; **avoid NSAIDs**.
        - **Imaging:** obtain a **renal and bladder ultrasound after the first
          febrile UTI** in young children (to detect obstruction or major
          structural abnormality). Reserve **micturating cystourethrogram
          (MCUG/VCUG)** for an abnormal ultrasound, **atypical** UTI, or
          **recurrent febrile** UTI. Investigate any child with **more than one
          episode** for an anatomical cause.
