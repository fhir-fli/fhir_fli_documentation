topic:
  id: "who-imci-6-8-uti"
  title: "Urinary Tract Infection"
  list_subtitle: "6.8 · check the urine · amox-clav / cephalexin"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["urinary tract infection", "UTI", "pyelonephritis", "amoxicillin-clavulanate", "cephalexin", "co-trimoxazole", "ultrasound", "pediatric"]
  aliases:
