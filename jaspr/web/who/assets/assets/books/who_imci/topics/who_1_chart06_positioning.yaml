# ============================================================
# WHO IMCI Chart 6 — How to position an unconscious child
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.12
# UPDATED per OpenEvidence review (2026-06-10):
#   - Terminology (MEDIUM): "spinal motion restriction" (SMR), not
#     rigid "immobilization" — ACS/ACEP/NAEMSP joint consensus;
#     current techniques limit but do not truly immobilize. Rigid
#     devices (backboards, collars) cause discomfort + pressure
#     ulcers w/ no proven benefit; de-adoption not linked to more
#     disabling cord injury (2024 AHA/Red Cross First Aid Guidelines,
#     Circulation 2024;150(24):e519-e579; NAEMSP review, Prehosp
#     Emerg Care 2025).
#   - Board caveats (MEDIUM): remove rigid surface ASAP (pressure
#     injury); a child's large occiput forces cervical FLEXION when
#     supine on a flat board — pad UNDER THE TORSO (not the head) for
#     neutral alignment, esp. under ~8 yr (Nolte, Pediatr Emerg Care
#     2022;38(1):e75-e84).
#   - Vomiting + c-spine (LOW): lateral trauma position (LTP) /
#     HAINES produced less cervical motion than standard recovery
#     position in cadaver C-spine models (Hyldmo, Acta Anaesthesiol
#     Scand 2016;60(7):1003-11).
#   - Airway reassessment (LOW): added "reassess airway & breathing
#     frequently" reminder.
# Source figures (board-taping, recovery position) not yet
# extracted — steps carried as text.
# OpenEvidence-reviewed 2026-07: reviewer confirmed SMR terminology, remove-
#   rigid-board-ASAP, pad-under-torso, poorly-fitting-collars→manual-in-line,
#   and lateral-trauma-position all accurate — no change.
# ============================================================

topic:
  id: "who-imci-chart6-positioning"
  title: "Positioning an Unconscious Child"
  list_subtitle: "IMCI Chart 6 · spinal motion restriction / recovery position"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · ACS/NAEMSP SMR + 2024 AHA First Aid + WMS 2024"
  tags: ["unconscious", "positioning", "recovery position", "neck trauma", "cervical spine", "imci", "pediatric"]
  aliases:
    - "Recovery Position"
    - "Neck Stabilization"
    - "Unconscious Child"
  category: "medical"

  page_number: 12

  blocks:

    - type: "prose"
      title: "If neck trauma is suspected"
      highlight: true
      markdown: |
        Goal is **spinal motion restriction (SMR)** — limit movement;
        rigid devices do not truly immobilize and are temporary.

        - **Restrict neck motion** and keep the child
          **lying on the back**.
        - **Tape the child's forehead and chin** to the sides of a
          **firm board** to secure this position.
        - Prevent the neck from moving by **supporting the child's head**
          (e.g. using **litre bags of IV fluid** on each side).
        - If the child is **vomiting**, turn on the side, keeping the
          **head in line with the body**.
          - Use the **lateral trauma position** if available (less
            cervical motion).

    - type: "prose"
      title: "Board caveats"
      callout: true
      markdown: |
        - **Remove the rigid board as soon as feasible** — pressure
          injury risk.
        - A child's **large occiput** forces the neck into **flexion**
          on a flat board. **Pad under the torso** (not the head) for
          neutral alignment, especially **under ~8 years**.
        - **Cervical collars fit poorly in young children** — prefer
          **manual in-line stabilization** if someone is available.

    - type: "prose"
      title: "If neck trauma is not suspected"
      highlight: true
      markdown: |
        - **Turn the child on the side** to reduce risk of aspiration.
        - Keep the **neck slightly extended**, and stabilize by placing
          **cheek on one hand**.
        - **Bend one leg** to stabilize the body position.

    - type: "prose"
      title: "After positioning"
      markdown: |
        - **Reassess airway and breathing frequently.**
