  blocks:

    - type: "prose"
      title: "Usually closes on its own"
      highlight: true
      markdown: |
        A **soft reducible swelling at the umbilicus**. **Most close
        spontaneously.** Repair only if **not closed by age 6 years** (most
        current guidelines observe to **age 4–5 years**), or if there is a
        history of the hernia being **difficult to reduce**.
