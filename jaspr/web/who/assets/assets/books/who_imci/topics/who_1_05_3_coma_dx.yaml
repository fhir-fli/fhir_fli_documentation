# ============================================================
# WHO IMCI §1.5.3 — Child presenting with lethargy, unconsciousness or
# convulsions. Pocket Book 2nd ed (2013), pp.23–25 (incl. Tables 3 & 4).
# OpenEvidence review applied 2026-06-20:
#   - HIGH: cerebral malaria — ~27% bacterial co-infection doubles
#     mortality → NEW red callout: empirical antibiotics for ALL febrile
#     coma, even if malaria+ (Ray, Lancet Glob Health 2025).
#   - DKA: + falling consciousness during treatment → cerebral oedema.
#   - Table 4 restructured: kernicterus separated from VKDB; added inborn
#     errors of metabolism (the old WHO kernicterus row conflated bacterial
#     infection + no-vitamin-K).
# Fix 2026-06-20: Table 4 continues onto p.26 — transcribed the source's
#   own Meningitis and Sepsis rows (initially missed; reviewer's "add
#   neonatal meningitis/sepsis" was already in the source). 8 rows total.
# OpenEvidence-reviewed 2026-07:
#   - Softened the unverifiable "~27%" cerebral-malaria bacterial
#     co-infection figure (Ray Lancet GH 2025 not confirmable) to "a
#     substantial proportion" in both the red callout and the Table 3 row.
#     The empirical-antibiotics-for-all-febrile-coma advice is well-
#     supported regardless (Crawley Lancet 2010; Kemigisha 2018).
#   - DKA cerebral-oedema line, Table 4 rows, CSF values, febrile-
#     convulsion note all re-confirmed accurate — unchanged.
#   - NOT added: intussusception as a lethargy cause (reviewer "consider"
#     only; already covered in §9.4) — deferred.
# ============================================================

topic:
  id: "who-imci-1-5-3-coma-dx"
  title: "Coma / Convulsions — Differential Dx"
  list_subtitle: "1.5.3 · history, exam, labs, Tables 3 & 4"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + malaria co-infection/DKA"
  tags: ["coma", "unconsciousness", "lethargy", "convulsions", "meningitis", "cerebral malaria", "hypoglycaemia", "neonatal tetanus", "differential diagnosis", "imci"]
  aliases:
    - "Unconsciousness"
    - "Coma Differential"
  category: "medical"

  page_number: 23

  blocks:

    - type: "prose"
      title: "History"
      markdown: |
        - Fever
        - Head injury
        - Drug overdose or toxin ingestion
        - **Convulsions:** how long do they last? previous febrile
          convulsions? epilepsy?
        - **Infant < 1 week** — consider:
          - birth asphyxia
          - birth injury to the brain

    - type: "prose"
      title: "Examination"
      markdown: |
        **General**
        - Jaundice
        - Severe palmar pallor
        - Peripheral or facial oedema (suggests renal failure)
        - Level of consciousness
        - Petechial rash
        - Blood pressure
        - Determine **AVPU** score (see
          [§1.3 Assessment](topic:who-imci-1-3-assessment))

        **Head and neck**
        - Stiff neck
        - Signs of head trauma or other injuries
        - Pupil size and reactions to light
        - Tense or bulging fontanelle
        - Abnormal posture, especially **opisthotonus** (arched back)

        Monitor the **coma scale** regularly. In infants < 1 week, note the
        time between birth and onset of unconsciousness. Other regional
        causes include malaria, Japanese encephalitis, dengue haemorrhagic
        fever, measles encephalitis, typhoid and relapsing fever.

    - type: "prose"
      title: "Laboratory investigations"
      markdown: |
        - If **meningitis** is suspected and there are **no signs of raised
          ICP** (unequal pupils, rigid posture, limb/trunk paralysis,
          irregular breathing) → perform a **lumbar puncture**.
        - In a malarious area → **rapid malaria test** and blood smear.
        - If unconscious → **check blood glucose**; if not possible, treat
          as **hypoglycaemia** ([Chart 10](topic:who-imci-chart10-glucose)).
          If consciousness improves, presume hypoglycaemia.
        - **Urine microscopy** if possible.

    - type: "prose"
      title: "⚠ Empirical antibiotics for ALL febrile coma"
      callout: true
      # High-priority practice point (Ray, Lancet Global Health 2025) → red.
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        Give **empirical antibiotics to every child with febrile coma —
        even if the malaria test is positive.** A **substantial proportion**
        of cerebral-malaria cases have **invasive bacterial co-infection**
        (often non-typhoidal salmonellae), which **markedly raises
        mortality** — cover with a third-generation cephalosporin.

    - type: "table"
      title: "Table 3 · Differential diagnosis"
      columns: ["Diagnosis / cause", "In favour"]
      column_flex: [2, 5]
      rows:
        - cells:
            - "Meningitis"
            - - "Very irritable"
              - "Stiff neck or bulging fontanelle"
              - "Petechial rash (meningococcal only)"
              - "Opisthotonus"
        - cells:
            - "Cerebral malaria (P. falciparum; often seasonal)"
            - - "Blood smear / RDT positive for malaria"
              - "Jaundice"
              - "Anaemia"
              - "Convulsions"
              - "Hypoglycaemia"
              - "Bacterial co-infection is common (a substantial proportion) and raises mortality — treat empirically (see callout)"
        - cells:
            - "Febrile convulsions (not a cause of unconsciousness)"
            - - "Prior short convulsions when febrile"
              - "Associated with fever"
              - "Age 6 months to 5 years"
              - "Blood smear normal"
        - cells:
            - "Hypoglycaemia (always seek the cause)"
            - - "Glucose < 2.5 mmol/L (45 mg/dL), or < 3.0 mmol/L (54 mg/dL) in SAM"
              - "Responds to glucose treatment"
        - cells:
            - "Head injury"
            - - "Signs or history of head trauma"
        - cells:
            - "Poisoning"
            - - "History of poison ingestion or drug overdose"
        - cells:
            - "Shock (lethargy/unconsciousness, unlikely convulsions)"
            - - "Poor perfusion"
              - "Rapid, weak pulse"
        - cells:
            - "Acute glomerulonephritis with encephalopathy"
            - - "Raised blood pressure"
              - "Peripheral or facial oedema"
              - "Blood and/or protein in urine"
              - "Decreased or no urine"
        - cells:
            - "Diabetic ketoacidosis"
            - - "High blood sugar"
              - "Polydipsia and polyuria"
              - "Acidotic (deep, laboured) breathing"
              - "Falling consciousness DURING treatment → suspect cerebral oedema (emergency)"

    - type: "prose"
      title: "Meningitis & lumbar puncture — notes"
      callout: true
      markdown: |
        The meningitis differential includes **encephalitis, cerebral
        abscess and TB meningitis** — consult a paediatric text. **Do NOT
        do an LP if there are signs of raised ICP.** A positive LP may show
        cloudy CSF, raised white cells (usually > 100 polymorphs/mL in
        bacterial meningitis), **low CSF glucose** (< 1.5 mmol/L), **high
        CSF protein** (> 0.4 g/L), or organisms on Gram stain/culture.

    - type: "table"
      title: "Table 4 · Young infant (< 2 months)"
      columns: ["Diagnosis / cause", "In favour"]
      column_flex: [2, 5]
      rows:
        - cells:
            - "Birth asphyxia / HIE / birth trauma"
            - - "Onset in first 3 days of life"
              - "History of difficult delivery"
        - cells:
            - "Intracranial haemorrhage"
            - - "Onset in first 3 days in a low-birth-weight or preterm infant"
        - cells:
            - "Haemolytic disease of the newborn / kernicterus"
            - - "Onset in first 3 days of life"
              - "Jaundice"
              - "Pallor"
        - cells:
            - "Vitamin K deficiency bleeding (VKDB)"
            - - "No vitamin K given at birth"
              - "Bleeding (e.g. intracranial, GI, umbilical)"
        - cells:
            - "Neonatal tetanus"
            - - "Onset at age 3–14 days"
              - "Irritability"
              - "Difficulty breastfeeding"
              - "Trismus"
              - "Muscle spasms"
              - "Convulsions"
        - cells:
            - "Meningitis"
            - - "Lethargy"
              - "Apnoeic episodes"
              - "Convulsions"
              - "High-pitched cry"
              - "Tense or bulging fontanelle"
        - cells:
            - "Sepsis"
            - - "Fever or hypothermia"
              - "Shock (lethargy, fast breathing, cold skin, prolonged capillary refill, fast weak pulse, sometimes low BP)"
              - "Seriously ill with no apparent cause"
        - cells:
            - "Inborn error of metabolism"
            - - "Deterioration after a symptom-free interval / once feeds established"
              - "Metabolic acidosis or hypoglycaemia"
              - "Consanguinity or family history of neonatal death"
