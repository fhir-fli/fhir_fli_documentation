# ============================================================
# WHO IMCI §9.4.2 — Appendicitis. Pocket Book 2nd ed (2013),
# pp.282–283.
# OpenEvidence-reviewed 2026-07:
#   - Fluid guidance aligned with post-FEAST Chart 7 (10–20 ml/kg per
#     bolus, reassess after each; no bolus in compensated shock w/o ICU).
#   - Antibiotics: ceftriaxone + metronidazole preferred where available;
#     ampicillin+gentamicin+metronidazole acceptable in LMIC (SIS 2017).
#   - Added a brief non-operative-management note: antibiotics alone is an
#     option for UNCOMPLICATED appendicitis (~72% avoid surgery at 1 yr;
#     St Peter Lancet 2025 / Minneci JAMA 2020) where surgical expertise is
#     limited, though appendicectomy remains standard of care.
# ============================================================

topic:
  id: "who-imci-9-4-2-appendicitis"
  title: "Appendicitis"
  list_subtitle: "9.4.2 · RLQ pain · rupture → peritonitis"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + Chart 7 / St Peter 2025 / SIS 2017"
  tags: ["surgery", "appendicitis", "acute abdomen", "peritonitis", "pediatric"]
  aliases:
    - "Appendicitis"
  category: "medical"

  page_number: 282

  blocks:

    - type: "prose"
      title: "Obstruction → rupture → peritonitis"
      highlight: true
      markdown: |
        Appendicitis is due to **obstruction of the appendix lumen** (faecoliths,
        lymphoid hyperplasia, GI parasites). If not recognized, the appendix
        **ruptures**, leading to **peritonitis and abscess formation**.

    - type: "prose"
      title: "Diagnosis — difficult in young children"
      markdown: |
        - **fever, anorexia, vomiting** (variable).
        - may begin as **periumbilical** pain, but the most important finding is
          **persistent pain and tenderness in the right lower quadrant**.
        - may be confused with **UTI, kidney stones, ovarian problems, mesenteric
          adenitis, ileitis**.
        - a raised **white cell count** helps; **ultrasound** by a skilled observer
          can be very helpful.

    - type: "prose"
      title: "Treatment"
      callout: true
      markdown: |
        - **Give nothing orally;** IV fluids; nasogastric tube if vomiting /
          distension.
        - Correct shock — **10–20 ml/kg per bolus over 30–60 min**,
          reassessing after each ([Chart 7](topic:who-imci-chart7-iv-fluids-shock);
          **no bolus** in compensated shock without ICU); if dehydrated
          without shock, 10–20 ml/kg half-strength Darrow's / normal saline
          + 5% glucose over 20 min.
        - **Antibiotics:** **ceftriaxone + metronidazole where available**;
          otherwise **ampicillin (25–50 mg/kg IM/IV 4× daily) + gentamicin
          (7.5 mg/kg IM/IV once daily) + metronidazole (10 mg/kg 3× daily)**.
        - **Urgent review** by a surgeon — **appendicectomy** as soon as possible.
          It is **better to operate and be wrong** than to delay and have
          peritonitis occur.
        - **Where surgical expertise is unavailable:** antibiotics alone is
          an option for **uncomplicated** appendicitis (~72% avoid surgery
          at 1 year), though **appendicectomy remains the standard of care**
          and antibiotics fail more often.
