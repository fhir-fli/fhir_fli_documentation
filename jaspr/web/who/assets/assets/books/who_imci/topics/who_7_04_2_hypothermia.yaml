topic:
  id: "who-imci-7-4-2-hypothermia"
  title: "Step 2 · Hypothermia"
  list_subtitle: "7.4.2 · re-warm · feed · treat infection"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
