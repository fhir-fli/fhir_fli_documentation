    - type: "prose"
      title: "Pus that needs draining"
      highlight: true
      markdown: |
        These infections collect **pus** and generally need **drainage** in
        addition to antibiotics — though **not every case needs an operation**: a
        well-drained simple abscess may need little antibiotic, needle aspiration
        can replace open washout for many septic joints, and early pyomyositis may
        settle on antibiotics alone.
        - [Abscess](topic:who-imci-9-5-1-abscess) — collection of pus anywhere.
        - [Osteomyelitis](topic:who-imci-9-5-2-osteomyelitis) — bone infection.
        - [Septic arthritis](topic:who-imci-9-5-3-septic-arthritis) — joint
          infection.
        - [Pyomyositis](topic:who-imci-9-5-4-pyomyositis) — pus within muscle.
