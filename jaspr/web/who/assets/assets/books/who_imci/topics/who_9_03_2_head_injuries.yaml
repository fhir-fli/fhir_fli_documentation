  blocks:

    - type: "prose"
      title: "Prevent secondary brain damage"
      highlight: true
      markdown: |
        Head injuries are a common cause of trauma death in children. The aim is to
        **prevent secondary brain damage** from **hypoxia, hypotension or
        hypoglycaemia**. Classify severity by **Glasgow Coma Scale**: **mild
        13–15, moderate 9–12, severe ≤ 8**. There may be a **skull fracture**
        (closed, open or depressed) or a **brain injury** — a simplified frame is
        the **three Cs**: **concussion** (temporary loss of function),
        **contusion** (bruising, affected for hours–weeks), **compression**
        (swelling or a growing clot — epidural/subdural haematoma — may need an
        urgent operation). Children more often suffer **acute brain swelling**
        after a severe injury.

    - type: "prose"
      title: "Diagnosis & imaging"
      markdown: |
        - History of head trauma.
        - Look for lacerations, bleeding, bruising; palpate for fractures /
          deformity.
        - **Fractured base of skull:** periorbital bruising, blood behind the
          eardrum, CSF leak or bleeding from nose or ears.
        - **Where CT is available**, it is the imaging of choice; use the
          **PECARN rule** to decide who needs it — image for **GCS < 15**, altered
          mental state, palpable/basilar skull fracture, or (age-specific) scalp
          haematoma, severe mechanism, LOC, vomiting, severe headache. **Very
          low-risk** children can be safely **observed without CT**.
        - **Where CT is not available**, the cornerstone is **admission for serial
          neurological observation** (repeated **GCS**, pupils and vital signs) and
          **prompt referral** if the child deteriorates. **Skull X-ray** still has
          a role here — it can show a **depressed or open fracture** — but a normal
          X-ray does **not** exclude intracranial injury.

    - type: "prose"
      title: "Treatment"
      callout: true
      markdown: |
        Assess ABC and resuscitate. The best way to retain brain function is to
        **keep the airway open**, ensure adequate breathing, correct shock and
        **prevent hypotension**. If the child does not respond to pain or is
        unconscious (**P or U** on AVPU), seek urgent help from an anaesthetist to
        protect the airway. In a young child, check for **hypoglycaemia**.
        - **Give nothing orally;** use an **orogastric** (not nasogastric) tube if
          the skull base may be fractured.
        - **Maintain euvolemia with isotonic fluid — do NOT fluid-restrict.**
          Hypotension worsens outcome; the old "two-thirds maintenance" advice is
          harmful. Keep normal blood pressure and normal sodium/glucose.
        - **Raised ICP / herniation:** the essentials — **airway, oxygenation,
          euvolemia, head elevation** — matter most and need no special equipment.
          **Where available**, give hyperosmolar therapy: **hypertonic (3%) saline
          2–5 ml/kg** (preferred) or **mannitol** (alternative, but risks
          hypovolaemia). Brief controlled ventilation only for acute herniation;
          avoid routine prophylactic hyperventilation.
        - **Elevate the head of the bed to 30°** (recovery position if
          consciousness is reduced).
        - Diagnose and treat other injuries.
        - **Urgent review** by a surgeon experienced in paediatric surgery.
