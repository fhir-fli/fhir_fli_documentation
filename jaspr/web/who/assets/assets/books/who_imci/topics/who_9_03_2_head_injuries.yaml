# ============================================================
# WHO IMCI §9.3.2 — Head injuries. Pocket Book 2nd ed (2013),
# pp.272–273.
# ⚠️ OpenEvidence-reviewed 2026-07: classify by GCS (mild/moderate/severe);
# CT (not skull X-ray) + PECARN decision rule for who needs imaging; maintain
# EUVOLEMIA (not fluid restriction — hypotension worsens outcome); added
# hypertonic-saline first-line hyperosmolar therapy for raised ICP. Refs:
# CDC/Lumba-Brown 2018; Kochanek 2019; ACS BIG 2024; Chong JAMA 2025.
# LMIC lens: CT + hyperosmolar therapy framed "where available"; where CT
# is absent, serial GCS/neuro obs is the cornerstone and skull X-ray keeps
# a role for depressed/open fractures.
# ============================================================

topic:
