  title: "Head Injuries"
  list_subtitle: "9.3.2 · GCS · PECARN/CT · euvolemia · hypertonic saline"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
