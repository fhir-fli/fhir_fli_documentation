  blocks:

    - type: "prose"
      title: "Suspect it, confirm it, classify it"
      highlight: true
      markdown: |
        In an endemic area, suspect malaria in **any** febrile child. Confirm
        with a **blood smear or rapid diagnostic test (RDT)**, then classify:
        - **Severe malaria** — a general danger sign or other feature of severe
          disease; a medical emergency needing **parenteral** treatment
          ([§6.2.1](topic:who-imci-6-2-1-severe-malaria)).
        - **Uncomplicated malaria** — positive test, fever, but **no** signs of
          severe malaria; treat with an oral **artemisinin-based combination
          therapy (ACT)** ([§6.2.2](topic:who-imci-6-2-2-uncomplicated-malaria)).

        **Test and treat:** confirm malaria with a **blood smear or RDT before
        treatment** in every setting where testing is available. Treat **without**
        confirmation **only** when testing is truly unavailable and the child has
        fever with no other obvious cause — presumptive treatment wastes
        antimalarials and misses other febrile illnesses.
