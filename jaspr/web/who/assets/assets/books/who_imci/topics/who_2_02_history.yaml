topic:
  id: "who-imci-2-2-history"
  title: "Taking a History"
  list_subtitle: "2.2 · presenting complaint to full history"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07-02"
  tags: ["history", "presenting complaint", "feeding history", "diagnosis", "pediatric"]
  aliases:
    - "Clinical History"
  category: "medical"

  page_number: 42

  blocks:

    - type: "prose"
      title: "Start with the presenting complaint"
      highlight: true
      markdown: |
        Begin with **"Why did you bring the child?"**, then the **history of
        the present illness**. The symptom-specific chapters guide the
        questions that shape a differential diagnosis.

    - type: "prose"
      title: "Cover the wider history"
      markdown: |
        Include **personal, immunization, family, social and environmental**
        histories. **Check the immunization status of every sick child** — the
        single most cost-effective way to cut childhood deaths. In endemic
        settings also ask about **HIV exposure** (mother's HIV status) and any
        **TB contact**. These histories often lead to **counselling messages**:
        - **bednet** use for malaria
        - **breastfeeding, safe water, sanitation & handwashing with soap** for diarrhoea
        - keeping **ORS at home** for early diarrhoea
        - reducing **indoor air pollution** for pneumonia
        - **completing the vaccination schedule**

    - type: "prose"
      title: "Age-specific points"
      markdown: |
        - **Younger infants:** pregnancy and birth history matters; the
          **feeding history is essential** (malnutrition often begins here).
        - **Older children:** ask about **developmental milestones**; they
          can contribute information themselves. If development is a concern,
          the **WHO Global Scales for Early Development (GSED, 2023)** give a
          standardised 0–3 yr assessment.
        - **Establish rapport** with child and parent **before examining**.
          Children **8 months – 5 years** need the most flexible approach.
