  page_number: 37

  blocks:

    - type: "prose"
      title: "Diagnosis"
      highlight: true
      markdown: |
        Stings are very painful for days; **systemic effects are far more
        common in children**. Signs of **autonomic activation** can appear
        within minutes:
        - **Shock**; high or low blood pressure
        - **Fast and/or irregular pulse**
        - Nausea, vomiting, abdominal pain
        - **Breathing difficulty** (from heart failure) or respiratory
          failure
        - Muscle twitches and spasms

    - type: "prose"
      title: "Treatment"
      markdown: |
        - **First aid:** transport to hospital as soon as possible.
        - **Severe envenoming:** give **scorpion antivenom** if available
          (infuse as for snake antivenom). **Antivenom + prazosin is
          superior to prazosin alone** (faster recovery — Pandi/Bawaskar
          RCTs).
        - **Cardiovascular toxicity:** **prazosin** for afterload reduction,
          **dobutamine** for inotropic support, **nitroglycerin** for
          pulmonary oedema. Treat heart failure if present.
        - **Pain:** oral paracetamol, or oral/IM morphine by severity. If
          very severe, **infiltrate the site with 1% lignocaine — without
          adrenaline**.
