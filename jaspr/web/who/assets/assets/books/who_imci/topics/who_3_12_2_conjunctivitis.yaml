# ============================================================
# WHO IMCI §3.12.2 — Conjunctivitis (sticky eyes & ophthalmia neonatorum).
# Pocket Book 2nd ed (2013), pp.66–67.
# ✅ OpenEvidence review applied (2026-07, 2021 CDC STI): ceftriaxone max
#    corrected 150→250 mg; kanamycin replaced by cefotaxime 100 mg/kg;
#    erythromycin 0.5% prophylaxis option; parental Rx → ceftriaxone
#    500 mg IM (not amoxicillin/spectinomycin).
# ============================================================

topic:
  id: "who-imci-3-12-2-conjunctivitis"
  title: "Neonatal Conjunctivitis"
  list_subtitle: "3.12.2 · sticky eyes vs ophthalmia neonatorum"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07 (2021 CDC STI guidelines)"
  tags: ["conjunctivitis", "ophthalmia neonatorum", "gonococcal", "ceftriaxone", "cefotaxime", "neonate", "pediatric"]
  aliases:
    - "Ophthalmia Neonatorum"
    - "Sticky Eyes"
  category: "medical"

  page_number: 66

  blocks:

    - type: "prose"
      title: "Sticky eyes & mild conjunctivitis"
      highlight: true
      markdown: |
        Treat as an **outpatient** if the child has no other serious problem.
        - Show the mother how to **wash the eyes** with water or breast milk,
          and how to apply ointment — she must **wash her hands** before and
          after.
        - Wash the eyes and apply **tetracycline 1% or chloramphenicol eye
          ointment four times a day for 5 days** (**erythromycin 0.5%** is an
          alternative where available).

    - type: "prose"
      title: "Severe conjunctivitis (ophthalmia neonatorum)"
      markdown: |
        A lot of pus and/or swelling of the eyelids is often **gonococcal**
        infection. Treat as an **inpatient** (**risk of blindness**), with
        **twice-daily review**.
        - **Wash the eyes** to clear the pus.
        - Give **ceftriaxone 25–50 mg/kg** (**maximum 250 mg**) IM/IV as a
          single dose.
        - If ceftriaxone **cannot be used** — a jaundiced neonate or one on
          calcium-containing IV fluids
          ([see §3.9](topic:who-imci-3-9-meningitis)) — give **cefotaxime
          100 mg/kg IM/IV** as a single dose instead.
        - Also apply **tetracycline or chloramphenicol eye ointment**.

    - type: "prose"
      title: "Treat the parents"
      markdown: |
        Also treat the **mother and her partner** for sexually transmitted
        infections: **ceftriaxone 500 mg IM as a single dose** for gonorrhoea
        (amoxicillin and spectinomycin are no longer adequate), plus
        **doxycycline** for **Chlamydia** unless it has been excluded. Refer to
        the STI control guidelines.
