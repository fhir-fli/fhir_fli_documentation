    - type: "prose"
      title: "Major trauma"
      highlight: true
      markdown: |
        Severe multiple injuries are **life-threatening** — multiple organs/
        limbs may be involved and the child can **deteriorate rapidly**. The
        **first hour** is most critical. When more than one life-threatening
        state is present, treat them **simultaneously** with effective
        **teamwork**.

