# ============================================================
# WHO IMCI Chart 2 — Triage of all sick children
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.5–6
# Completed 2026-06-09: the original transcription covered only
# p.6 — added p.5's Airway & breathing and Circulation emergency
# rows (incl. central cyanosis + capillary refill > 3 s, which the
# OpenEvidence review flagged as missing).
# OpenEvidence review 2026-06-09: ETAT priority-sign framework
# remains current (ETAT+ AUC 0.97 for predicting admission).
# Open consideration (not yet applied, Grey to decide): align the
# young-infant pathway with the 2019 WHO PSBI sub-classifications
# (critical illness: not able to feed at all / no movement at all /
# convulsions vs. clinical severe infection: 6 signs); likely
# belongs with the Ch.3 neonate topics rather than this chart.
# Plan C fluid protocols: NEJM 2025 (Maitland et al.) found a slow
# 8-h IV strategy comparable in non-malnourished children — WHO
# guidance unchanged; revisit when Charts 11/13 are authored.
# OpenEvidence-reviewed 2026-07:
#   - Priority sign reverted to WHO-verbatim "Oedema of both feet" (the
#     WHO criterion is bilateral pedal oedema = kwashiorkor; the earlier
#     "or face" diluted that specific sign and is not in the source).
#   - Fixed a single-asterisk italic footnote (renders as literal stars in
#     MiniMarkdown) → plain text.
#   - ETAT framework, circulation "both signs" rule, SAM carve-out, and
#     cervical-spine callout re-confirmed accurate — otherwise unchanged.
# ============================================================

topic:
  id: "who-imci-chart2-triage"
  title: "Triage of All Sick Children"
  list_subtitle: "IMCI Chart 2 · severity table"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013; fluid rate → Chart 7 (FEAST)"
  tags: ["triage", "imci", "pediatric", "emergency", "etat"]
  category: "medical"

  pages:

  - page_number: 5
    blocks:

    # ─────────────── Emergency signs callout ───────────────
    - type: "prose"
      title: "Emergency signs"
      highlight: true
      markdown: |
        If any sign is positive: **call for help**, assess and resuscitate,
        give treatment(s), draw blood for emergency lab (glucose, malaria
        smear, Hb).

    - type: "prose"
      title: "Cervical spine"
      callout: true
      markdown: |
        - Do **not** move neck if a cervical
          spine injury is possible
        - But **do open the airway**

    # ─────────────── Triage matrix: p.5 rows ───────────────
    - type: "table"
      title: "Assess and treat"
      columns: ["Assess", "Treat"]
      rows:

        - severity: "emergency"
          cells:
            - |
              **Airway and breathing** (any sign positive)
              - Obstructed or absent breathing
              - Central cyanosis
              - Severe respiratory distress
            - |
              **If foreign body aspirated:**
              - Manage airway in choking child (Chart 3)

              **If no foreign body aspirated:**
              - Manage airway (Chart 4)
              - Give oxygen (Chart 5)
              - Make sure the child is warm

        - severity: "emergency"
          cells:
            - |
              **Circulation** (signs positive)
              Cold skin with:
              - Capillary refill longer than 3 s, **and**
              - Weak and fast pulse

              **Check for severe malnutrition.**
            - |
              - Stop any bleeding
              - Give oxygen (Chart 5)
              - Make sure the child is warm

              **If no severe malnutrition:**
              - Insert an IV line and begin giving fluids — rate per **Chart 7** (hemodynamic-status dependent, post-FEAST)
              - If peripheral IV cannot be inserted, insert an intraosseous or external jugular line (see pp. 340, 342)

              **If severe malnutrition:**
              - If lethargic or unconscious: give IV glucose (Chart 10); insert IV line and give fluids (Chart 8)
              - If not lethargic or unconscious: give glucose orally or by nasogastric tube; proceed immediately to full assessment and treatment

  - page_number: 6
    blocks:

    # ─────────────── Triage matrix: p.6 rows ───────────────
    - type: "table"
      title: "Assess and treat (continued)"
      columns: ["Assess", "Treat"]
      rows:

        - severity: "emergency"
          cells:
            - |
              **Coma / convulsing** (if coma or convulsion)
              - Coma
              - Convulsing (now)
            - |
              - Manage the airway (Chart 4)
              - If convulsing, give diazepam rectally (Chart 9)
              - Position the unconscious child; if head/neck trauma suspected, stabilize the neck first (Chart 6)
              - Give IV glucose (Chart 10)

        - severity: "emergency"
          cells:
            - |
              **Severe dehydration** (only in a child with diarrhoea)
              Diarrhoea plus **any two** of:
              - Lethargy
              - Sunken eyes
              - Very slow skin pinch
              - Unable to drink or drinks poorly

              **Check for severe malnutrition.**
            - |
              - Make sure the child is warm.

              **If no severe malnutrition:**
              - Insert IV line and begin giving fluids rapidly following Chart 11 + diarrhoea treatment plan C in hospital (Chart 13, p. 131)

              **If severe malnutrition:**
              - Do **not** insert an IV line
              - Proceed immediately to full assessment + treatment (see §1.4, p. 19)

    # ─────────────── Priority signs ───────────────
    - type: "prose"
      title: "Priority signs"
      markdown: |
        These children need **prompt assessment and treatment**:
        - Tiny infant (< 2 months)
        - Temperature very high
        - Trauma or other urgent surgical condition
        - Pallor (severe)
        - Poisoning (history of)
        - Pain (severe)
        - Respiratory distress
        - Restless, continuously irritable, or lethargic
        - Referral (urgent)
        - Malnutrition: visible severe wasting
        - Oedema of both feet
        - Burns (major)

        If a child has trauma or other surgical problems, get surgical help or follow surgical guidelines.

    # ─────────────── Non-urgent footer ───────────────
    - type: "prose"
      title: "Non-urgent"
      markdown: |
        Proceed with assessment and further treatment according to the child's priority.
