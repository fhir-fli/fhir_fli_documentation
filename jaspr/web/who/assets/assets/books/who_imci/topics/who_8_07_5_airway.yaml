    - type: "prose"
      title: "Comfort first"
      highlight: true
      markdown: |
        In terminal care, give priority to **keeping the child comfortable** rather
        than prolonging life:
        - **Position** semi-upright to ease breathing.
        - **Gently suction** secretions only if they distress the child.
        - **Low-dose morphine (0.05–0.1 mg/kg)** relieves **terminal dyspnoea** —
          evidence-based.
        - **Anticholinergics** (glycopyrrolate or hyoscine) for **"death rattle"**
          secretions if distressing to the family.
