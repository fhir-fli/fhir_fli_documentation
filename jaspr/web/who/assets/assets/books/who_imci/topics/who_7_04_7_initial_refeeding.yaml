    - type: "prose"
      title: "Monitoring"
      markdown: |
        If the child's intake (after allowing for vomiting) does **not reach
        80 kcal/kg per day** despite frequent feeds, give the remaining feed **by
        NG tube**. **Do not exceed 100 kcal/kg per day** in this initial phase.
        Monitor and record: **amounts offered and left over; vomiting; stool
        frequency/consistency; daily body weight**. In very hot climates children
        may need extra water.
