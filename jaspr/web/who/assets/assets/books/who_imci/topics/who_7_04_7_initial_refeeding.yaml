# hypophosphataemia.
# ============================================================

topic:
  id: "who-imci-7-4-7-initial-refeeding"
  title: "Step 7 · Initial Re-feeding"
  list_subtitle: "7.4.7 · F-75 · gradual · 100 kcal/kg/day"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["initial re-feeding", "SAM", "F-75", "starter formula", "stabilization", "pediatric"]
  aliases:
    - "F-75"
    - "SAM Initial Feeding"
  category: "medical"

  page_number: 209

  blocks:

    - type: "prose"
      title: "Feed gradually — essential features"
      highlight: true
      markdown: |
        In the initial (stabilization) phase, re-feeding must be **gradual**.
        Essential features:
        - **frequent, small oral feeds** of **low osmolality and low lactose**,
          every **2–3 h**
        - **NG feeding** if the child is eating **≤ 80%** of the amount offered
          at **two consecutive feeds**
        - **calories 100 kcal/kg per day**
        - **protein 1–1.5 g/kg per day**
        - **liquid 130 ml/kg per day** (or **100 ml/kg per day** if the child has
          **severe oedema**)
        - if breastfed, **continue breastfeeding** — but still give the
          prescribed amounts of starter formula.

    - type: "table"
      title: "Starter F-75 feeding schedule (stabilization)"
      column_flex: [3, 3, 3, 3]
      columns: ["Days", "Frequency", "Vol/kg/feed", "Vol/kg/day"]
      rows:
        - cells: ["**1–2**", "every 2 h", "11 ml", "130 ml"]
        - cells: ["**3–5**", "every 3 h", "16 ml", "130 ml"]
        - cells: ["**≥ 6**", "every 4 h", "22 ml", "130 ml"]

    - type: "prose"
      markdown: |
        Milk-based **F-75** (75 kcal and 0.9 g protein per 100 ml) suits most
        children. **Cereal-based F-75** partially replaces sugar with cereal
        flour, giving **lower osmolality** — helpful for children with persistent
        diarrhoea. **Feed from a cup or bowl**; use a spoon, dropper or syringe
        for very weak children.

    - type: "table"
      title: "Recipes for F-75 (starter) and F-100 (catch-up)"
      column_flex: [5, 3, 3]
      columns: ["Ingredient", "F-75 (starter)", "F-100 (catch-up)"]
      rows:
        - cells: ["Dried skimmed milk (g)", "25", "80"]
        - cells: ["Sugar (g)", "70", "50"]
        - cells: ["Cereal flour (g)", "35", "—"]
        - cells: ["Vegetable oil (g)", "27", "60"]
        - cells: ["Electrolyte/mineral solution (ml)", "20", "20"]
        - cells: ["Water: make up to (ml)", "1000", "1000"]
        - cells: ["**Energy (kcal/100 ml)**", "**75**", "**100**"]
        - cells: ["**Protein (g/100 ml)**", "**1.1**", "**2.9**"]
        - cells: ["Osmolality (mOsm/litre)", "334", "419"]

    - type: "prose"
      markdown: |
        Cook cereal-based F-75 for **4 min** and add the mineral/vitamin mix
        after cooking. **Alternative if milk is unavailable:** precooked
        corn–soya or wheat–soya blend **50 g**, sugar **85 g**, oil **25 g**,
        electrolyte/mineral mix **20 ml**, water to **1000 ml**.

        **Standard F-75 remains the default:** a **modified** (reduced-carbohydrate,
        lactose-free) F-75 showed **no improvement** in time to stabilization,
        mortality or diarrhoea in an RCT (Bandsma 2019). Standard F-75 that meets
        the **phosphorus specification** (~560 mg/L) also **protects against
        refeeding hypophosphataemia** — most children have their lowest phosphate
        at admission, not during feeding.

