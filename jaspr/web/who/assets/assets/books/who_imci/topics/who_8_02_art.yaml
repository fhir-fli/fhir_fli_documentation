  blocks:

    - type: "prose"
      title: "Treat every young child at diagnosis"
      highlight: true
      markdown: |
        All HIV-infected infants and children **< 60 months** should begin ART
        **immediately** once diagnosed, **regardless** of clinical or
        immunological status. Antiretrovirals cannot cure HIV, but they
        **dramatically reduce mortality and morbidity** and improve quality of
        life.

    - type: "prose"
      title: "Triple therapy — now INSTI-based"
      markdown: |
        First-line ART is **three drugs**: two NRTIs plus an anchor. The anchor of
        choice is now an **INSTI — dolutegravir (DTG)** — for nearly all children
        (see [§8.2.1](topic:who-imci-8-2-1-arv-drugs)), replacing the older
        NNRTI/PI-based regimens. **Dispersible fixed-dose combinations** (e.g.
        DTG/ABC/3TC, Triumeq PD) are preferable to syrups or single drugs — they
        encourage adherence, reduce treatment burden, and cut cost.

        Follow national paediatric HIV treatment guidelines; principles and
        first-line choices are largely the same as for adults. Consider: a
        **suitable formulation** in appropriate doses, a **simple dosing
        schedule**, and **taste/palatability** (hence compliance). Ensure
        HIV-infected **parents also access treatment**.

