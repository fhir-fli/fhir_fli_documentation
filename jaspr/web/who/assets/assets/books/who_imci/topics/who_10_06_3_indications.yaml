    - type: "prose"
      title: "Five general indications"
      highlight: true
      markdown: |
        1. **Acute blood loss** — when **20–30% of the total blood volume** has been
           lost and bleeding is continuing.
        2. **Severe anaemia.**
        3. **Septic shock** — if IV fluids are insufficient to maintain adequate
           circulation (transfusion given **in addition to** antibiotic therapy).
           **Blood is not a first-line volume expander** — use **crystalloid** for
           initial resuscitation (plus vasoactive support where available); reserve
           transfusion for correcting **anaemia or coagulopathy.**
        4. **Whole fresh blood** is required to provide **plasma and platelets** for
           clotting factors when specific blood components are not available.
        5. **Exchange transfusion** in neonates with **severe jaundice**.
