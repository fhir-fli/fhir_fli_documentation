  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        Caused by an **arbovirus transmitted by Aedes mosquitoes**. Highly
        seasonal in Asia and South America and increasingly in Africa. The
        illness starts with **acute fever, retro-orbital pain and continuously
        high temperatures for 2–7 days**. Most children recover; a **small
        proportion develop severe disease**. In recovery, a **macular or
        confluent blanching rash** is often noted.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Suspect dengue in an at-risk area if fever has lasted **> 2 days**.
        Headache, pain behind the eyes, joint and muscle pain, abdominal pain,
        vomiting and/or a rash may occur but are **not always present** — it can
        be difficult to distinguish from other common childhood infections.

        **Confirmatory tests** (where available):
        - **NS1 antigen rapid test** — most sensitive in the **first 5 days** of
          illness.
        - **Dengue IgM** — detectable from about **day 4**.
        - Combining **NS1 + IgM** on a single specimen identifies **≥ 90%** of
          cases. **RT-PCR** is the gold standard for acute diagnosis.

    - type: "prose"
      title: "Treatment — non-severe dengue"
      markdown: |
        Most children can be managed **at home** if the family has good access to
        care.
        - **Counsel to return immediately** if any of: severe abdominal pain,
          persistent vomiting, cold clammy extremities, lethargy or restlessness,
          bleeding (e.g. black stools or coffee-ground vomit).
        - Encourage **oral fluid** (clean water or ORS) to replace losses.
        - **Paracetamol** is the recommended antipyretic. **Aspirin is strictly
          contraindicated** (irreversible platelet inhibition → bleeding).
          **Avoid ibuprofen and other NSAIDs** per WHO guidance, though emerging
          evidence suggests low-dose ibuprofen may be safe in non-severe dengue.
        - **Follow up daily** until the temperature is normal; check the **EVF
          daily** if possible; watch for signs of severe disease.
        - **Admit** any child with signs of severe disease (mucosal or severe
          bleeding, shock, altered mental status, convulsions or jaundice) or a
          rapid, marked rise in EVF
          ([§6.10.1](topic:who-imci-6-10-1-severe-dengue)).

    - type: "prose"
      title: "Prevention — vector control & vaccines"
      markdown: |
        The mainstay is **Aedes vector control** (remove standing water, use
        nets/repellents). Two vaccines are now available in endemic countries:
        **TAK-003 (Qdenga)** — approved in several countries **without** a
        serostatus requirement — and **CYD-TDV (Dengvaxia)** — for
        **seropositive** individuals aged **6–16 years** only. Follow national
        immunization policy.
