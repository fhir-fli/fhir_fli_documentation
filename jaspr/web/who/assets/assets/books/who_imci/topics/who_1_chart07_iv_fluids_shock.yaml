# ============================================================
# WHO IMCI Chart 7 — IV fluids for shock WITHOUT severe acute malnutrition
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.13
# MAJOR REVISION per OpenEvidence review (2026-06-18). The 2013 "infuse
# 20 ml/kg as rapidly as possible" is contradicted by the FEAST trial
# (Maitland, NEJM 2011, n=3141 — rapid boluses INCREASED 48-h mortality in
# African children with febrile illness; harm consistent across malaria,
# severe anaemia, coma). Restructured to the resource-stratified,
# hypotension-dependent framework of the 2026 Surviving Sepsis Campaign
# paediatric guidelines (Pediatr Crit Care Med 2026;27(4):379-434) and
# 2025 AHA/AAP PALS (Pediatrics 2026;157(1):e2025074351):
#   - Compensated shock (no hypotension) + no ICU → NO bolus, maintenance
#     fluids only (SSC strong rec).
#   - Hypotensive + no ICU → 10–20 ml/kg over 30–60 min, reassess after
#     EACH, max ~40 ml/kg; WHO post-FEAST rate.
#   - ICU available → up to 40–60 ml/kg in 10–20 ml/kg aliquots, first hour.
#   - Reassess after EVERY bolus; STOP for fluid-overload signs.
#   - Fluid-refractory → epinephrine or norepinephrine first-line; dopamine
#     only if unavailable (peripheral IV/IO acceptable).
#   - Ringer's lactate preferred over normal saline (SSC conditional).
#   - Malaria/severe anaemia: bolus harmful (malaria RR 1.51); transfuse in
#     severe anaemia instead.
# Shock WITH severe malnutrition = Chart 8 (different volume/rate).
# OpenEvidence-reviewed 2026-07:
#   - PRoMPT BOLUS (NEJM 2026, n≈8500) confirmed no MAKE-30 difference
#     RL vs saline; noted SSC 2026 STILL conditionally prefers balanced
#     crystalloid (Ringer's lactate) on lower-AKI grounds (Sankar 2023).
#   - Severe-anaemia transfusion threshold CORRECTED from "Hb ≤ 7 g/dL"
#     (a generic critical-care trigger) to the WHO Pocket Book criteria:
#     Hb < 4 g/dL, or 4–6 g/dL with a complication (respiratory distress,
#     shock, impaired consciousness, heart failure).
#   - FEAST framework, hypotension thresholds, fluid-refractory pressors,
#     stress-dose steroid, overload stop-criteria re-confirmed — unchanged.
# ============================================================

topic:
  id: "who-imci-chart7-iv-fluids-shock"
  title: "IV Fluids for Shock (no SAM)"
  list_subtitle: "IMCI Chart 7 · hypotension- & resource-stratified (FEAST)"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · FEAST / SSC peds 2026 / PALS 2025 / PRoMPT BOLUS 2026"
  tags: ["shock", "iv fluids", "bolus", "feast", "ringers lactate", "septic shock", "resuscitation", "imci", "pediatric"]
  aliases:
    - "Fluid Resuscitation"
    - "Septic Shock"
    - "FEAST"
  category: "medical"
  # Harm-warning callouts render red on this protocol (the single
  # highest-stakes ETAT chart) rather than the default amber.
  palette:
    alert: "0xFFD32F2F"
    alert_fill: "0xFFFDECEA"
    alert_text: "0xFFB71C1C"

  page_number: 13

  blocks:

    - type: "prose"
      title: "⚠ FEAST — do not bolus reflexively"
      callout: true
      markdown: |
        Rapid fluid boluses **increase mortality** in children with severe
        febrile illness (FEAST trial). **Do NOT give a bolus** to a child
        in **compensated shock** ([no hypotension](#hypotension)) where
        intensive care is not available — give **maintenance fluids** and
        reassess.

    - type: "prose"
      title: "First steps"
      highlight: true
      markdown: |
        - **Confirm the child is not severely malnourished** — shock with
          SAM uses different volume/rate →
          [Chart 8](topic:who-imci-chart8-iv-fluids-sam).
        - **Insert an IV (or IO) line** and draw blood for emergency labs.
        - Use **Ringer's lactate or normal saline** — PRoMPT BOLUS (2026,
          n≈8500) found **no outcome difference**, so either is acceptable;
          **SSC 2026 still conditionally prefers Ringer's lactate** (lower
          AKI, Sankar 2023), so use it where available.

    - type: "prose"
      title: "What counts as hypotension?"
      anchor: "hypotension"
      markdown: |
        Systolic BP below (age-specific):
        - **< 1 month:** < 60 mmHg
        - **1–12 months:** < 70 mmHg
        - **1–10 years:** < 70 + (2 × age in years) mmHg
        - **> 10 years:** < 90 mmHg

        Hypotension is a **late** sign. Without a BP, treat **cold
        extremities + capillary refill > 3 s + a weak, fast pulse** as
        decompensated shock.

    - type: "table"
      title: "Choose the fluid approach"
      columns: ["Situation", "What to do"]
      column_flex: [2, 3]
      rows:
        - cells:
            - "**Compensated** shock (no hypotension), **no ICU**"
            - "**No bolus.** Maintenance fluids only. Reassess frequently."
        - cells:
            - "**Hypotensive** (decompensated), **no ICU**"
            - "**10–20 ml/kg per bolus** (each over 30–60 min); **up to 40 ml/kg total in the first hour**. Reassess after each; repeat only if improving and no overload."
        - cells:
            - "**ICU available**"
            - "**10–20 ml/kg** aliquots, up to **40–60 ml/kg** in the first hour. Reassess after each."
        - cells:
            - "**Severe anaemia** with shock"
            - "**Blood transfusion — not a fluid bolus.**"
        - cells:
            - "**Malaria** with poor perfusion"
            - "**Extreme caution** — bolus increased mortality (FEAST **RR 1.51**)."

    - type: "table"
      title: "Bolus volume by weight (if indicated)"
      columns: ["Age (weight)", "10 ml/kg", "20 ml/kg"]
      column_flex: [3, 1, 1]
      rows:
        - cells: ["2 months (< 4 kg)", "25 ml", "50 ml"]
        - cells: ["2–< 4 months (4–< 6 kg)", "50 ml", "100 ml"]
        - cells: ["4–< 12 months (6–< 10 kg)", "75 ml", "150 ml"]
        - cells: ["1–< 3 years (10–< 14 kg)", "125 ml", "250 ml"]
        - cells: ["3–< 5 years (14–19 kg)", "175 ml", "350 ml"]

    - type: "prose"
      title: "Reassess after EVERY bolus"
      highlight: true
      markdown: |
        - **Improving?** Heart rate slows, capillary refill < 2 s, blood
          pressure rises, better consciousness, urine output, falling
          lactate → go to **Chart 11 (p.17)**.
        - **STOP boluses if fluid overload appears:** worsening
          respiratory status, **new or enlarging liver**, pulmonary
          oedema. **Crackles may be absent** even with gross oedema in
          young children.

    - type: "prose"
      title: "If shock persists (fluid-refractory)"
      markdown: |
        - Start **epinephrine or norepinephrine** — **norepinephrine may
          be preferred** in children **without** myocardial dysfunction.
        - Give it through a **peripheral IV or IO** rather than delaying
          for a central line (lower mortality; low extravasation risk).
        - Use **dopamine only if** epinephrine/norepinephrine are
          unavailable.
        - **Consider stress-dose hydrocortisone** if shock persists
          despite fluids and vasopressors, especially if **adrenal
          insufficiency** is suspected.

    - type: "prose"
      title: "⚠ Malaria & severe anaemia"
      callout: true
      markdown: |
        - **Malaria with poor perfusion:** physical signs over-estimate
          fluid need — **bolus increased mortality (RR 1.51)**. Give fluids
          with **extreme caution**.
        - **Severe anaemia:** give a **blood transfusion, not a bolus**
          — WHO thresholds: **Hb < 4 g/dL**, or **4–6 g/dL with a
          complication** (respiratory distress, shock, impaired
          consciousness, heart failure). For active bleeding, blood
          20 ml/kg.
