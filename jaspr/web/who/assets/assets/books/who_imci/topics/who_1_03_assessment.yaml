# ============================================================
# WHO IMCI 1.3 — Assessment of emergency and priority signs
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.4
# The full ABCD triage flow (incl. coma/convulsion and dehydration)
# is shown in the Triage chart (1. Triage of all sick children).
# OpenEvidence review applied (2026-06-18):
#   - Infant pulse: check BRACHIAL first (radial unreliable in infants;
#     2025 PALS).
#   - Pulse check ≤ 10 s; if no definite pulse, begin CPR (2025 PALS).
#   - Central (sternal) capillary refill more reliable than peripheral
#     in a cold environment.
#   - Hypotension is a LATE sign — do not require it for shock.
#   - Optional: blood lactate > 2 mmol/L supports occult shock (SSC).
# Refinement 2026-06-20:
#   - CRT site-specific: fingertip ≥3 s vs sternal ≥4 s abnormal (not
#     interchangeable; Fleming 2015 / Crook 2013). Cold OR dark skin →
#     central more reliable.
#   - Lactate nuance: ≥2 mmol/L raises concern (SSC 2026 strong rec to
#     measure); Phoenix score uses >5 mmol/L for CV dysfunction.
#   - Neonate: auscultate precordium for heart rate (palpation unreliable;
#     2025 NRP).
# Addition 2026-06-20: folded in p.18 quick-ref content — normal systolic
#   BP-by-age table and the AVPU conscious-level scale (per Grey).
# OpenEvidence-reviewed 2026-07:
#   - Lactate: clarified the "strong rec to measure" is from the ADULT SSC;
#     the paediatric SSC (2020) SUGGESTS measuring lactate but acknowledges
#     limited availability in low-resource settings (LMIC framing).
#   - BP table extended to 6–12 yr (reviewer cited ~97–112 mmHg; encoded
#     100–115 to keep the table's 5-mmHg rounding) — the Pocket Book covers
#     children up to 12 yr.
#   - "Dark skin → central more reliable" SOFTENED to "may be more reliable":
#     ambient cold prolonging peripheral CRT is well-evidenced (Fleming
#     2015); the dark-skin point is clinical reasoning, less documented.
# ============================================================

topic:
  id: "who-imci-1-3-assessment"
  title: "Assessment of Emergency & Priority Signs"
  list_subtitle: "1.3 · assess airway/breathing + circulation"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · 2025 PALS/NRP / SSC peds 2020/2026 / Phoenix"
  tags: ["assessment", "airway", "breathing", "circulation", "shock", "capillary refill", "imci", "pediatric"]
  aliases:
    - "Emergency Assessment"
    - "Capillary Refill"
  category: "medical"

  page_number: 4

  blocks:

    - type: "prose"
      title: "Assess airway & breathing (A, B)"
      highlight: true
      markdown: |
        - **Obstructed breathing?** Look at chest wall movement and
          listen for poor air movement. **Stridor** indicates
          obstruction.
        - **Central cyanosis?** Bluish/purplish discoloration of the
          **tongue and inside of the mouth**.
        - **Is the child breathing?** Look and listen.
        - **Severe respiratory distress?** Very laboured, fast or
          gasping breathing with
          **chest indrawing, nasal flaring, grunting**
          or use of auxiliary muscles (head nodding); the child tires
          easily and cannot feed.

    - type: "prose"
      title: "Assess circulation — for shock (C)"
      highlight: true
      markdown: |
        A child in shock needing bolus fluids is **lethargic** with
        **cold skin, prolonged capillary refill, a fast weak pulse, and hypotension** — but **hypotension is a LATE sign**, so do not wait for it.

        - **Is the hand cold?** If so, assess further for shock.
        - **Capillary refill prolonged?** Press to whiten the nail for
          **5 s**; time the return of pink colour. **Fingertip ≥ 3 s** or
          **sternal ≥ 4 s** is abnormal (the two sites are not
          interchangeable). In a **cold environment** — and possibly with
          **dark skin** — **central (sternal) refill may be more reliable**
          (ambient cold prolongs peripheral refill).
        - **Check the pulse — take ≤ 10 s:**
          - **Neonate:** **auscultate** the precordium — palpation is
            unreliable (ECG is most accurate).
          - **Infant (< 1 yr):** feel the **brachial** (or femoral) pulse
            — the radial is unreliable in infants.
          - **Child:** feel the radial; if absent, the **carotid** or
            femoral.
          - A **strong, not-fast** pulse means **not in shock**. If **no
            definite pulse** in ≤ 10 s, **begin CPR**.
        - **If available:** blood **lactate ≥ 2 mmol/L** raises concern for
          tissue hypoperfusion. (The "strong" recommendation to measure is
          from the **adult** SSC; the **paediatric** SSC only **suggests**
          measuring it and notes it may be **unavailable in low-resource
          settings**.) The **Phoenix** sepsis score uses **> 5 mmol/L** for
          cardiovascular dysfunction.
        - **Blood pressure:** check systolic BP against the **age table
          below**. Shock can occur with **normal** BP; **very low** BP
          means shock. If the room is cold, **rely on the pulse**.

    - type: "table"
      title: "Normal systolic BP by age (mmHg)"
      columns: ["Age", "Systolic (mmHg)"]
      column_flex: [3, 2]
      rows:
        - cells: ["Premature", "55–75"]
        - cells: ["0–3 months", "65–85"]
        - cells: ["3–6 months", "70–90"]
        - cells: ["6–12 months", "80–100"]
        - cells: ["1–3 years", "90–105"]
        - cells: ["3–6 years", "95–110"]
        - cells: ["6–12 years", "100–115"]

    - type: "prose"
      title: "Conscious level — AVPU"
      markdown: |
        Rouse the child by talking or gently shaking the arm:
        - **A — Alert.**
        - **V — responds to Voice** (not alert but responds = **lethargic**).
        - **P — responds to Pain** only.
        - **U — Unconscious** (no response at all).

        A child who responds **only to pain, or is unresponsive**, is in
        **coma** and needs emergency treatment. Ask the mother whether the
        child has been **abnormally sleepy or hard to wake**.

    - type: "prose"
      title: "Full triage flow"
      callout: true
      markdown: |
        - The complete **ABCD** flow — including **coma / convulsions**
          and **severe dehydration** — is laid out in the
          [Triage of all sick children](topic:who-imci-chart2-triage)
          chart (p.5).
