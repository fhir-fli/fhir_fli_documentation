# ============================================================
# WHO IMCI §3.11.2 — Infants with a birth weight < 2.0 kg (< 35 weeks'
# gestation): hypothermia (Kangaroo mother care), feeding, apnoea
# prevention. Pocket Book 2nd ed (2013), pp.58–61.
# ✅ OpenEvidence review applied (2026-07): immediate KMC (2021 iKMC /
#    2024 OMWaNA); caffeine max maintenance 10 mg/kg/day (CAP/FDA); human
#    milk fortifier for VLBW; iron extended to 6–12 months.
# ============================================================

topic:
  id: "who-imci-3-11-2-lbw-small"
  title: "LBW < 2.0 kg (< 35 wk)"
  list_subtitle: "3.11.2 · special care · KMC · feeding · apnoea"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07 (2022 WHO immediate KMC)"
