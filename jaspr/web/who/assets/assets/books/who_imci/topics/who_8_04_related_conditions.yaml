  category: "medical"

  page_number: 243

  blocks:

    - type: "prose"
      title: "Most infections — treat as usual"
      highlight: true
      markdown: |
        The treatment of most infections (pneumonia, diarrhoea, meningitis) in
        HIV-infected children is the **same as in other children**. In treatment
        failure, consider a **second-line antibiotic**. Treatment of **recurrent**
        infections is the same, regardless of the number of recurrences.

        In the **ART era** the incidence of most opportunistic infections has
        **fallen dramatically**, but **TB remains common** and needs **systematic
        screening** at every contact.

    - type: "prose"
      title: "Conditions needing specific management"
      markdown: |
        - [Tuberculosis](topic:who-imci-8-4-1-tuberculosis) — same regimen as
          uninfected children; IPT for those without active TB.
        - [Pneumocystis pneumonia (PCP)](topic:who-imci-8-4-2-pcp) — high-dose
          co-trimoxazole; suspect early.
        - [Lymphoid interstitial pneumonitis](topic:who-imci-8-4-3-lip) —
          steroids only if hypoxia/distress.
        - [Fungal infections](topic:who-imci-8-4-4-fungal) — candidiasis,
          cryptococcal meningitis.
        - [Kaposi sarcoma](topic:who-imci-8-4-5-kaposi) — nodular skin lesions,
          palatal/conjunctival involvement.
