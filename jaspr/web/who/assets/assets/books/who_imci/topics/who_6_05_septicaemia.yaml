  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        Consider septicaemia in a child with **acute fever who is severely ill
        and no other cause is found**. It can also complicate meningitis,
        pneumonia, UTI or any other bacterial infection. Common organisms:
        **Streptococcus, Haemophilus influenzae, Staphylococcus aureus**, and
        enteric Gram-negatives (**E. coli, Klebsiella** — common in severe
        malnutrition); **non-typhoidal Salmonella** in malarious areas. Where
        meningococcus is common, **petechiae or purpura** allow a clinical
        diagnosis of meningococcal septicaemia.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        The history helps find the likely source — **fully undress and examine**
        for local infection before deciding there is no other cause. Look for:
        - fever with **no obvious focus**
        - **negative** malaria film
        - **no meningitis signs** / negative LP
        - **confusion or lethargy**
        - systemic upset — inability to drink/breastfeed, convulsions, lethargy,
          vomiting everything, tachypnoea
        - **purpura** may be present.

    - type: "prose"
      title: "Investigations"
      markdown: |
        As guided by presentation: **full blood count**; **urinalysis** (urine
        culture); **blood culture**; **chest X-ray**. In severe cases the child
        may show **septic shock** — cold hands, poor perfusion, capillary refill
        > 3 s, fast weak pulse, hypotension and decreased mental status.

    - type: "prose"
      title: "Antibiotics — start immediately"
      markdown: |
        - **IV ampicillin 50 mg/kg every 6 h + IV gentamicin 7.5 mg/kg once
          daily for 7–10 days**; **or ceftriaxone 80–100 mg/kg IV once daily**
          (over 30–60 min) for 7–10 days.
        - **Staphylococcal** infection strongly suspected → **flucloxacillin
          50 mg/kg IV every 6 h + gentamicin 7.5 mg/kg once daily**.
        - **Resistance caveat:** ampicillin + gentamicin remains the WHO first
          line, but **resistance is high in many LMIC settings** — in the
          multi-country BARNARDS study it covered only **~28% of Gram-negative**
          isolates. Where local data show high ampicillin/gentamicin resistance,
          prefer **ceftriaxone** first-line, and **follow local susceptibility
          data** wherever available (add vancomycin where MRSA or
          ceftriaxone-resistant pneumococcus is prevalent).
        - Give **oxygen** if in respiratory distress or shock.

    - type: "prose"
      title: "🛑 Fluid resuscitation — differentiate by setting (FEAST)"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        Match fluid strategy to the setting and to whether the child is
        **hypotensive** — **reassess after every bolus** for responsiveness and
        overload:
        - **With intensive care available:** up to **40–60 ml/kg** in boluses
          (**10–20 ml/kg per bolus**) over the first hour.
        - **Without intensive care AND no hypotension:** **do NOT give fluid
          boluses** — start **maintenance fluids only**. In the **FEAST** trial,
          boluses in this group **increased mortality**.
        - **Without intensive care WITH hypotension:** up to **40 ml/kg** in
          boluses (10–20 ml/kg per bolus) over the first hour.

        Use **balanced crystalloids (Ringer's lactate)** over 0.9% saline where
        available.

    - type: "prose"
      title: "Fluid-refractory shock — vasoactive agents"
      markdown: |
        If shock persists despite appropriate fluids (**fluid-refractory**),
        start **epinephrine (adrenaline) or norepinephrine** — both are preferred
        over dopamine. Use **dopamine only if epinephrine and norepinephrine are
        unavailable**. Vasoactive agents may be started through a **peripheral
        IV** if central access is not yet available.

    - type: "prose"
      title: "Supportive care & monitoring"
      markdown: |
        - **High fever ≥ 39 °C** causing distress → paracetamol or ibuprofen.
        - Monitor **Hb/EVF**; if low and falling, transfuse (**20 ml/kg fresh
          whole blood or 10 ml/kg packed cells**), weighing benefit against
          bloodborne-infection risk.
        - **Guide resuscitation with perfusion trends:** where available, follow
          **blood lactate trends** (a falling lactate suggests improving
          perfusion); where lactate is unavailable, use **capillary refill time**
          plus clinical assessment (urine output, mental status, extremity
          warmth).
        - Nurse checks at least **every 3 h**, doctor at least twice daily —
          watch for **complications** (shock, cyanosis, reduced urine output,
          signs of bleeding: petechiae, purpura, venepuncture-site bleeding, skin
          ulceration).
