topic:
  id: "who-imci-6-5-septicaemia"
  title: "Septicaemia"
  list_subtitle: "6.5 · seriously ill · ampicillin + gentamicin"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["septicaemia", "sepsis", "septic shock", "ampicillin", "gentamicin", "ceftriaxone", "FEAST", "epinephrine", "pediatric"]
  aliases:
