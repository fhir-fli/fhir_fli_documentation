# ============================================================

topic:
  id: "who-imci-9-1-2-intraoperative"
  title: "Intraoperative Care"
  list_subtitle: "9.1.2 · anaesthesia · ketamine · cuffed airway"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["surgery", "anaesthesia", "ketamine", "airway", "intubation", "pediatric"]
  aliases:
    - "Intraop care"
    - "Paediatric anaesthesia"
  category: "medical"

  page_number: 258

  blocks:

    - type: "prose"
      title: "Make the procedure painless"
      highlight: true
      markdown: |
        Infants and children feel pain just like adults but may express it
        differently. **Make the procedure as painless as possible.**

    - type: "prose"
      title: "Local anaesthesia (minor procedures)"
      markdown: |
        For minor procedures in cooperative children, infiltrate a local
        anaesthetic:
        - **Lidocaine** — a conservative ceiling is **3 mg/kg**; for infiltration
          the accepted maxima are **4.5 mg/kg plain** and **7 mg/kg with
          epinephrine** (state which). Do not repeat within 2 h.
        - **Bupivacaine 0.5–2.5 mg/kg** (as 0.25% or 0.5%; max 1 ml/kg of 0.25% or
          0.5 ml/kg of 0.5% = 2.5 mg/kg).

    - type: "prose"
      title: "Ketamine (short painful procedures)"
      markdown: |
        Ketamine is an excellent anaesthetic when muscle relaxation is not needed.
        - **Induction: 5–8 mg/kg IM** or **1–2 mg/kg IV** over 60 s — ready in
          **2–3 min IV** or **3–5 min IM**.
        - **Top-up: 1–2 mg/kg IM** or **0.5–1 mg/kg IV** if the child responds to a
          painful stimulus.
        - **Longer procedures (IV infusion):** neonate — 0.5–2 mg/kg loading then
          continuous 500 µg/kg/h (up to 2 mg/kg/h); infant/child — 0.5–2 mg/kg
          loading then 0.5–2.5 mg/kg/h.

        At the end, turn the child into the **lateral position** and supervise
        recovery in a quiet place.

    - type: "prose"
      title: "Anaesthetic neurotoxicity — prolonged use"
      callout: true
      markdown: |
        **FDA warning:** NMDA-blocking / GABA-enhancing anaesthetics (including
        **ketamine**) may cause **neuronal apoptosis in the developing brain** when
        used for **> 3 hours** in children under about **3 years** (or in the third
        trimester). For brief procedures the benefit outweighs this risk — but
        avoid unnecessarily **prolonged** anaesthesia in the very young; weigh
        timing of elective surgery.

    - type: "prose"
      title: "Airway"
      markdown: |
        Children's **smaller-diameter airway** makes them especially prone to
        obstruction — they often need intubation to protect the airway. Small
        children also move heavy columns of air poorly, so **adult vaporizer units
        are unacceptable**.

    - type: "prose"
      title: "Cuffed tubes are now preferred at all ages"
      callout: true
      markdown: |
        **2025 AHA/AAP PALS: use cuffed ETTs over uncuffed** in infants and
        children — fewer tube exchanges, no increase in airway complications.
        - **Cuffed internal diameter ≈ (age ÷ 4) + 3.5** (about **0.5 mm smaller**
          than the uncuffed sizes below).
        - Keep **cuff pressure < 20 cmH₂O** and monitor it.

        The uncuffed sizes below remain a useful reference (uncuffed formula
        **(age ÷ 4) + 4**).

    - type: "table"
      title: "Table 28 · Endotracheal tube size by age (uncuffed reference)"
      columns: ["Age", "Tube size (mm)"]
      column_flex: [5, 4]
      rows:
        - cells: ["Premature infant", "2.5–3.0"]
        - cells: ["Newborn", "3.5"]
        - cells: ["1 year", "4.0"]
        - cells: ["2 years", "4.5"]
        - cells: ["2–4 years", "5.0"]
        - cells: ["5 years", "5.5"]
        - cells: ["6 years", "6"]
        - cells: ["6–8 years", "6.5"]
        - cells: ["8 years", "Cuffed 5.5"]
        - cells: ["10 years", "Cuffed 6.0"]

    - type: "prose"
      title: "Tube-size rules of thumb"
      markdown: |
        For normally nourished children **> 2 years**:
        **internal diameter (mm) = (age ÷ 4) + 4**. Another guide is the diameter
        of the child's **little finger**. Always have tubes **one size larger and
        smaller** available. An uncuffed tube should have a **small air leak**.
        Listen with a stethoscope to confirm **equal breath sounds** both sides.

    - type: "prose"
      title: "Hypothermia"
      callout: true
      markdown: |
        Small children lose heat rapidly (greater relative surface area, poor
        insulation) — hypothermia affects **drug metabolism, anaesthesia and blood
        coagulation**. Keep theatre **> 28 °C** for infants/small children and cover
        exposed parts. Standard of care now adds **active warming devices**
        (forced-air warmers, warming mattresses), **warmed IV/irrigation fluids**,
        and **continuous core-temperature monitoring** (low-reading thermometer).
        Avoid procedures > 1 h where possible.
