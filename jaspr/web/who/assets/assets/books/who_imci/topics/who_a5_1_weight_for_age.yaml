  blocks:

    - type: "prose"
      highlight: true
      markdown: |
        To read a child's **weight-for-age**, find the row for the age in
        months, then see where the weight falls across the −3 SD … 3 SD
        columns. **−2 SD** = low weight-for-age (underweight); **−3 SD**
        = very low (severely underweight). Scroll a table sideways for the
        higher-SD columns; the **Months** column stays pinned.

    - type: "prose"
      title: "Worked examples"
      markdown: |
        - Boy aged **5 months, 5.3 kg** → weight-for-age is **−3 SD**.
        - Girl aged **27 months, 6.5 kg** → **below −3 SD**.

