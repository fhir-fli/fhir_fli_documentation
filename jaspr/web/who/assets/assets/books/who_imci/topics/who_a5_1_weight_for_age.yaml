    - type: "prose"
      title: "Note"
      markdown: |
        The −2 SD and −3 SD lines here flag **underweight**. To diagnose
        **severe acute malnutrition**, use **weight-for-height / -length**
        (A5.2) — not weight-for-age. Graphical weight-for-age charts
        (Pocket Book pp.384–5) plot the −2 and −3 SD lines.
