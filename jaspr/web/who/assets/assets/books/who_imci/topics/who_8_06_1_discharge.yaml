    - "HIV discharge"
  category: "medical"

  page_number: 249

  blocks:

    - type: "prose"
      title: "Slow responders can go home"
      highlight: true
      markdown: |
        HIV-infected children may respond **slowly or incompletely** to the usual
        treatment, and may have **persistent fever, persistent diarrhoea and
        chronic cough**. If their **general condition is good**, they need not
        remain in hospital but can be **seen regularly as outpatients**.

    - type: "prose"
      title: "Before discharge"
      markdown: |
        - **Check viral load** before discharge, and again at **2–4 weeks** after
          starting or changing ART.
        - Ensure **ART supply and adherence support** are in place — a named,
          responsible **caregiver** and **linkage to outpatient HIV care**.
