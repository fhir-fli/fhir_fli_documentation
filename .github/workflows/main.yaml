name: main

on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jaspr

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: 📦 Install jaspr CLI
        run: dart pub global activate jaspr_cli
        working-directory: .

      - name: 📦 Install Dependencies
        run: dart pub get

      - name: ✨ Check Format
        run: dart format --output=none --set-exit-if-changed .

      - name: 🧹 Analyze
        run: dart analyze

      - name: 👷 Build website
        run: $HOME/.pub-cache/bin/jaspr build
