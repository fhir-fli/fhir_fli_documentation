# ============================================================================
# WHO IMCI Annex 2 — Drug formulary (Pocket Book 2nd ed 2013, pp.353–373).
# A reusable "formulary" collection: records + facets (A–Z / class / indication).
# Rendered by the drug-index view; each record's doses reuse the weight-band table.
# Every dose verified against the source page renders (RULE #0).
# ============================================================================
formulary:
  id: "who-imci-a2-formulary"
  title: "Drug dosages"
  subtitle: "Annex 2 · practical drug doses"
  source: "WHO Pocket Book of Hospital Care for Children, 2nd ed (2013), pp.353–373"
  # main weight-band axis (most drugs)
  bands:
    label: "Dose by body weight (kg)"
    columns: ["3–<6", "6–<10", "10–<15", "15–<20", "20–29"]
  # antiretroviral / surface-area axis (6 bands, morning & evening)
  bands_art:
    label: "Dose by surface area or body weight (kg) — morning & evening"
    columns: ["3–5.9", "6–9.9", "10–13.9", "14–19.9", "20–24.9", "25–34.9"]
  # toggle lenses
  facets:
    - { key: "alpha",      label: "A–Z",           mode: "alpha", tap: "detail" }
    - { key: "class",      label: "By class",      mode: "group", field: "class",       tap: "detail" }
    - { key: "indication", label: "By indication", mode: "group", field: "indications", tap: "expand" }
  # class display labels (also defines group order)
  classes:
    - { key: "antibiotic", label: "Antibiotics" }
    - { key: "antimalarial", label: "Antimalarials" }
    - { key: "antituberculosis", label: "Antituberculosis" }
    - { key: "antiretroviral", label: "Antiretrovirals" }
    - { key: "anticonvulsant_sedation", label: "Anticonvulsants & sedation" }
    - { key: "analgesia", label: "Analgesia" }
    - { key: "cardiac", label: "Cardiac / inotropes" }
    - { key: "fluid_electrolyte", label: "Fluids & electrolytes" }
    - { key: "other", label: "Other" }
  # indication display labels
  indications:
    - { key: "pneumonia", label: "Pneumonia" }
    - { key: "oesophageal candidiasis", label: "Oesophageal candidiasis" }
    - { key: "sepsis", label: "Sepsis" }
    - { key: "severe pneumonia", label: "Severe pneumonia" }
    - { key: "meningitis", label: "Meningitis" }
    - { key: "skin infection", label: "Skin infection" }
    - { key: "hypokalaemia", label: "Hypokalaemia" }
    - { key: "wheeze", label: "Wheeze" }
    - { key: "severe malaria", label: "Severe malaria" }
    - { key: "hiv", label: "HIV" }
    - { key: "anaphylaxis", label: "Anaphylaxis" }
    - { key: "croup", label: "Croup" }
    - { key: "malaria", label: "Malaria" }
    - { key: "fever", label: "Fever" }
    - { key: "pain", label: "Pain" }
    - { key: "cholera", label: "Cholera" }
    - { key: "dysentery", label: "Dysentery" }
    - { key: "diarrhoea", label: "Diarrhoea" }
    - { key: "staphylococcal infection", label: "Staphylococcal infection" }
    - { key: "abscess", label: "Abscess" }
    - { key: "iron poisoning", label: "Iron poisoning" }
    - { key: "convulsions", label: "Convulsions" }
    - { key: "sedation", label: "Sedation" }
    - { key: "heart failure", label: "Heart failure" }
    - { key: "shock", label: "Shock" }
    - { key: "pertussis", label: "Pertussis" }
    - { key: "candidiasis", label: "Candidiasis" }
    - { key: "cryptococcal meningitis", label: "Cryptococcal meningitis" }
    - { key: "giardiasis", label: "Giardiasis" }
    - { key: "neonatal sepsis", label: "Neonatal sepsis" }
    - { key: "thrush", label: "Thrush" }
    - { key: "anaemia", label: "Anaemia" }
    - { key: "anaesthesia", label: "Anaesthesia" }
    - { key: "intestinal worms", label: "Intestinal worms" }
    - { key: "nausea and vomiting", label: "Nausea & vomiting" }
    - { key: "amoebiasis", label: "Amoebiasis" }
    - { key: "rheumatic fever", label: "Rheumatic fever" }
    - { key: "syphilis", label: "Syphilis" }
    - { key: "burns", label: "Burns" }
    - { key: "neonatal ophthalmia", label: "Neonatal ophthalmia" }
    - { key: "measles", label: "Measles" }
    - { key: "vitamin A deficiency", label: "Vitamin A deficiency" }
    - { key: "tuberculosis", label: "Tuberculosis" }
  drugs:
    - id: "amoxicillin"
      name: "Amoxicillin"
      class: "antibiotic"
      subtitle: "penicillin"
      indications: ["pneumonia"]
      page: 356
      doses:
      - label: "Standard"
        regimen: "Oral: 25 mg/kg twice a day"
        form: "250 mg tablet (chewable or dispersible)"
        bands: ["½", "1", "1½", "2", "2½"]
      - label: "Standard — syrup"
        regimen: "Oral: 25 mg/kg twice a day"
        form: "Syrup (250 mg/5 ml)"
        bands: ["2.5 ml", "5 ml", "7.5 ml", "10 ml", "—"]
      notes: "For pneumonia give the higher dose of 40 mg/kg per dose twice a day (80 mg/kg/day) — double the volumes above. This is now the standard dose for chest-indrawing pneumonia."
    - id: "amphotericin-b"
      name: "Amphotericin B"
      class: "antibiotic"
      subtitle: "antifungal"
      indications: ["oesophageal candidiasis"]
      page: 356
      doses:
      - label: "Oesophageal candidiasis"
        regimen: "0.25 mg/kg/day increasing to 1 mg/kg/day as tolerated, IV infusion over 6 h/day for 10–14 days"
        form: "50 mg vial"
        bands: ["—", "2–8 mg", "3–12 mg", "4.5–18 mg", "6–24 mg"]
    - id: "ampicillin"
      name: "Ampicillin"
      class: "antibiotic"
      subtitle: "penicillin"
      indications: ["sepsis", "severe pneumonia", "meningitis"]
      page: 356
      doses:
      - label: "Standard"
        regimen: "IM/IV: 50 mg/kg every 6 h"
        form: "Vial of 500 mg + 2.1 ml sterile water → 500 mg/2.5 ml"
        bands: ["1 ml", "2 ml", "3 ml", "5 ml", "6 ml"]
      notes: "Oral doses are for mild disease and must be 2–4× higher if a course of injectable ampicillin is required for severe disease. Neonatal/premature dosing: see p.69."
    - id: "cefotaxime"
      name: "Cefotaxime"
      class: "antibiotic"
      subtitle: "cephalosporin"
      indications: ["sepsis", "meningitis"]
      page: 358
      doses:
      - label: "Standard"
        regimen: "IV: 50 mg/kg every 6 h"
        form: "Vial of 500 mg + 2 ml (or 1 g + 4 ml, or 2 g + 8 ml) sterile water"
        bands: ["0.8 ml", "1.5 ml", "2.5 ml", "3.5 ml", "5 ml"]
      notes: "Neonatal/premature dosing & intervals: see p.70."
    - id: "ceftriaxone"
      name: "Ceftriaxone"
      class: "antibiotic"
      subtitle: "cephalosporin"
      indications: ["meningitis", "sepsis"]
      page: 358
      doses:
      - label: "Standard"
        regimen: "IM/IV: 80 mg/kg once daily, over 30 min as infusion or 3 min as IV injection"
        form: "Vial of 1 g + 9.6 ml sterile water → 1 g/10 ml (or 2 g + 19 ml → 2 g/20 ml)"
        bands: ["3 ml", "6 ml", "10 ml", "14 ml", "20 ml"]
      - label: "Meningitis"
        indication: "meningitis"
        regimen: "IM/IV: 50 mg/kg every 12 h (max single dose 4 g)"
        bands: ["2 ml", "4 ml", "6 ml", "9 ml", "12.5 ml"]
      - label: "Meningitis — alt"
        indication: "meningitis"
        regimen: "or IM/IV: 100 mg/kg"
        bands: ["4 ml", "8 ml", "12 ml", "18 ml", "25 ml"]
      notes: "Neonatal/premature dosing & intervals: see p.70."
    - id: "cefalexin"
      name: "Cefalexin"
      class: "antibiotic"
      subtitle: "cephalosporin"
      indications: ["skin infection"]
      page: 358
      doses:
      - label: "Standard"
        regimen: "Oral: 12.5 mg/kg four times a day (or 25 mg/kg twice a day — same total — to aid adherence)"
        form: "250 mg tablet"
        bands: ["¼", "½", "¾", "1", "1¼"]
      notes: "Total 50 mg/kg/day; for severe skin/soft-tissue infection increase to 100 mg/kg/day. Duration 7–14 days. Cloxacillin or flucloxacillin is preferred for severe staphylococcal infection; cefalexin is an oral step-down or mild-infection option."
    - id: "potassium-chloride"
      name: "Potassium chloride"
      class: "fluid_electrolyte"
      indications: ["hypokalaemia"]
      page: 368
      doses:
      - label: "Standard"
        regimen: "Oral: 2–4 mmol/kg per day"
        form: "—"
        bands: ["calc", "calc", "calc", "calc", "calc"]
      notes: "Calculate the exact dose by body weight."
    - id: "prednisolone"
      name: "Prednisolone"
      class: "other"
      subtitle: "corticosteroid"
      indications: ["wheeze", "croup"]
      page: 368
      doses:
      - label: "Standard (acute wheeze)"
        regimen: "Oral: 1 mg/kg per dose (total 1–2 mg/kg/day, max 40 mg) for 3–5 days"
        form: "5-mg tablet"
        bands: ["1", "1", "2", "3", "5"]
      notes: "Acute wheeze/asthma: 1–2 mg/kg/day for 3–5 days, no taper needed. Croup: 1 mg/kg as a single dose (alternative when dexamethasone 0.6 mg/kg, the preferred agent, is unavailable). Nephrotic syndrome uses a longer high-dose specialist regimen. 1 mg prednisolone ≡ 5 mg hydrocortisone ≡ 0.15 mg dexamethasone."
    - id: "quinine"
      name: "Quinine"
      class: "antimalarial"
      indications: ["severe malaria"]
      page: 368
      doses:
      - label: "IV loading"
        regimen: "IV: 20 mg salt/kg over 2–4 h, diluted in 10 ml/kg IV fluid"
        form: "Quinine dihydrochloride 150 mg/ml (2-ml ampoules)"
        bands: ["0.3 ml", "0.6 ml", "1 ml", "1.2 ml", "2 ml"]
      - label: "IV maintenance"
        regimen: "IV: 10 mg salt/kg over 2 h, diluted in 10 ml/kg IV fluid"
        form: "Quinine dihydrochloride 300 mg/ml (2-ml ampoules)"
        bands: ["0.2 ml", "0.3 ml", "0.5 ml", "0.6 ml", "1 ml"]
      - label: "IM (if no IV)"
        regimen: "IM: same dosage as IV, if IV infusion not possible"
        form: "Quinine dihydrochloride diluted in normal saline to 60 mg salt/ml"
        bands: ["1 ml", "1.5 ml", "2.5 ml", "3 ml", "5 ml"]
      - label: "Oral (200-mg tab)"
        regimen: "Oral (follow-on)"
        form: "Quinine sulfate 200-mg tablet"
        bands: ["¼", "½", "¾", "1", "1½"]
      - label: "Oral (300-mg tab)"
        regimen: "Oral (follow-on)"
        form: "Quinine sulfate 300-mg tablet"
        bands: ["—", "—", "½", "½", "1"]
      notes: "Intravenous artesunate is now the preferred treatment for severe malaria; quinine is the alternative where artesunate is unavailable (see Chapter 6). Doses expressed as mg of quinine dihydrochloride salt. Loading dose is DOUBLE the maintenance dose. Infusion must not exceed 5 mg salt/kg per hour. At 8 h after the loading dose, give the maintenance dose over 2 h, repeated every 8 h; switch to a full oral ACT course when the child can swallow."
    - id: "adrenaline"
      name: "Adrenaline"
      class: "cardiac"
      subtitle: "sympathomimetic"
      indications: ["anaphylaxis", "croup", "wheeze"]
      page: 355
      doses:
      - label: "Wheeze (bronchodilator)"
        indication: "wheeze"
        regimen: "0.01 ml/kg (max 0.3 ml) of 1:1000 solution SC (or 0.1 ml/kg of 1:10 000), via 1-ml syringe"
        form: "1:1000 solution"
        bands: ["calc", "calc", "calc", "calc", "calc"]
      - label: "Severe viral croup (nebulized)"
        indication: "croup"
        regimen: "0.5 ml/kg of 1:1000 solution, nebulized (max dose 5 ml)"
        form: "1:1000 solution"
        bands: ["—", "3 ml", "5 ml", "5 ml", "5 ml"]
      - label: "Anaphylaxis"
        indication: "anaphylaxis"
        regimen: "0.15 ml of 1:1000 solution IM (0.3 ml for children >6 years)"
        form: "1:1000 solution"
        bands: ["fixed", "fixed", "fixed", "fixed", "fixed"]
      notes: "Make up a 1:10 000 solution by adding 1 ml of 1:1000 solution to 9 ml of normal saline or 5% glucose."
    - id: "aminophylline"
      name: "Aminophylline"
      class: "other"
      subtitle: "xanthine bronchodilator"
      indications: ["wheeze"]
      page: 355
      doses:
      - label: "Asthma — oral (100 mg tab)"
        indication: "wheeze"
        regimen: "Oral: 6 mg/kg"
        form: "Tablet: 100 mg"
        bands: ["¼", "½", "¾", "1", "1½"]
      - label: "Asthma — oral (200 mg tab)"
        indication: "wheeze"
        regimen: "Oral: 6 mg/kg"
        form: "Tablet: 200 mg"
        bands: ["—", "¼", "½", "½", "¾"]
      - label: "IV loading"
        indication: "wheeze"
        regimen: "IV: 5–6 mg/kg (max 300 mg) slowly over 20–60 min"
        form: "250 mg/10-ml vial"
        bands: ["1 ml", "1.5 ml", "2.5 ml", "3.5 ml", "5 ml"]
      - label: "IV maintenance"
        indication: "wheeze"
        regimen: "IV: 5 mg/kg up to every 6 h, or continuous infusion 0.9 mg/kg/h"
        form: "250 mg/10-ml vial"
        bands: ["1 ml", "1.5 ml", "2.5 ml", "3.5 ml", "5 ml"]
      notes: "Give IV loading dose only if the child has NOT taken aminophylline or theophylline within 24 h. For apnoea dosing in neonates/premature infants, see p.69."
    - id: "artemether"
      name: "Artemether"
      class: "antimalarial"
      indications: ["severe malaria"]
      page: 357
      doses:
      - label: "Loading (40 mg/ml)"
        regimen: "IM: 3.2 mg/kg (loading dose)"
        form: "40 mg/1-ml ampoule"
        bands: ["0.4 ml", "0.8 ml", "1.2 ml", "1.6 ml", "2.4 ml"]
      - label: "Loading (80 mg/ml)"
        regimen: "IM: 3.2 mg/kg (loading dose)"
        form: "80 mg/1-ml ampoule"
        bands: ["0.2 ml", "0.4 ml", "0.6 ml", "0.8 ml", "1.2 ml"]
      - label: "Maintenance (40 mg/ml)"
        regimen: "IM: 1.6 mg/kg daily"
        form: "40 mg/1-ml ampoule"
        bands: ["0.2 ml", "0.4 ml", "0.6 ml", "0.8 ml", "1.2 ml"]
      - label: "Maintenance (80 mg/ml)"
        regimen: "IM: 1.6 mg/kg daily"
        form: "80 mg/1-ml ampoule"
        bands: ["0.1 ml", "0.2 ml", "0.3 ml", "0.4 ml", "0.6 ml"]
      notes: "Second-line alternative to IV/IM artesunate for severe malaria (artesunate is preferred; see Chapter 6). Give the maintenance dose daily for a minimum of 24 h until the patient can take oral artemisinin-based combination therapy (ACT)."
    - id: "artemether-lumefantrine"
      name: "Artemether/lumefantrine"
      class: "antimalarial"
      indications: ["malaria"]
      page: 357
      doses:
      - label: "Standard"
        regimen: "Oral: 2 mg/kg artemether + 12 mg/kg lumefantrine twice per day"
        form: "Tablet: 20 mg artemether / 120 mg lumefantrine"
        bands: ["1", "1", "1", "2", "2"]
    - id: "artesunate"
      name: "Artesunate"
      class: "antimalarial"
      indications: ["severe malaria"]
      page: 357
      doses:
      - label: "Standard"
        regimen: "IV or IM at 0, 12 and 24 h, then once daily until able to take orally: 3 mg/kg per dose for children under 20 kg; 2.4 mg/kg for 20 kg and over"
        form: "60 mg vial reconstituted to 15 mg/ml (dissolve in 0.6 ml 5% bicarbonate, dilute with 3.4 ml saline or 5% glucose)"
        bands: ["0.9 ml", "1.6 ml", "2.5 ml", "3.5 ml", "3.9 ml"]
      notes: "Artesunate is the first-line treatment for severe malaria (all species); quinine and IM artemether are alternatives only when it is unavailable. Volumes assume 15 mg/ml and the band midpoint — dose by actual body weight where possible. Prepare just before use; when the child can swallow, complete a full 3-day oral ACT course."
    - id: "artesunate-mefloquine"
      name: "Artesunate–mefloquine"
      class: "antimalarial"
      indications: ["malaria"]
      page: 357
      doses:
      - label: "Standard"
        regimen: "Oral: 4 mg/kg artesunate + 8.3 mg/kg mefloquine once a day"
        form: "Tablet: 25 mg artesunate / 55 mg mefloquine"
        bands: ["—", "¼", "½", "¾", "1"]
      notes: "Not recommended for children <5 months of age owing to limited information."
    - id: "aspirin"
      name: "Aspirin"
      class: "analgesia"
      indications: []
      page: 357
      doses:
      - label: "Standard"
        regimen: "Oral: 10–20 mg/kg every 4–6 h"
        form: "300 mg tablet"
        bands: ["—", "¼", "½", "¾", "1"]
      notes: "Not recommended for fever or pain in children — risk of Reye syndrome; use paracetamol or ibuprofen instead. Aspirin is retained only for specific indications such as acute rheumatic fever and Kawasaki disease, which use higher anti-inflammatory doses than the antipyretic dose shown here (see Chapter 6, rheumatic fever)."
    - id: "chloramphenicol"
      name: "Chloramphenicol"
      class: "antibiotic"
      indications: ["meningitis", "cholera", "sepsis"]
      page: 359
      doses:
      - label: "Meningitis"
        indication: "meningitis"
        regimen: "IV: 25 mg/kg every 6 h (max 1 g/dose). Calculate exact dose by weight where possible."
        form: "Vial of 1 g + 9.2 ml sterile water → 1 g/10 ml"
        bands: ["0.75–1.25 ml", "1.5–2.25 ml", "2.5–3.5 ml", "3.75–4.75 ml", "5–7.25 ml"]
      - label: "Cholera"
        indication: "cholera"
        regimen: "IM: 20 mg/kg every 6 h for 3 days"
        form: "Vial of 1 g + 3.2 ml sterile water → 1 g/4 ml"
        bands: ["0.3–0.5 ml", "0.6–0.9 ml", "1–1.4 ml", "1.5–1.9 ml", "2–2.9 ml"]
      - label: "Other — oral suspension"
        indication: "sepsis"
        regimen: "Oral: 25 mg/kg every 8 h (max 1 g/dose)"
        form: "125 mg/5 ml suspension (palmitate)"
        bands: ["3–5 ml", "6–9 ml", "10–14 ml", "15–19 ml", "—"]
      - label: "Other — capsule"
        indication: "sepsis"
        regimen: "Oral: 25 mg/kg every 8 h (max 1 g/dose)"
        form: "250 mg capsule"
        bands: ["—", "—", "1", "1½", "2"]
      notes: "A WHO AWaRe 'Watch' antibiotic — where ceftriaxone is available it is preferred for meningitis and sepsis; chloramphenicol is a second-line option when cephalosporins are unavailable. Phenobarbital reduces, and phenytoin increases, chloramphenicol levels when given together."
    - id: "chloramphenicol-oily"
      name: "Chloramphenicol, oily"
      class: "antibiotic"
      indications: ["meningitis"]
      page: 359
      doses:
      - label: "Meningococcal epidemic"
        indication: "meningitis"
        regimen: "IM: 100 mg/kg single dose (max 3 g)"
        form: "Vial of 0.5 g in 2 ml"
        bands: ["1.2–2 ml", "2.4–3.6 ml", "4–5.6 ml", "6–7.6 ml", "8–11.6 ml"]
    - id: "chlorphenamine"
      name: "Chlorphenamine"
      class: "other"
      subtitle: "antihistamine"
      indications: ["anaphylaxis"]
      page: 359
      doses:
      - label: "Injection"
        regimen: "IM/IV/SC: 0.25 mg/kg once (may repeat up to 4× in 24 h)"
        form: "10 mg in 1 ml"
        bands: ["0.1 ml", "0.2 ml", "0.3 ml", "0.5 ml", "0.6 ml"]
      - label: "Oral"
        regimen: "Oral: two or three times daily"
        form: "Tablet: 4 mg"
        bands: ["—", "—", "—", "—", "½"]
    - id: "ciprofloxacin"
      name: "Ciprofloxacin"
      class: "antibiotic"
      subtitle: "fluoroquinolone"
      indications: ["dysentery", "cholera"]
      page: 360
      doses:
      - label: "100 mg tablet"
        regimen: "Oral: 10–20 mg/kg per dose twice a day for 5 days (max 500 mg/dose)"
        form: "100 mg tablet"
        bands: ["½", "1", "1½", "2", "3"]
      - label: "250 mg tablet"
        regimen: "Oral: 10–20 mg/kg per dose twice a day for 5 days (max 500 mg/dose)"
        form: "250 mg tablet"
        bands: ["¼", "½", "½", "1", "1½"]
    - id: "cloxacillin"
      name: "Cloxacillin (or flucloxacillin/oxacillin)"
      class: "antibiotic"
      subtitle: "penicillin (anti-staphylococcal)"
      indications: ["staphylococcal infection", "abscess"]
      page: 360
      doses:
      - label: "IV"
        regimen: "IV: 25–50 mg/kg every 6 h  [(n) = dose at 50 mg/kg]"
        form: "Vial of 500 mg + sterile water → 500 mg/10 ml"
        bands: ["2–(4) ml", "4–(8) ml", "6–(12) ml", "8–(16) ml", "12–(24) ml"]
      - label: "IM"
        regimen: "IM: 25–50 mg/kg every 6 h"
        form: "Vial of 250 mg + 1.3 ml sterile water → 250 mg/1.5 ml"
        bands: ["0.6–(1.2) ml", "1–(2) ml", "1.8–(3.6) ml", "2.5–(5) ml", "3.75–(7.5) ml"]
      - label: "Oral"
        regimen: "Oral: 25–50 mg/kg every 6 h"
        form: "250 mg capsule"
        bands: ["½–(1)", "1–(2)", "1–(2)", "2–(3)", "2–(4)"]
      - label: "Abscesses"
        indication: "abscess"
        regimen: "Oral: 15 mg/kg every 6 h (treating abscesses)"
        form: "250 mg capsule"
        bands: ["¼", "½", "1", "1½", "2½"]
      notes: "Neonatal/premature dosing & intervals: see p.70."
    - id: "co-trimoxazole"
      name: "Co-trimoxazole (trimethoprim–sulfamethoxazole)"
      class: "antibiotic"
      indications: ["pneumonia", "hiv"]
      page: 360
      doses:
      - label: "Adult tablet"
        regimen: "Oral: 4 mg/kg TMP + 20 mg/kg SMX twice a day"
        form: "Adult tablet (80 mg TMP + 400 mg SMX)"
        bands: ["¼", "½", "1", "1", "1"]
      - label: "Paediatric tablet"
        regimen: "Oral: 4 mg/kg TMP + 20 mg/kg SMX twice a day"
        form: "Paediatric tablet (20 mg TMP + 100 mg SMX)"
        bands: ["1", "2", "3", "3", "4"]
      - label: "Syrup"
        regimen: "Oral: 4 mg/kg TMP + 20 mg/kg SMX twice a day"
        form: "Syrup (40 mg TMP + 200 mg SMX per 5 ml)"
        bands: ["2 ml", "3.5 ml", "6 ml", "8.5 ml", "—"]
      notes: "For interstitial pneumonia (PCP) in HIV: 8 mg/kg TMP + 40 mg/kg SMX three times a day for 21 days. HIV co-trimoxazole PROPHYLAXIS (all HIV-exposed and HIV-infected children) is a lower single daily dose by weight band — see Chapter 8. Infant <1 month: ½ paediatric tablet or 1.25 ml syrup twice a day. Avoid in premature or jaundiced neonates."
    - id: "deferoxamine"
      name: "Deferoxamine"
      class: "other"
      subtitle: "chelating agent"
      indications: ["iron poisoning"]
      page: 361
      doses:
      - label: "Standard"
        regimen: "IV: 15 mg/kg/h to max 80 mg/kg in 24 h; or IM: 50 mg/kg every 6 h (max 6 g/day)"
        form: "500-mg ampoule"
        bands: ["2", "2", "2", "2", "2"]
    - id: "dexamethasone"
      name: "Dexamethasone"
      class: "other"
      subtitle: "corticosteroid"
      indications: ["croup", "meningitis"]
      page: 361
      doses:
      - label: "Severe viral croup"
        indication: "croup"
