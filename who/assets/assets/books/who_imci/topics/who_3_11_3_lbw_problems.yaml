  blocks:

    - type: "prose"
      title: "Respiratory distress syndrome"
      highlight: true
      markdown: |
        Preterm infants are at risk of RDS from **surfactant deficiency**. Risk
        is reduced by **antenatal corticosteroids** for a mother at risk of
        premature delivery — **betamethasone 12 mg IM every 24 h × 2 doses**
        (preferred), **or dexamethasone 6 mg IM every 12 h × 4 doses**. RDS
        usually occurs
        in the **first 3 days** and is self-limiting (birth triggers surfactant
        production) — support the infant until the deficiency resolves. Features
        are usually obvious within **4 h** of birth:
        - **tachypnoea**
        - an **expiratory grunt**
        - **intercostal / subcostal recession**
        - **cyanosis**

    - type: "prose"
      title: "RDS — treatment"
      markdown: |
        - **Minimal handling** of the infant.
        - **Supplementary oxygen** if needed to keep **SpO₂ 90–95%** (alarm
          limits 89% / 95% — avoid hypoxia and the eye damage of hyperoxia).
        - **Initially no oral feeding**; give **IV fluids**.
        - Maintain a **normal temperature**.
        - **IV antibiotics** for neonatal sepsis (pneumonia is hard to exclude
          as a cause).
        - **CPAP** — used even in expiration to prevent airway collapse, improve
          oxygenation and reduce breathing fatigue (§10.7).
        - **Surfactant**, if available, improves outcomes — give it by the
          **LISA technique** (a thin catheter, or an **8F feeding tube** where
          specialised catheters are unavailable) during **spontaneous breathing
          on CPAP**, avoiding intubation.
        - If respiratory distress or hypoxaemia persists, do a **chest X-ray**
          to check for pneumothorax.

    - type: "prose"
      title: "Necrotizing enterocolitis"
      markdown: |
        A **bowel infection** that may occur in low-birth-weight infants,
        especially **after enteral feeds** are started — commoner in
        formula-fed infants but possible in breastfed ones. **Prevention:**
        breast milk over formula, and — where **pharmaceutical-grade**
        products are available — **multiple-strain probiotics**, which reduce
        severe NEC and mortality in preterm infants (high-certainty evidence).

        **Signs:**
        - **abdominal distension or tenderness**
        - **intolerance to feeding**
        - **bile-stained vomit** or bile-stained fluid up the nasogastric tube
        - **blood in the stools**

        **Systemic signs:** apnoea, drowsiness or unconsciousness, fever or
        hypothermia.

    - type: "prose"
      title: "NEC — treatment"
      markdown: |
        - **Stop enteral feeding.**
        - Pass a **nasogastric tube** and leave it on **free drainage**.
        - Start an **IV glucose–saline infusion**
          ([§3.10](topic:who-imci-3-10-supportive-care) for the rate).
        - Start antibiotics: **ampicillin (or penicillin) + gentamicin +
          metronidazole for 10 days**.
        - If apnoea occurs, give **oxygen by nasal catheter**; if it continues,
          give **aminophylline or caffeine IV**
          ([§3.11.2](topic:who-imci-3-11-2-lbw-small)).
        - If the infant is **pale, check the Hb and transfuse if Hb < 10 g/dl**.
        - Take a **supine and lateral decubitus abdominal X-ray** — gas outside
          the bowel suggests **perforation** → ask a surgeon to see the infant
          **urgently**.
        - Examine the infant daily; reintroduce EBM by nasogastric tube when the
          abdomen is soft and non-tender, normal stools (no blood) are passing
          and there is no bilious vomiting. Start slowly, increasing **1–2 ml
          per feed per day**.
