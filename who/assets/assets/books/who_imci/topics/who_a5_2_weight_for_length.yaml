  blocks:

    - type: "prose"
      highlight: true
      markdown: |
        **Weight-for-height / -length diagnoses acute malnutrition.** Find
        the row for the child's length, then see where the weight falls
        across the −3 SD … 3 SD columns. **−3 SD = severe acute
        malnutrition** (SAM); **−2 to −3 SD = moderate**. Use **length**
        (recumbent) for a child **< 85 cm** and **height** (standing) for
        **≥ 85 cm** — see the weight-for-height table (2–5 y) for taller
        children.

    - type: "prose"
      title: "Reading the tables"
      markdown: |
        - Recumbent **length** averages **0.5 cm more** than standing
          height; if only length is available for a child ≥ 85 cm,
          **subtract 0.5 cm**.
        - As a rough guide, **−1 SD ≈ 90%** and **−2 SD ≈ 80%** of the
          median weight.
        - The **length/height** column stays pinned; scroll sideways for
          the higher-SD columns.

    - type: "prose"
      title: "Worked examples"
      markdown: |
        - Boy: **length 61 cm, 5.3 kg** → weight-for-length is **−2 SD**.
        - Girl: **length 67 cm, 4.3 kg** → **below −3 SD** (SAM).

