  blocks:

    - type: "prose"
      title: "Assess depth and extent"
      highlight: true
      markdown: |
        Burns and scalds carry high mortality and can cause lifelong disfigurement
        and psychological trauma. **How deep?**
        - **Superficial (1st degree):** red, dry, painful; no blisters.
        - **Superficial partial-thickness (2nd):** pink, moist, blistering,
          **very painful** — heals spontaneously.
        - **Deep partial-thickness (2nd):** blotchy red/white, less sensate —
          often needs **excision and grafting**.
        - **Full-thickness (3rd):** black or white, dry, leathery, **no sensation**,
          does **not blanch** — will not regenerate.

        **How much?** Use the age-adjusted body-surface-area (Lund–Browder) chart
        — the Rule of Nines is inaccurate in children (big head, small legs). The
        child's **palm ≈ 1%** of total BSA.

    - type: "prose"
      title: "% BSA — the age-varying areas"
      markdown: |
        Add fixed regions (each arm segment ~1–2%, trunk 13% front / 13% back) plus
        the **age-varying** head and lower-limb areas:

    - type: "table"
      title: "Body surface (%) by age"
      columns: ["Area", "0 yr", "1 yr", "5 yr", "10 yr"]
      column_flex: [5, 3, 3, 3, 3]
      rows:
        - cells: ["Head (A/D)", "10%", "9%", "7%", "6%"]
        - cells: ["Thigh (B/E)", "3%", "3%", "4%", "5%"]
        - cells: ["Leg (C/F)", "2%", "3%", "3%", "3%"]

    - type: "prose"
      title: "Who to admit"
      callout: true
      markdown: |
        Admit all children with burns covering **> 10% of body surface**; those
        involving the **face, hands, feet, perineum and joints**; those that are
        **circumferential**; and those that cannot be managed as an outpatient.
        Consider **inhalation injury** — if respiratory distress, give oxygen and
        watch the airway; inform the anaesthetist about possible airway obstruction
        (severe facial/inhalation burns may need early intubation or tracheostomy).

    - type: "prose"
      title: "Fluid resuscitation — titrate to urine output"
      callout: true
      markdown: |
        Formal IV resuscitation is for **larger burns** (ABA: **≥ 20% TBSA**; the
        ≥ 10% figure is an admission — not necessarily a fluid — threshold). Use a
        **balanced isotonic crystalloid — Ringer's lactate** (add 5% glucose in
        young children; **do not use hypotonic fluids**).
        - **Parkland: 4 ml/kg × %TBSA** over the first 24 h — **half in the first
          8 h**, rest over 16 h. (Modified Brooke uses 2 ml/kg × %TBSA.) In young
          children, **add** maintenance fluid on top.
        - The formula gives only a **starting rate** — **titrate to urine output**
          (target **1–1.5 ml/kg/h**), not a fixed volume.

    - type: "prose"
      title: "Beware fluid creep"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        **Over-resuscitation ("fluid creep") is a major hazard** — it causes
        **pulmonary oedema, compartment syndrome, and conversion of burns to
        deeper wounds**. Reduce the rate as urine output allows; blood may be given
        for anaemia or deep burns. **Second 24 h:** half to three-quarters of
        day-1's volume.

    - type: "prose"
      title: "Prevent and treat infection"
      markdown: |
        In all cases give **tetanus prophylaxis**. Clean intact skin with
        antiseptic without breaking it; if not intact, **debride** and excise
        necrotic tissue over the first few days.

        **Topicals** (superficial / superficial partial-thickness): **honey** is
        an excellent, evidence-based and **widely available LMIC-appropriate**
        choice, as is **antimicrobial ointment (bacitracin, mupirocin)**. Newer
        **silver-impregnated foam dressings** reduce painful changes but are
        **expensive and often unavailable** — use where you have them. **Silver
        sulfadiazine** delays healing slightly (keratinocyte/fibroblast toxicity)
        so it is **no longer preferred where alternatives exist**, but it remains
        on the **WHO Essential Medicines List** and is often the **most practical
        option available** — it is entirely reasonable when honey or ointments are
        not to hand. Small/awkward burns may be left open, clean and dry.

        **Do NOT give systemic antibiotic prophylaxis** — it selects resistant
        organisms. Treat only established infection: **local** (pus, foul odour,
        cellulitis) → **amoxicillin 15 mg/kg orally 3× daily + cloxacillin 25 mg/kg
        orally 4× daily**; **septicaemia** → **gentamicin 7.5 mg/kg once daily +
        cloxacillin 25–50 mg/kg IM/IV 4× daily**. Remove an eschar if infection is
        suspected beneath it.

    - type: "prose"
      title: "Pain, nutrition, contractures"
      markdown: |
        - **Pain (multimodal):** paracetamol 10–15 mg/kg every 6 h **+ ibuprofen**;
          if severe, **morphine sulfate 0.05–0.1 mg/kg IV every 4 h**. For
          **dressing changes** use dedicated **procedural analgesia** (e.g.
          intranasal fentanyl, or ketamine for major changes).
        - **Nutrition:** feed within 24 h; high-calorie diet with protein, vitamins
          and iron (omit iron initially in severe burns). Extensive burns need
          ~1.5× calories and 2–3× protein.
        - **Contractures:** burn scars across flexor surfaces contract. Prevent by
          **passive mobilization** and **splinting flexor surfaces extended** (worn
          at night). Begin **physiotherapy/rehabilitation early** and encourage
          play.
