# ============================================================
# WHO IMCI §9.3.1 — Burns (BSA chart + fluid resuscitation). Pocket
# Book 2nd ed (2013), pp.269–272.
# ⚠️ OpenEvidence-reviewed 2026-07: burn-depth granularity (superficial vs
# deep partial-thickness); clarified Parkland (no separate maintenance) with
# URINE-OUTPUT-guided titration + "fluid creep" warning; silver sulfadiazine
# DEMOTED (delays healing) → antimicrobial ointment / silver foam / honey; NO
# systemic antibiotic prophylaxis; multimodal + procedural pain. Refs:
# Greenhalgh NEJM 2019; ABA; Liu JBCR 2025; WMS 2025.
# LMIC lens: honey / antimicrobial ointment lead as resource-appropriate
# topicals; silver foam flagged expensive/often-unavailable; silver
# sulfadiazine kept as a practical WHO-EML option when alternatives absent.
# ============================================================

