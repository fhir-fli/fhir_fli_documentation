  blocks:

    - type: "prose"
      title: "Diagnosis"
      highlight: true
      markdown: |
        The foot cannot be placed in the normal position. The commonest form has
        **three deformities**: **plantar flexion** of the foot, **inversion**
        (inturning of the heel), and **inturning of the forefoot**.

    - type: "prose"
      title: "Ponseti method — the gold standard"
      callout: true
      markdown: |
        The **Ponseti method** is the **universal standard** worldwide, including in
        resource-limited settings, and is effective even for **severe and
        syndromic** clubfoot. Three phases:
        - **1 · Serial casting** — weekly **above-knee casts** with gentle
          manipulation around the talar head; typically **5–8 casts**. Begin in the
          **first 1–3 weeks** of life.
        - **2 · Percutaneous Achilles tenotomy** — needed in **~90%** to correct
          residual equinus; done under **local anaesthesia**, then a final cast for
          **3 weeks**.
        - **3 · Foot-abduction bracing** — the **most critical** phase: **23 h/day
          for 3 months**, then night/nap (12–14 h/day) until age **4–5 years**.
          **Non-adherence to bracing is the main cause of relapse.**

    - type: "prose"
      title: "Surgery is now rarely needed"
      markdown: |
        Extensive **surgical releases have been largely abandoned** (poor long-term
        outcomes). Reserve surgery for the few feet that fail Ponseti management.
