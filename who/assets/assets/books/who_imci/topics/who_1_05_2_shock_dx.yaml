# ============================================================
# WHO IMCI §1.5.2 — Child presenting with shock.
# Pocket Book 2nd ed (2013), pp.21–22 (incl. Table 2).
# OpenEvidence review applied 2026-06-20:
#   - Dengue: + WHO warning signs (abdominal pain, persistent vomiting,
#     rising HCT with falling platelets, fluid accumulation, narrowing
#     pulse pressure) — Karyanti 2024 / CDC.
#   - Cardiac shock: + myocarditis (viral prodrome, previously well).
#   - Septic shock: + Phoenix Sepsis Criteria callout (outperforms IPSCC;
#     Schlapbach JAMA 2024).
#   - NEW cannot-miss row: anaphylactic shock.
#   Not added (reviewer "consider" only, not in required list): toxic shock
#   syndrome.
# 🛑 Shock fluid management still evolving — see GASTROSAM note on §1.4 /
#    Charts 7–8.
# OpenEvidence-reviewed 2026-07:
#   - Dengue row: + tender hepatomegaly (WHO 2009 warning sign; independent
#     predictor of severe dengue — Karyanti 2024 / Idrus 2023).
#   - Anaphylaxis row fleshed out: rapid onset (min–hrs), GI symptoms
#     (vomiting/abdominal pain, common with food triggers), ≥2-organ-system
#     criterion, and a first-line IM adrenaline note (AAP 2026 / Iglesia
#     JAMA 2024) — adrenaline is the single most important intervention.
#   - Cardiac shock row: + tachycardia out of proportion to fever / new
#     gallop as early myocarditis clues (AHA myocarditis statement 2021).
#   - Septic shock row: sharpened purpura → non-blanching purpura /
#     purpura fulminans.
#   - Phoenix callout re-confirmed (Sanchez-Pinto/Schlapbach JAMA 2024;
#     Marchetto CCM 2026 validation) — unchanged.
#   - NOT added: neurogenic shock (reviewer unsure of WHO scope; rare in
#     children) — deferred, consistent with prior "consider-only" items.
# ============================================================

topic:
  id: "who-imci-1-5-2-shock-dx"
  title: "Shock — Differential Dx"
  list_subtitle: "1.5.2 · history, examination, Table 2"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + Phoenix/AAP/AHA"
  tags: ["shock", "septic shock", "dengue", "cardiac shock", "bleeding", "dehydration", "differential diagnosis", "imci"]
  aliases:
    - "Shock Differential"
  category: "medical"

  page_number: 21

  blocks:

    - type: "prose"
      title: "History"
      markdown: |
        - Acute or sudden onset
        - Trauma
        - Bleeding
        - Congenital or rheumatic **heart disease**
        - History of **diarrhoea**
        - Any febrile illness
        - Known **dengue** outbreak
        - Known **meningitis** outbreak
        - Fever
        - Able to feed

    - type: "prose"
      title: "Examination"
      markdown: |
        - Consciousness level
        - Any bleeding sites
        - Cold or warm extremities
        - Neck veins (elevated JVP)
        - Pulse volume and rate
        - Blood pressure
        - Liver size increased
        - Petechiae
        - Purpura

    - type: "prose"
      title: "Recognising shock"
      highlight: true
      markdown: |
        Children with shock are **lethargic** with **fast breathing, cold
        skin, prolonged capillary refill, a fast weak pulse**, and may have
        **low blood pressure as a late sign**. Look for the signs below to
        find the cause ([Chart 7](topic:who-imci-chart7-iv-fluids-shock) /
        [Chart 8](topic:who-imci-chart8-iv-fluids-sam) for treatment).

    - type: "table"
      title: "Table 2 · Differential diagnosis"
      columns: ["Diagnosis / cause", "In favour"]
      column_flex: [2, 5]
      rows:
        - cells:
            - "Bleeding shock"
            - - "History of trauma"
              - "Bleeding site"
        - cells:
            - "Dengue shock syndrome"
            - - "Known dengue outbreak or season"
              - "History of high fever"
              - "Purpura"
              - "Warning signs at defervescence: severe abdominal pain, persistent vomiting, fluid accumulation"
              - "Tender hepatomegaly (WHO warning sign; predicts severe dengue)"
              - "Rising haematocrit with falling platelets"
              - "Narrowing pulse pressure (diastolic rises before systolic falls)"
        - cells:
            - "Cardiac shock"
            - - "History of heart disease or murmur"
              - "Myocarditis: acute heart failure, viral prodrome, previously well"
              - "Tachycardia out of proportion to fever, or a new gallop rhythm (early myocarditis clues)"
              - "Enlarged neck veins and liver"
              - "Crepitations in both lung fields"
        - cells:
            - "Septic shock"
            - - "History of febrile illness"
              - "Very ill child"
              - "Skin warm but BP low, or skin cold"
              - "Non-blanching purpura or purpura fulminans; meningococcal outbreak"
        - cells:
            - "Anaphylactic shock (cannot-miss)"
            - - "Rapid onset (minutes to hours) after likely allergen exposure"
              - "Urticaria, angioedema, bronchospasm"
              - "GI symptoms — vomiting, abdominal pain (common with food triggers)"
              - "Hypotension, or ≥ 2 organ systems involved"
              - "**Treat at once with IM adrenaline (epinephrine) 0.01 mg/kg** — the single most important intervention"
        - cells:
            - "Shock with severe dehydration"
            - - "History of profuse diarrhoea"
              - "Known cholera outbreak"

    - type: "prose"
      title: "Standardised sepsis identification"
      callout: true
      markdown: |
        The **Phoenix Sepsis Score** (JAMA 2024) outperforms the 2005 IPSCC
        criteria: **sepsis** = Phoenix Score ≥ 2 with suspected infection;
        **septic shock** = sepsis + ≥ 1 cardiovascular point (severe
        hypotension for age, vasoactive medication, or lactate ≥ 5 mmol/L).
