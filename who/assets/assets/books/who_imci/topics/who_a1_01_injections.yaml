# ============================================================
# WHO IMCI Annex 1 §A1.1 — Giving injections.
# Pocket Book of Hospital Care for Children (2nd ed, 2013), pp.335–337.
# Authored faithfully from source; pending OpenEvidence review.
# A1.1.1 IM, A1.1.2 SC, A1.1.3 intradermal kept as sections on one page
# (each a short paragraph in the source).
# OpenEvidence-reviewed 2026-07:
#   - IM site (SAFETY): removed the 2013 dorsogluteal ("upper outer quadrant
#     of the buttock") recommendation — sciatic-nerve injury risk. Now
#     age-based: vastus lateralis (infants), vastus lateralis/deltoid (1–2y),
#     deltoid (≥3y); ventrogluteal (NOT dorsogluteal) if a gluteal site is
#     needed (CDC/WHO immunization).
#   - Aspiration: noted it is NOT required for vaccines (no large vessels at
#     recommended sites; increases pain) but may be retained for therapeutic
#     injections.
#   - SC / intradermal confirmed accurate — unchanged.
# ============================================================

topic:
  id: "who-imci-a1-1-injections"
  title: "Giving Injections"
  list_subtitle: "A1.1 · IM · subcutaneous · intradermal"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + CDC/WHO immunization"
  tags: ["procedures", "injection", "intramuscular", "subcutaneous", "intradermal", "annex 1", "pediatric"]
  aliases:
    - "Injections"
    - "Intramuscular injection"
  category: "medical"

  page_number: 335

  blocks:

    - type: "prose"
      title: "General principles"
      highlight: true
      markdown: |
        - Find out whether the child has **reacted adversely** to drugs in
          the past. **Wash your hands** thoroughly.
        - Use **disposable needles and syringes**.
        - **Clean the site** with an antiseptic solution.
        - **Check the dose**, draw up the correct amount, and **expel the
          air** before injecting.
        - Always **record the name and amount** of the drug given.
        - Discard disposable syringes in a **safe (sharps) container**.

    - type: "prose"
      title: "A1.1.1 Intramuscular"
      markdown: |
        - **Choose the site by age** (the **outer side of the thigh** —
          vastus lateralis — is the workhorse in small children):
          - **Infants (< 1 year):** anterolateral thigh (**vastus
            lateralis**).
          - **1–2 years:** vastus lateralis or **deltoid**.
          - **≥ 3 years:** **deltoid** preferred.
        - **Do NOT use the dorsogluteal site** (upper outer quadrant of the
          buttock) — **risk of sciatic-nerve injury**. If a gluteal site is
          unavoidable, use the **ventrogluteal** site.
        - Push the needle (**23–25 gauge**) into the muscle at a **90° angle**
          (45° in the thigh). Remove the needle and press a swab firmly over
          the site.
        - **Aspiration** (drawing back the plunger to check for blood) is
          **not required for vaccines** (no large vessels at these sites; it
          increases pain), but may be retained for **therapeutic injections**
          — if blood appears, withdraw slightly and try again.

    - type: "prose"
      title: "A1.1.2 Subcutaneous"
      markdown: |
        - Select the site as for IM injection. Push the needle (**23–25
          gauge**) under the skin at a **45° angle** into the subcutaneous
          fat — **do not enter the underlying muscle**.
        - **Draw back** to make sure there is no blood, then inject slowly.
        - Remove the needle and press cotton-wool firmly over the site.

    - type: "prose"
      title: "A1.1.3 Intradermal"
      markdown: |
        - Select an **undamaged, uninfected** area of skin (e.g. over the
          deltoid).
        - Stretch the skin between thumb and forefinger; with the other hand
          slowly insert the needle (**25 gauge**), **bevel upwards**, about
          **2 mm** and almost parallel to the skin surface. **Considerable
          resistance** is felt.
        - A **raised, blanched bleb** showing the surface of the hair
          follicles confirms the injection was given **correctly** (as in the
          Mantoux test).
