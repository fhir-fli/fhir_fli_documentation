  blocks:

    - type: "prose"
      title: "Two separate decisions"
      highlight: true
      markdown: |
        Three distinct phases — do not conflate them:
        - [Transfer to outpatient care](topic:who-imci-7-6-1-outpatient-transfer)
          — moving out of hospital during the **rehabilitation** phase.
        - [Discharge from nutritional treatment](topic:who-imci-7-6-2-discharge-criteria)
          — anthropometric **recovery complete**.
        - [Follow-up](topic:who-imci-7-6-3-followup) — **post-discharge
          surveillance** for **≥ 6 months**, because recovery does **not** end at
          discharge (relapse risk is high).
