# ============================================================
# WHO IMCI Annex 1 §A1.3 — Insertion of a nasogastric tube. Pocket Book
# 2nd ed (2013), p.345.
# OpenEvidence-reviewed 2026-07:
#   - Confirmation (SAFETY): REMOVED the air-insufflation/auscultation
#     ("whoosh") test — it cannot distinguish gastric from airway/oesophagus
#     (ASPEN/NHS/AACN). Now: aspirate + pH indicator strip ≤ 5.5 (NOT
#     litmus), and X-ray if aspirate fails / pH inconclusive / any doubt.
#   - Measurement: added NEMU (nose→ear→xiphoid→midway xiphoid–umbilicus) —
#     more accurate, fewer oesophageal placements.
#   - Lubricant: water-soluble lubricant preferred (clean water if none).
#   - Co-oxygen: nasal cannula preferred where available (same-nostril
#     nasopharyngeal-catheter method kept as LMIC fallback).
# ============================================================

topic:
  id: "who-imci-a1-3-ng-tube"
  title: "Nasogastric Tube"
  list_subtitle: "A1.3 · measure, insert, confirm"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + ASPEN NOVEL"
  tags: ["procedures", "nasogastric tube", "ng tube", "feeding", "ph testing", "annex 1", "pediatric"]
  aliases:
    - "NG tube"
    - "Nasogastric"
  category: "medical"

  page_number: 345

  blocks:

    - type: "prose"
      title: "Insertion"
      highlight: true
      markdown: |
        - Hold the tip against the child's nose and **measure**: from the
          **nose → ear lobe → xiphisternum**, then on to a point **midway
          between the xiphisternum and the umbilicus** (the **NEMU** method —
          more accurate, fewer tubes left in the oesophagus). **Mark the tube**
          at this point.
        - Hold the child firmly. **Lubricate the tip with a water-soluble
          lubricant** (or clean water if none) and pass it **directly into one
          nostril**, pushing slowly. It should pass easily down into the
          stomach **without resistance**. When the mark is reached, **fix the
          tube with tape** at the nose.
        - **Confirm placement:** aspirate a small amount of stomach contents
          and test it on a **pH indicator strip** — **pH ≤ 5.5 confirms
          gastric placement** (use a numeric pH strip, **not litmus paper**).
        - **If no aspirate is obtained, or the pH is inconclusive, or there is
          any doubt → obtain an X-ray** (the gold standard) before using the
          tube. **Do NOT rely on injecting air and listening over the abdomen**
          — that test cannot tell gastric from airway or oesophageal placement.
        - When the tube is in place, fix a **20-ml syringe (without the
          plunger)** to the end and **pour food or fluid** into the syringe,
          letting it flow **by gravity**.

    - type: "prose"
      title: "If oxygen is being given as well"
      markdown: |
        A **nasal cannula** for oxygen (which sits at the nares) is preferred
        **where available**, keeping the nostrils free for the feeding tube.
        If **oxygen is given by nasopharyngeal catheter** (the standard in
        many settings), pass **both tubes down the same nostril** and keep the
        other nostril patent by wiping away crusts and secretions — **or pass
        the feeding tube through the mouth**.
