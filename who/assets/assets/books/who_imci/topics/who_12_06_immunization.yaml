# ============================================================
# WHO IMCI §12.6 — Checking immunization status. Pocket Book 2nd ed
# (2013), pp.325–326. Table 33 = EPI primary schedule.
# ⚠️ OpenEvidence-reviewed 2026-07: the 2013 schedule predates several WHO
# additions — added a "since 2013" block (MALARIA vaccine RTS,S 2021 / R21
# 2023 for endemic areas; single-dose HPV for girls 9–14; 2-dose IPV;
# routine MCV2 at 15–18 mo; MenA conjugate in the meningitis belt; Hep A
# where endemic); DTP now usually PENTAVALENT (DTP-HepB-Hib); refined
# contraindications (BCG in confirmed HIV, YF in HIV by CD4, DPT
# encephalopathy < 7 d, rotavirus SCID/intussusception, prior anaphylaxis).
# Refs: WHO position papers; Datoo R21 Lancet 2024; Kreimer HPV NEJM 2025.
# ============================================================

