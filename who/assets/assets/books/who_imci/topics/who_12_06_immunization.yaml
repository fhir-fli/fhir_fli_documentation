  blocks:

    - type: "prose"
      title: "Catch up before discharge"
      highlight: true
      markdown: |
        Ask to see the child's **immunization card** and determine whether all the
        vaccinations recommended for the child's age have been given. Note any the
        child still needs and explain this to the mother. **Give the vaccinations
        before the child leaves hospital**, and record them on the card.

