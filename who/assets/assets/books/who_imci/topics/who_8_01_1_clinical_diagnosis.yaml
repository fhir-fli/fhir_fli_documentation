topic:
  id: "who-imci-8-1-1-clinical-diagnosis"
  title: "Clinical Diagnosis"
  list_subtitle: "8.1.1 · signs that suggest HIV · specific conditions"
  last_reviewed: "WHO Pocket Book 2nd ed (2013)"
  tags: ["HIV", "clinical diagnosis", "signs", "pediatric"]
  aliases:
    - "HIV clinical signs"
  category: "medical"

  page_number: 226

  blocks:

    - type: "prose"
      title: "Highly variable presentation"
      highlight: true
      markdown: |
        The clinical expression of HIV in children is **highly variable**. Many
        show severe signs in the **first year of life**; others remain
        asymptomatic or mildly symptomatic for **several years**. Perinatally
        infected children **not on ART** fall into **three categories**:
        - **rapid progression (25–30%)** — most die before their first birthday
          (infection acquired in utero or early postnatally).
        - **downhill course, death at 3–5 years (50–60%)**.
        - **long-term survivors, beyond 8 years (5–25%)** — tend to have
          lymphoid interstitial pneumonitis and stunting.

    - type: "prose"
      title: "These are the UNTREATED natural history"
      callout: true
      markdown: |
        These three categories describe the **pre-ART / untreated** course. With
        today's **treat-all** policy and **early INSTI-based ART** (see
        [§8.2](topic:who-imci-8-2-art)), the natural history is **fundamentally
        altered** — early diagnosis and immediate ART transform the prognosis.
        The signs below matter because they should prompt **testing**, not
        because HIV is untreatable.

    - type: "prose"
      title: "Signs that MAY indicate HIV infection"
      markdown: |
        Suspect HIV if any of these signs — **not common in HIV-negative
        children** — are present:
        - **recurrent infection:** ≥ 3 severe episodes of bacterial infection
          (pneumonia, meningitis, sepsis, cellulitis) in the past 12 months.
        - **oral thrush:** beyond the neonatal period; strongly suggests HIV when
          it lasts > 30 days despite treatment, recurs, extends beyond the tongue,
          or is oesophageal.
        - **chronic parotitis:** parotid swelling ≥ 14 days, ± pain or fever.
        - **generalized lymphadenopathy:** enlarged nodes in ≥ 2 extra-inguinal
          regions with no apparent cause.
        - **hepatomegaly with no apparent cause** (absent concurrent viral
          infection such as CMV).
        - **persistent / recurrent fever:** > 38 °C for ≥ 7 days, or more than
          once over 7 days.
        - **neurological dysfunction:** progressive impairment, microcephaly,
          delayed milestones, hypertonia, mental confusion.
        - **herpes zoster (shingles):** painful blistering rash in one dermatome.
        - **HIV dermatitis:** erythematous papular rash; extensive fungal skin/
          nail/scalp infection; extensive molluscum contagiosum.
        - **chronic suppurative lung disease.**

    - type: "prose"
      title: "Signs / conditions SPECIFIC to HIV"
      callout: true
      markdown: |
        **Strongly suspect HIV** if any of the following are present:
        - **Pneumocystis jirovecii** (formerly carinii) pneumonia (**PCP**)
        - **oesophageal candidiasis**
        - **lymphocytic interstitial pneumonia**
        - **Kaposi sarcoma**
        - **acquired recto-vaginal fistula** (in girls).

    - type: "prose"
      title: "Common in HIV, but also in other ill children"
      markdown: |
        - **chronic otitis media:** ear discharge ≥ 14 days.
        - **persistent diarrhoea:** ≥ 14 days.
        - **moderate/severe malnutrition:** weight loss or steady faltering on the
          growth card. Suspect HIV particularly in **breastfed infants < 6 months**
          who fail to thrive.
