# WHO IMCI §9.5.1 — Abscess. Pocket Book 2nd ed (2013), pp.287–288.
# ⚠️ OpenEvidence-reviewed 2026-07: I&D + TB culture unchanged; add
# CLINDAMYCIN (WHO-EML) as alternative to cloxacillin where CA-MRSA
# prevalence is significant (~20% cloxacillin non-susceptibility in
# sub-Saharan Africa); perirectal/bowel-flora abscess → CEFTRIAXONE +
# metronidazole (avoids gentamicin drug-monitoring, unavailable at many
# first-referral sites). LMIC lens: well-drained simple abscesses need
# little/no antibiotic, but a short course is a reasonable safety margin
# where follow-up is unreliable. Refs: PIDS/IDSA 2021; SIS 2017;
# Lancet ID sub-Saharan AMR 2018.
# ============================================================

