  blocks:

    - type: "prose"
      title: "Diagnosis"
      highlight: true
      markdown: |
        An abscess is a collection of pus almost anywhere in the body.
        - **Fever, swelling, tenderness and a fluctuant mass.**
        - Determine the cause (injection, foreign body, underlying bone infection).
          **Injection abscesses** usually develop **2–3 weeks** after an injection.

    - type: "prose"
      title: "Treatment"
      callout: true
      markdown: |
        - **Incision and drainage is the cornerstone** (large abscesses may need
          general anaesthesia). Send aspirate for microscopy and culture (including
          **TB** — important where TB is prevalent) if available.
        - **A well-drained simple abscess with no surrounding cellulitis may need
          little or no antibiotic** — but where follow-up is unreliable, a **short
          course is a reasonable safety margin**: **cloxacillin 25–50 mg/kg 4×
          daily for ~5 days** or until surrounding cellulitis resolves.
        - **Where community-acquired MRSA is prevalent**, use **clindamycin
          (10–13 mg/kg 3–4× daily)** — on the WHO Essential Medicines List — as an
          alternative to cloxacillin.
        - If **bowel flora** suspected (e.g. perirectal abscess): **ceftriaxone
          (80 mg/kg IV once daily) + metronidazole (10 mg/kg 3× daily)** is
          preferred — it avoids the drug-level monitoring that gentamicin needs and
          is often unavailable at first-referral level. (The older ampicillin +
          gentamicin + metronidazole regimen remains an acceptable substitute.)
