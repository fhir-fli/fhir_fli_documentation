    - type: "prose"
      title: "Good feeding aids recovery"
      highlight: true
      markdown: |
        Good nutrition supports recovery from illness and protects against further
        illness. Health workers should follow the counselling advice in the
        nutrition-counselling sections, and a **mother's card** with pictures can
        help the mother take the advice home as a reminder.

    - type: "prose"
      title: "This section covers"
      markdown: |
        - [Supporting breastfeeding](topic:who-imci-10-1-1-breastfeeding) —
          assessing a feed, overcoming difficulties, the low-birth-weight or sick
          infant, and infants who cannot breastfeed.
        - [Nutritional management of sick children](topic:who-imci-10-1-2-sick-nutrition)
          — principles of feeding a sick child, catch-up meals and feeding by age.
