topic:
  id: "who-imci-6-11-rheumatic-fever"
  title: "Rheumatic Fever"
  list_subtitle: "6.11 · 2015 Jones · naproxen · prophylaxis"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["rheumatic fever", "jones criteria", "streptococcus pyogenes", "naproxen", "aspirin", "benzathine penicillin", "carditis", "echocardiography", "pediatric"]
  aliases:
    - "Acute Rheumatic Fever"
  category: "medical"

  page_number: 193

  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        Rheumatic fever commonly follows **S. pyogenes** infection of the throat
        or skin. Children present with **fever and pains in the large joints**,
        which may **migrate** from one joint to another. The infection can damage
        the **heart valves** (especially mitral and aortic), leading to
        respiratory distress and **heart failure**. Mild disease may cause only a
        **heart murmur**; severe disease presents with fever, fast/difficult
        breathing and lethargy, and may include **chest pain or fainting**.
        Affected children are usually **> 5 years**; those with heart failure have
        a rapid heart rate, respiratory distress and an enlarged liver.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Diagnosis matters because **penicillin prophylaxis** prevents further
        episodes and worsening valve damage. Acute rheumatic fever is diagnosed
        clinically by the **2015 AHA revised Jones criteria** (Table 20): **two
        major**, or **one major and two minor** manifestations, **plus evidence
        of a previous group A streptococcal infection**.

        The 2015 revision **stratifies the thresholds by population risk**. Most
        **LMIC settings are moderate/high-risk** (ARF incidence **> 2/100 000**
        in 5–14-year-olds, or RHD prevalence **> 1/1000**) — **use the
        moderate/high-risk column**, which is more sensitive.

    - type: "table"
      title: "Table 20 · WHO/revised Jones criteria for rheumatic fever"
      column_flex: [4, 4]
      columns: ["Diagnostic category", "Criteria"]
      rows:
        - cells: ["**Primary episode**, or recurrent attack **without** established rheumatic heart disease", "**Two major**, or **one major + two minor** manifestations, **plus** evidence of a previous group A strep infection"]
        - cells: ["Recurrent attack **with** established rheumatic heart disease", "**Two minor** manifestations **plus** evidence of a previous group A strep infection"]
        - cells: ["**Rheumatic chorea**, or insidious-onset rheumatic carditis", "Other major manifestations or evidence of group A strep infection **not required**"]

    - type: "table"
      title: "2015 Jones criteria — thresholds by population risk"
      column_flex: [3, 4, 4]
      columns: ["", "Low-risk", "Moderate / high-risk (LMIC default)"]
      rows:
        - cells: ["**Major — joint**", "**Polyarthritis** only", "Polyarthritis, **monoarthritis**, OR **polyarthralgia**"]
        - cells: ["**Major — other**", "Carditis (clinical **or subclinical**), chorea, erythema marginatum, subcutaneous nodules", "Same (carditis includes **subclinical** echo valvulitis)"]
        - cells: ["**Minor — fever**", "≥ **38.5 °C**", "≥ **38 °C**"]
        - cells: ["**Minor — inflammatory markers**", "ESR ≥ **60 mm/h** and/or CRP ≥ 3.0 mg/dl", "ESR ≥ **30 mm/h** and/or CRP ≥ 3.0 mg/dl"]
        - cells: ["**Minor — joint**", "Polyarthralgia", "**Monoarthralgia**"]
        - cells: ["**Minor — ECG**", "Prolonged PR interval (unless carditis is a major criterion)", "Same"]

    - type: "prose"
      title: "Key 2015 changes & supporting evidence"
      markdown: |
        - **Subclinical carditis** (echocardiographic valvulitis **without** an
          audible murmur) is now a **major** criterion — so **echocardiography is
          central to diagnosis**.
        - For **moderate/high-risk** populations, **monoarthritis** and
          **polyarthralgia** count as major joint criteria (and monoarthralgia as
          minor) — reflecting the wider joint presentation in these settings.
        - A joint finding can be counted **only once** (as major **or** minor,
          not both).
        - **Supporting evidence of a previous strep infection** (within ~45
          days): elevated or rising ASO or another streptococcal antibody; a
          positive throat culture; a rapid antigen test for group A strep; or
          recent scarlet fever.

    - type: "prose"
      title: "Investigations"
      markdown: |
        Requires **evidence of a prior streptococcal infection**:
        - streptococcal antibody tests (**ASO**, anti-DNase B)
        - acute-phase reactants (**ESR, CRP**)
        - **full blood count**
        - **chest X-ray**
        - **Echocardiography with Doppler — perform in ALL suspected cases.**
          Subclinical carditis (echo valvulitis without a murmur) is now a
          **major** diagnostic criterion, so echo can establish the diagnosis
          where auscultation is normal.

    - type: "prose"
      title: "Management"
      markdown: |
        **Admit to hospital.**
        - **Naproxen 10–20 mg/kg/day in 2 divided doses** (max 1000 mg/day) until
          joint pain resolves, then taper — **preferred over aspirin** (lower risk
          of Reye syndrome and fewer GI effects). **Aspirin 15–20 mg/kg every 6 h**
          (then reduce) is an alternative where naproxen is unavailable.
        - **If heart failure is present:** bed rest with a **restricted-sodium
          diet**; **oxygen**; **furosemide 1 mg/kg every 6 h**; **prednisolone
          1 mg/kg/day orally for 1 week** for severe heart failure; **blood
          transfusion if Hb < 8 g/dl**; **antibiotics to eradicate pharyngeal
          streptococcal infection**.

    - type: "prose"
      title: "Follow-up & secondary prophylaxis"
      callout: true
      markdown: |
        **All children will require antibiotic prophylaxis** to prevent
        recurrence and further valve damage:
        - **Benzathine benzylpenicillin 600 000 U IM every 3–4 weeks** (< 30 kg;
          **1.2 million U** if ≥ 30 kg), **or oral penicillin V 250 mg twice a
          day**. **Every-3-week dosing** is preferred in **high-risk** settings or
          after a **breakthrough** attack on 4-weekly dosing.
        - **Duration depends on severity:**
          - **No carditis:** **5 years** or until **age 21** (whichever is longer).
          - **Carditis, no residual valve disease:** **10 years** or until **age
            21** (whichever is longer).
          - **Carditis with residual valve disease:** **10 years** or until **age
            40** (whichever is longer); **lifelong** if high-risk.
        - Ensure **vaccinations** are up to date.
        - **Review every 3–6 months** (see also
          [§4.9 rheumatic heart disease](topic:who-imci-4-9-rheumatic-heart)).
