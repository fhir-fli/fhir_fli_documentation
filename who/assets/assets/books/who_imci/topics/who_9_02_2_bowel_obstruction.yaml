# ============================================================
# WHO IMCI §9.2.2 — Bowel obstruction (newborn). Pocket Book 2nd ed
# (2013), pp.265–266.
# ⚠️ OpenEvidence-reviewed 2026-07: pyloric stenosis 3–8 wk (peak 4–6);
# ULTRASOUND is the standard confirmatory test (sens/spec ~100%; also
# malrotation); pyloromyotomy is definitive. Bile-vomit red-alert retained.
# Refs: Gerrie/Navarro RadioGraphics 2023; Staerkle Cochrane 2021.
# ============================================================

topic:
  id: "who-imci-9-2-2-bowel-obstruction"
  title: "Bowel Obstruction (Newborn)"
  list_subtitle: "9.2.2 · bile-stained vomit = emergency · ultrasound"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["surgery", "bowel obstruction", "pyloric stenosis", "neonate", "congenital", "pediatric"]
  aliases:
    - "Neonatal bowel obstruction"
    - "Pyloric stenosis"
  category: "medical"

  page_number: 265

  blocks:

    - type: "prose"
      title: "Causes in the newborn"
      highlight: true
      markdown: |
        Bowel obstruction in a newborn may be due to **hypertrophic pyloric
        stenosis, bowel atresia, malrotation with volvulus, meconium plug
        syndrome, Hirschsprung disease (colonic aganglionosis), or imperforate
        anus**.

    - type: "prose"
      title: "Diagnosis by level"
      markdown: |
        The **level** of obstruction determines the presentation:
        - **Proximal** obstruction → vomiting with minimal distension.
        - **Distal** obstruction → distension, with vomiting occurring late.
        - **Pyloric stenosis** → projectile (forceful) **non-bilious** vomiting,
          typically at **3–8 weeks** (peak 4–6); dehydration and electrolyte
          abnormalities; an **olive-like mass** (enlarged pylorus) may be palpable
          in the upper abdomen.

        Consider other causes of distension: ileus from sepsis, necrotizing
        enterocolitis, congenital syphilis, ascites.

    - type: "prose"
      title: "Confirm with ultrasound"
      markdown: |
        **Ultrasound is the standard confirmatory test** for hypertrophic pyloric
        stenosis (sensitivity/specificity approaching **100%**) and helps diagnose
        **malrotation with volvulus**. Point-of-care ultrasound is increasingly
        available even in resource-limited settings. Definitive treatment of
        pyloric stenosis is **pyloromyotomy** (open or laparoscopic) after fluid /
        electrolyte correction.

    - type: "prose"
      title: "Bile-stained vomit is an emergency"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        **Bile-stained (green) vomit in an infant is due to bowel obstruction
        until proven otherwise — a surgical emergency.**

    - type: "prose"
      title: "Treatment"
      markdown: |
        - **Prompt resuscitation** and **urgent review** by a surgeon experienced
          in paediatric surgery.
        - **Give nothing orally.** Pass a **nasogastric tube** if there is vomiting
          or abdominal distension.
