topic:
  id: "who-imci-4-6-4-anaphylaxis"
  title: "Anaphylaxis"
  list_subtitle: "4.6.4 · adrenaline IM · airway · fluids"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["anaphylaxis", "adrenaline", "allergic reaction", "shock", "airway", "emergency", "pediatric"]
  aliases:
    - "Anaphylaxis"
    - "Allergic Reaction"
  category: "medical"

  page_number: 108

  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        A **severe allergic reaction** causing upper-airway obstruction (stridor),
        lower-airway obstruction (wheeze), or **shock** — or all three. Common
        triggers: **antibiotics, vaccines, blood transfusion, and certain foods**
        (especially nuts). Suspect it with previous severe reaction, rapid
        progression, or a history of asthma, eczema or atopy.

    - type: "table"
      title: "Severity"
      column_flex: [2, 4, 4]
      columns: ["Severity", "Symptoms", "Signs"]
      rows:
        - cells: ["**Mild**", "Itching mouth; nausea", "Urticaria; oedema of the face; conjunctivitis; red throat"]
        - cells: ["**Moderate**", "Cough or wheeze; diarrhoea; sweating", "Wheeze; tachycardia; pallor"]
        - cells: ["**Severe**", "Difficulty breathing; collapse; vomiting", "Severe wheeze with poor air entry; oedema of the larynx; shock; respiratory arrest; cardiac arrest"]

    - type: "prose"
      title: "Assess ABC first"
      callout: true
      markdown: |
        Potentially life-threatening — may progress to altered consciousness,
        collapse, or respiratory/cardiac arrest. **Assess airway, breathing,
        circulation.**
        - **Not breathing** → **5 rescue breaths** with a bag-valve mask and
          **100% oxygen**; assess circulation.
        - **No pulse** → start **basic life support**.

    - type: "prose"
      title: "Adrenaline is the first-line drug — weight-based, IM"
      callout: true
      markdown: |
        In any reaction with **airway, breathing or circulation** compromise,
        give **adrenaline immediately** — it is the only life-saving drug and
        must not be delayed for antihistamines or steroids.
        - **Dose: 0.01 mg/kg of 1:1000 (= 0.01 ml/kg), max 0.3 mg (0.3 ml) in a
          child**, up to **0.5 mg (0.5 ml) in an adolescent/adult**.
        - Give **IM into the anterolateral thigh** (faster, more reliable than
          subcutaneous or deltoid).
        - **Repeat every 5–15 min** if no improvement. If two or more doses are
          needed or shock persists, start an **adrenaline infusion** with
          monitoring.

    - type: "prose"
      title: "Treatment"
      markdown: |
        - **Remove the allergen** where possible.
        - **Give adrenaline IM** (dose above) for any airway/breathing/
          circulation involvement — i.e. **moderate or severe** reactions.
        - **Severe anaphylactic shock**, in addition:
          - **100% oxygen**
          - stabilise **airway, breathing, circulation** and secure **IV access**
          - if obstruction is severe, consider **intubation** or a **surgical
            airway** (call an anaesthetist)
          - **20 ml/kg of normal saline 0.9% or Ringer's lactate IV** as rapidly
            as possible (**intraosseous** if no IV access); repeat as needed
        - **Mild** reactions (rash/itching only, no ABC involvement) → an **oral
          antihistamine**; observe for progression.
        - **Second-line only:** an **antihistamine** relieves itch/urticaria but
          does **not** treat the reaction; **corticosteroids are not routinely
          recommended** and are **never** a substitute for adrenaline (no proven
          effect on the acute reaction or on biphasic reactions).
        - **Observe** after recovery for a possible **biphasic reaction**.
