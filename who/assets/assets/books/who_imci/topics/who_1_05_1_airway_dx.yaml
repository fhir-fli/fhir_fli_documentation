# ============================================================
# WHO IMCI §1.5.1 — Child presenting with an airway or severe breathing
# problem. Pocket Book 2nd ed (2013), pp.20–21 (incl. Table 1).
# OpenEvidence review applied 2026-06-20:
#   - Pneumonia: hypoxia + increased work of breathing = key discriminators
#     (Shah JAMA 2017).
#   - FBA: + focal hyperinflation on CXR.
#   - Retropharyngeal abscess REWRITTEN: neck pain/limited extension/
#     torticollis most common; stridor rare; peak 2–5 yr (Craig 2003).
#   - Diphtheria: + sore throat w/ painful swallowing, cervical
#     lymphadenopathy.
#   - NEW cannot-miss row: epiglottitis (no barking cough vs croup).
#   - History: + sudden stridor in a well child (FBA), toxic/drooling.
#   Not added (reviewer "consider" only, not in required list): bronchiolitis.
# OpenEvidence-reviewed 2026-07:
#   - Added a NEW cannot-miss row: bacterial tracheitis (membranous croup)
#     — mimics severe croup but FAILS standard croup treatment; thick
#     purulent tracheal secretions, high fever, toxic; significant mortality
#     if missed (Cooke AFP 2026 / Bjornson & Johnson).
#   - Removed the unverifiable FBA "OR 8.3; Lee 2021" citation from the
#     header note (the rendered table never showed a numeric OR).
#   - Pneumonia / retropharyngeal / epiglottitis / diphtheria rows
#     re-confirmed accurate; muffled "hot-potato" voice already present.
# ============================================================

topic:
  id: "who-imci-1-5-1-airway-dx"
  title: "Airway / Breathing — Differential Dx"
  list_subtitle: "1.5.1 · history, examination, Table 1"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + Shah JAMA 2017 / Cooke AFP 2026"
  tags: ["airway", "breathing", "pneumonia", "asthma", "croup", "diphtheria", "differential diagnosis", "imci"]
  aliases:
    - "Breathing Differential"
  category: "medical"

  page_number: 20

  blocks:

    - type: "prose"
      title: "History"
      markdown: |
        - **Onset:** slow or sudden
        - Previous similar episodes
        - Upper respiratory tract infection
        - **Cough** and duration (days)
        - History of **choking**; **sudden stridor in a previously well
          child** favours foreign body
        - **Toxic appearance / drooling** (epiglottitis or retropharyngeal
          abscess)
        - Present since birth or acquired
        - **Vaccination history:** DPT, measles
        - Known **HIV** infection
        - **Family history of asthma**

    - type: "prose"
      title: "Examination"
      markdown: |
        - Cough and quality of cough
        - Cyanosis
        - Respiratory distress
        - Grunting
        - Stridor, abnormal breath sounds
        - Nasal flaring
        - Swelling of the neck
        - Crepitations
        - Wheezing
          - generalized
          - focal
        - Reduced air entry
          - generalized
          - focal

    - type: "table"
      title: "Table 1 · Differential diagnosis"
      columns: ["Diagnosis / cause", "In favour"]
      column_flex: [2, 5]
      rows:
        - cells:
            - "Pneumonia"
            - - "Cough with fast breathing and fever"
              - "Hypoxia (low SpO₂) and increased work of breathing — key discriminators"
              - "Grunting or difficulty breathing"
              - "Develops over days, worsening"
              - "Crepitations; consolidation or effusion"
        - cells:
            - "Asthma"
            - - "Recurrent wheezing"
              - "Prolonged expiration"
              - "Wheezing or reduced air entry"
              - "Responds to bronchodilators"
        - cells:
            - "Foreign body aspiration"
            - - "History of sudden choking"
              - "Sudden stridor or respiratory distress"
              - "Focal reduced air entry or wheeze"
              - "Focal hyperinflation on chest X-ray"
        - cells:
            - "Retropharyngeal abscess"
            - - "Fever, neck pain, limited neck extension or torticollis"
              - "Inability to swallow / drooling"
              - "Neck mass or swelling; bulging posterior pharyngeal wall"
              - "Peak age 2–5 years; stridor is rare"
        - cells:
            - "Epiglottitis (cannot-miss)"
            - - "Acute onset, high fever, toxic appearance"
              - "Drooling, tripod positioning, muffled voice"
              - "NO barking cough (distinguishes from croup)"
        - cells:
            - "Croup"
            - - "Barking cough"
              - "Hoarse voice"
              - "Associated with URTI"
              - "Stridor on inspiration"
              - "Signs of respiratory distress"
        - cells:
            - "Bacterial tracheitis (cannot-miss)"
            - - "Looks like severe croup but **fails standard croup treatment** (no response to nebulized adrenaline/steroids)"
              - "High fever, toxic appearance, rapidly worsening stridor"
              - "Thick purulent tracheal secretions"
              - "Subglottic/tracheal narrowing; significant mortality if missed"
        - cells:
            - "Diphtheria"
            - - "'Bull neck' from enlarged lymph nodes"
              - "Airway obstruction with stridor and recession"
              - "Grey pharyngeal membrane"
              - "Sore throat with painful swallowing; cervical lymphadenopathy"
              - "No DPT vaccination"
