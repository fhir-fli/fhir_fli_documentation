  blocks:

    - type: "prose"
      title: "Blood can transmit infection"
      highlight: true
      markdown: |
        Blood can be the **vehicle for transmitting infections** — the minimum
        screen is **HIV, hepatitis B and C, syphilis, and malaria**. **Screen donors**
        for as many as possible; add **HTLV-I/II where feasible**, and screen for
        **regionally relevant pathogens** (for example **Chagas disease /
        Trypanosoma cruzi**) according to **local epidemiology**.

        Transfusion also carries **non-infectious risks** — **TACO**
        (transfusion-associated circulatory overload) and **TRALI**
        (transfusion-related acute lung injury) — see
        [transfusion reactions](topic:who-imci-10-6-5-reactions). To minimize all of
        these, give blood **only when essential.**
