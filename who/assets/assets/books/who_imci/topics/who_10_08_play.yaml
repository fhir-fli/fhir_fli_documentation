# ⚠️ OpenEvidence-reviewed 2026-07: core message current; added
# younger-infant examples (high-contrast visuals 0–3 mo, rattles 3–6 mo),
# emphasis on CAREGIVER INVOLVEMENT, and the WHO/UNICEF Nurturing Care
# Framework. Refs: Gjærde BMJ Open 2021; AAP Child Life 2021; WHO/UNICEF
# Nurturing Care Framework 2018.
