topic:
  id: "who-imci-10-8-play"
  title: "Toys and Play Therapy"
  list_subtitle: "10.8 · language + motor play · caregiver-led · simple toys"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["supportive care", "play therapy", "development", "stimulation", "pediatric"]
  aliases:
    - "Toys and play therapy"
    - "Play therapy"
  category: "medical"

  page_number: 315

  blocks:

    - type: "prose"
      title: "Play is part of care"
      highlight: true
      markdown: |
        Each play session should include **language and motor activities** and
        activities with toys. Teach the child **local songs**. Encourage the child to
        **laugh, vocalize** and describe what he or she is doing. Always encourage the
        child to perform the **next appropriate motor activity.**

    - type: "prose"
      title: "Activities with toys"
      markdown: |
        - **0–3 months:** **high-contrast visual stimuli** (bold black-and-white
          patterns), faces, and the caregiver's voice.
        - **3–6 months:** **rattles** and safe objects to grasp, shake and mouth.
        - **Ring on a string (from 6 months):** thread cotton reels and other small
          objects (for example, cut from the necks of plastic bottles) onto a string
          and tie it in a **ring**, leaving a long piece of string hanging.
        - **Blocks (from 9 months):** smooth the surfaces of small blocks of wood
          with sandpaper and paint them in **bright colours**, if possible.
        - **Nesting & in-and-out toys (from 9 months):** cut the bottoms off two
          bottles of different size and nest the smaller inside the larger; or use
          any container plus small objects (**not small enough to be swallowed**).
        - **Rattle & drum (from 12 months):** strips of coloured plastic sealed in a
          clear bottle; a tin with a tight-fitting lid.
        - **Doll (from 12 months):** two cloth shapes sewn together, turned
          inside-out, stuffed, with a face sewn or drawn on.
        - **Push- / pull-along toy (from 12 months):** a cylindrical tin threaded
          with wire (push) or string (pull), with metal bottle-tops inside.
        - **Posting bottle & stacking bottle-tops (from 12 months):** a clear bottle
          with a narrow neck plus long objects to post; round bottle-tops cut in
          half and stacked.
        - **Mirror, puzzle & book (from 18 months):** a smooth-edged tin lid; a
          drawn figure on card cut into halves/quarters; three card pages threaded
          together with pictures on both sides.

        Simple, safe, locally made toys and regular play sessions support a sick
        child's development and recovery. **Involve the caregiver** in play — it
        benefits both child and family, consistent with the **WHO/UNICEF Nurturing
        Care Framework** (responsive caregiving and early learning).
