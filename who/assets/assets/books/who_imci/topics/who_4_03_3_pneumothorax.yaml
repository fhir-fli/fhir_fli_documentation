  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        Air in the pleural space — usually from **alveolar rupture** or infection
        with **gas-producing organisms**.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Signs vary with the extent of lung collapse, intrapleural pressure and
        speed of onset.
        - Chest **bulging on the affected side** (if one side); cardiac impulse
          **shifted away** from the pneumothorax; decreased breath sounds on the
          affected side; grunting, severe respiratory distress; **cyanosis** may
          appear late.
        - **Differential:** lung cyst, lobar emphysema, bullae, diaphragmatic
          hernia.
        - **Chest X-ray is crucial** to confirm the diagnosis.

    - type: "prose"
      title: "Treatment"
      markdown: |
        - Insert a **needle for urgent decompression**, **before** inserting an
          intercostal chest drain.
        - See Annex A1.5 for chest-drainage guidelines.
