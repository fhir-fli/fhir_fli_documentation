# ============================================================
# WHO IMCI §9.4.1 — Abdominal pain. Pocket Book 2nd ed (2013),
# pp.281–282.
# OpenEvidence-reviewed 2026-07:
#   - Fluid guidance aligned with the post-FEAST Chart 7: "20 ml/kg rapid
#     bolus" → "10–20 ml/kg per bolus over 30–60 min, reassess after each"
#     (no bolus in compensated shock without ICU).
#   - Antibiotics: noted ceftriaxone + metronidazole is preferred WHERE
#     AVAILABLE (aminoglycoside regimens now discouraged — SIS 2017); the
#     ampicillin+gentamicin+metronidazole triple remains acceptable in
#     resource-limited settings.
#   - Analgesia-does-not-mask + peritonitis signs re-confirmed accurate.
# ============================================================

topic:
  id: "who-imci-9-4-1-abdominal-pain"
  title: "Abdominal Pain"
  list_subtitle: "9.4.1 · three questions · peritonitis"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + Chart 7 / SIS 2017"
  tags: ["surgery", "abdominal pain", "peritonitis", "acute abdomen", "pediatric"]
  aliases:
    - "Abdominal pain"
  category: "medical"

  page_number: 281

  blocks:

    - type: "prose"
      title: "Three questions"
      highlight: true
      markdown: |
        Not all abdominal pain is GI infection. Ask:
        - **Associated symptoms?** Nausea, vomiting, diarrhoea, constipation,
          fever, cough, sore throat, dysuria — help gauge severity and narrow the
          diagnosis.
        - **Where does it hurt?** Ask the child to point. **Periumbilical** pain is
          nonspecific.
        - **Is there peritonitis?** — the critical question, as most causes of
          peritonitis in children **require surgery**.

    - type: "prose"
      title: "Signs of peritonitis"
      callout: true
      markdown: |
        - **Tenderness** during palpation.
        - Pain on **movement**, especially.
        - **Involuntary guarding** (spasm of the abdominal muscles on palpation).
        - A **rigid abdomen** that does not move with respiration.
        - **Absent bowel sounds** through a stethoscope — a strong indicator.

    - type: "prose"
      title: "Treatment"
      markdown: |
        - **Give nothing orally.** Pass a **nasogastric tube** if vomiting or
          distension.
        - **IV fluids** — for shock, give **10–20 ml/kg per bolus over
          30–60 min** (Ringer's lactate/Hartmann's or normal saline),
          **reassessing after each** ([Chart 7](topic:who-imci-chart7-iv-fluids-shock)
          — **no bolus** in compensated shock without ICU; watch for
          overload). If dehydrated without shock, 10–20 ml/kg half-strength
          Darrow's / normal saline + 5% glucose over 20 min; then **150%
          maintenance**.
        - **Analgesics** if pain is severe (they do **not** mask a serious
          intra-abdominal problem, and may aid examination).
        - **Antibiotics** if signs of peritonitis: **ceftriaxone +
          metronidazole where available** (preferred); otherwise
          **ampicillin (25–50 mg/kg IM/IV 4× daily) + gentamicin (7.5 mg/kg
          IM/IV once daily) + metronidazole (10 mg/kg 3× daily)** remains an
          acceptable resource-limited regimen.
        - **Urgent review** by a surgeon experienced in paediatric surgery.
