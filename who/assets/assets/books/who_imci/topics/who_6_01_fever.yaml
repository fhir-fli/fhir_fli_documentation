  blocks:

    - type: "prose"
      title: "About this chapter"
      highlight: true
      markdown: |
        This chapter covers the most important conditions that cause fever in
        children **2 months – 5 years**. The main aim is to **differentiate
        serious, treatable infections from mild, self-resolving** febrile
        illness. Febrile conditions in **young infants < 2 months** are covered
        in [§3](topic:who-imci-3-6-danger-signs).

    - type: "prose"
      title: "Four categories of fever"
      markdown: |
        Sort every febrile child into one of four groups:
        - **Infection with non-localizing signs** (Table 16) — malaria,
          septicaemia, typhoid, UTI, HIV.
        - **Infection with localizing signs** (Table 17) — meningitis, otitis,
          mastoiditis, osteomyelitis, septic arthritis, pneumonia, etc.
        - **Fever with a rash** (Table 18) — measles, other viral, dengue,
          relapsing fever, typhus.
        - **Fever lasting > 7 days** (Table 19).

        Some causes are **regional** (malaria, dengue, relapsing fever),
        **seasonal**, or occur in **epidemics** (meningococcal meningitis,
        typhus). Split management by duration: **≤ 7 days**
        ([§6.1.1](topic:who-imci-6-1-1-fever-7days)) and **> 7 days**
        ([§6.1.2](topic:who-imci-6-1-2-fever-long)).
