    - type: "prose"
      title: "Two quality checks"
      highlight: true
      markdown: |
        Review the quality of SAM care through:
        - [Mortality audit](topic:who-imci-7-7-1-mortality-audit) — when in the
          admission did deaths occur, and why?
        - [Weight gain during rehabilitation](topic:who-imci-7-7-2-weight-gain) —
          is the child gaining adequately, and if not, why not?

        Also track the standard **programmatic indicators** — **cure rate,
        death rate, default (loss-to-follow-up) rate, and length of stay**. The
        **Sphere** minimum standards: **cure > 75%**, **death < 10%**,
        **default < 15%**.
