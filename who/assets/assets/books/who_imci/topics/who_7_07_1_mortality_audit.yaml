  aliases:
    - "SAM Mortality Audit"
  category: "medical"

  page_number: 221

  blocks:

    - type: "prose"
      title: "Keep an admissions register"
      highlight: true
      markdown: |
        Keep a **register of admissions, discharges and deaths** with each
        child's weight, age, sex, day of admission and date/time of
        discharge/death. **When** in the admission a death occurred points to the
        likely cause.

    - type: "prose"
      title: "Interpreting the timing of death"
      markdown: |
        - **Within 24 h:** consider **untreated or delayed treatment** of
          hypoglycaemia, hypothermia, septicaemia or severe anaemia, or
          **incorrect rehydration fluid or volume**, or **overuse of IV fluids**.
        - **Within 72 h:** check whether the **feed volume was too high** or the
          **formulation wrong** — were **potassium and antibiotics** given?
        - **After 72 h:** consider **nosocomial infection**, **re-feeding
          syndrome**, **heart failure** and **HIV infection**.

        Regionally, most deaths in African settings occur between **4 days and
        4 weeks**, whereas in Asian settings they cluster within **48 h**.

    - type: "prose"
      title: "Watch daily for clinical warning signs"
      markdown: |
        A validated **daily clinical warning-sign (CWS)** score predicts
        inpatient death well (C-index ≈ 0.81). The strongest signs:
        - **reduced consciousness**
        - **symptomatic hypoglycaemia**
        - **chest indrawing**
        - **inability to complete feeds**
        - **low MUAC**.

        Independent predictors of inpatient death (meta-analysis): **HIV**
        (HR ≈ 4.3), **shock** (3.7), **diarrhoea** (2.8), **no appetite** (2.2),
        **pneumonia** (1.9) and **lower WHZ**. Mean inpatient mortality is
        **~16%**.

    - type: "prose"
      title: "Set a target and close the loop"
      markdown: |
        The **Sphere** minimum standard for **inpatient** case fatality is
        **< 10%**. Pair the mortality register with **structured audit-and-feedback
        cycles** — regular review against the WHO 10 steps improves adherence and
        outcomes over time.
