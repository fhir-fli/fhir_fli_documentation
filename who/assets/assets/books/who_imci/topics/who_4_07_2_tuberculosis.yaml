  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        Most children infected with **M. tuberculosis** **do not develop TB**;
        progression depends on immune competence, which is weakest in the **very
        young** and impaired by **HIV, malnutrition, measles and whooping
        cough**. TB is most severe in the **lungs, meninges or kidney**; nodes,
        bones, joints, abdomen and skin may be involved. Many children present
        only with **failure to thrive, weight loss or prolonged fever**. Cough
        **> 14 days** can be a presenting sign; sputum-positive pulmonary TB is
        **rarely** diagnosed in children.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Risk is higher with an **active case in the house**, malnutrition, HIV,
        or measles in the past few months. Consider TB in any child with:
        - unexplained **weight loss / failure to thrive**
        - **fever > 2 weeks**
        - **chronic cough ≥ 14 days** (± wheeze)
        - **contact** with an adult with probable/definite infectious pulmonary
          TB

        On exam: fluid on one side of the chest (reduced air entry, stony
        dullness); enlarged **non-tender** neck nodes or a node abscess;
        meningitis signs (CSF mostly lymphocytes, high protein); abdominal
        swelling/lumps; progressive swelling/deformity of bone or a joint
        (including the **spine**).

    - type: "prose"
      title: "Investigations"
      markdown: |
        - **AFB microscopy (Ziehl–Neelsen) + culture** — three early-morning
          gastric aspirates, CSF, pleural or ascitic fluid. Detection rates are
          low, so a **positive confirms** but a **negative does not exclude** TB.
        - **Chest X-ray** — a **miliary** pattern, or a persistent infiltrate /
          consolidation (often with effusion or a primary complex), supports TB.
        - **Mantoux / PPD skin test** — **> 10 mm** suggests TB; **< 10 mm** is
          equivocal after BCG and may be **falsely negative** in HIV, miliary
          disease, severe malnutrition or recent measles.
        - **Xpert Ultra** (Xpert MTB/RIF Ultra) is now the **initial diagnostic
          test for every child** with presumed TB — not only when MDR-TB or
          HIV-associated TB is suspected. It is far more sensitive than the
          original Xpert and also detects rifampicin resistance. Use respiratory
          specimens (sputum, gastric aspirate) **or stool** — a non-invasive
          alternative to gastric aspirate. A **negative Ultra does not exclude
          TB**; repeat it if the first result is negative and the pre-test
          probability is ≥ 5%.
        - Offer **routine HIV testing** to all children suspected of TB.

    - type: "prose"
      title: "Treatment — principles & drug doses"
      markdown: |
        Give a **full course** to all confirmed or strongly suspected cases;
        **when in doubt, treat**. Follow the **national TB programme**. Also
        treat other likely diagnoses (bacterial pneumonia, meningitis, worms,
        giardiasis) while assessing the TB response. Recommended daily doses (to
        limit hepatotoxicity):
        - **Isoniazid (H): 10 mg/kg** (10–15; max 300 mg/day)
        - **Rifampicin (R): 15 mg/kg** (10–20; max 600 mg/day)
        - **Pyrazinamide (Z): 35 mg/kg** (30–40)
        - **Ethambutol (E): 20 mg/kg** (15–25)

    - type: "prose"
      title: "Treatment regimens (WHO 2022)"
      markdown: |
        - **Nonsevere TB → 4 months (2HRZ[E] / 2HR).** Children **3 months–16
          years** with nonsevere, drug-susceptible, smear-negative disease can
          be cured in **4 months, not 6** (SHINE trial, NEJM 2022 — non-inferior;
          WHO strong recommendation). Add **E** in high-HIV settings or where
          isoniazid resistance is likely.
        - **Severe / extensive pulmonary TB → 6 months (2HRZE / 4HR).** Retain
          the 6-month course for extensive or cavitary disease, miliary TB, or
          smear-positive disease.
        - **TB meningitis, spinal TB with neurological signs, osteoarticular
          TB → 12 months (2HRZE / 10HR).** For **drug-susceptible TB
          meningitis**, a **6-month intensive regimen** — higher-dose H, R and Z
          with **ethionamide replacing ethambutol** — is an accepted alternative
          to the 12-month regimen (WHO 2022).
        - **Infants 0–3 months:** treat promptly with the standard regimens,
          adjusting doses for age and possible toxicity.
        - **Intermittent (thrice-weekly)** regimens only where DOT is
          well-established and the child is **HIV-negative** — never in high-HIV
          areas.
        - **Streptomycin** is **not** first-line — reserve for MDR-TB in a child
          with known susceptibility.

    - type: "prose"
      title: "What counts as nonsevere TB"
      callout: true
      markdown: |
        The 4-month regimen applies to **nonsevere** disease, defined as: **
        peripheral lymph node TB**; **intrathoracic lymph node TB without airway
        obstruction**; **uncomplicated pleural effusion**; or **paucibacillary,
        non-cavitary disease confined to one lobe without a miliary pattern** —
        and **smear-negative**. Anything more extensive, cavitary, miliary,
        smear-positive, or CNS/bone/joint disease is **severe** and takes the
        longer regimen.

    - type: "prose"
      title: "MDR-TB & monitoring"
      markdown: |
        - **MDR-TB:** treat with a **fluoroquinolone or other second-line drug**,
          within a functioning MDR-TB programme — decided by a clinician
          experienced in paediatric TB.
        - **Monitoring:** confirm medication is taken (directly observed);
          monitor **weight gain daily** and **temperature twice a day**.
          Improvement should be seen within **1 month** — if not, review
          compliance, check for complications, and reconsider the diagnosis.

    - type: "prose"
      title: "Contacts & preventive therapy"
      markdown: |
        - **Notify** the case to district health authorities; ensure treatment is
          monitored by the national TB programme.
        - **Screen all household contacts** (and school contacts if needed) and
          treat any active cases found.
        - **Children < 5 years** (and older child/adolescent contacts, and
          people living with HIV) who are household/close contacts and — after
          clinical evaluation — are **not** found to have active TB should get
          **TB preventive treatment**. Options (WHO 2022):
          - **6 months isoniazid (6H)** — 10 mg/kg/day (range 7–15; max 300 mg)
          - **3 months isoniazid + rifampicin (3HR)** — shorter, better completion
          - **3 months weekly isoniazid + rifapentine (3HP)** — for children
            **≥ 2 years**

          The shorter rifamycin-based regimens have **better completion rates**
          than 6 months of isoniazid alone.
        - **Follow-up** at home/hospital: check adherence, screen other family
          children, improve home ventilation and reduce indoor smoking, support
          nutrition, and keep vaccinations up to date.
