  blocks:

    - type: "prose"
      title: "Usually strong enough to feed"
      highlight: true
      markdown: |
        These infants are usually **strong enough to breastfeed** and to
        maintain their body temperature.
        - Start feeds within **1 h of delivery**.
        - Mothers usually need **additional support for exclusive
          breastfeeding**.
        - Keep the infant **warm at all times**.
        - All low-birth-weight infants are at **risk of infection** and should
          be **closely observed** for infection control.
