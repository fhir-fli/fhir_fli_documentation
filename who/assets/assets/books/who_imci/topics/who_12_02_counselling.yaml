  category: "medical"

  page_number: 322

  blocks:

    - type: "prose"
      title: "The mother's card"
      highlight: true
      markdown: |
        A **simple, pictorial card** reminds the mother of the home-care
        instructions, **when to return** for follow-up, and the signs that mean she
        should **return immediately**. It helps her remember the appropriate foods
        and fluids and when to go back to the health worker. Use **national IMCI
        cards** where available; otherwise see **Annex 6** for an example.

    - type: "prose"
      title: "Using the card with the mother"
      markdown: |
        - **Hold the card** so she can easily see the pictures, or let her hold it.
        - **Point to the pictures** as you talk and explain each one.
        - **Mark the information relevant to her** — for example, circle the feeding
          advice for the child's age; if the child has diarrhoea, tick the
          appropriate fluid(s); record the date for the next vaccination.
        - **Watch to see if she looks worried or puzzled** — if so, encourage
          questions.
        - **Ask her to tell you, in her own words, what she should do at home**, and
          encourage her to use the card to help her remember.
        - **Give her the card** to take home and suggest she show it to other family
          members. Provide an **effective interpreter** if language is a barrier.

        Asking her to **repeat the plan in her own words** is the **teach-back
        method** — it improves recall, adherence and self-care. Where mobile phones
        are available, **SMS or mobile-health reminders** can supplement the card
        for follow-up dates and danger-sign recognition.
