topic:
  id: "who-imci-9-4-3-bowel-obstruction"
  title: "Bowel Obstruction (After Neonatal Period)"
  list_subtitle: "9.4.3 · hernia · adhesions · Ascaris"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + Chart 7"
  tags: ["surgery", "bowel obstruction", "adhesions", "ascaris", "pediatric"]
  aliases:
    - "Bowel obstruction (older child)"
  category: "medical"

  page_number: 283

  blocks:

    - type: "prose"
      title: "Causes beyond the newborn period"
      highlight: true
      markdown: |
        Bowel obstruction may be due to **incarcerated hernias, adhesions**
        (scarring from previous surgery), **Ascaris infection**, or
        [intussusception](topic:who-imci-9-4-4-intussusception).

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        The **level** determines the presentation:
        - **Proximal** → vomiting with minimal distension.
        - **Distal** → distension, with vomiting occurring later.
        - Typically **cramping abdominal pain, distension and no flatus**.
        - Peristalsis waves may be seen through the abdominal wall.
        - **Abdominal X-ray** shows distended loops with **air–fluid levels**.

    - type: "prose"
      title: "Treatment"
      callout: true
      markdown: |
        - **Give nothing orally;** fluid resuscitation (most have been vomiting and
          are dehydrated). For shock, give **10–20 ml/kg per bolus over
          30–60 min**, reassessing after each ([Chart 7](topic:who-imci-chart7-iv-fluids-shock);
          **no bolus** in compensated shock without ICU; watch overload); if
          dehydrated without shock, 10–20 ml/kg half-strength Darrow's /
          normal saline + 5% glucose over 20 min.
        - Pass a **nasogastric tube** to relieve vomiting and decompress the bowel.
        - **Urgent review** by a surgeon experienced in paediatric surgery.
