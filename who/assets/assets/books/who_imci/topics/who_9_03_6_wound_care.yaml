  blocks:

    - type: "prose"
      title: "Three goals"
      highlight: true
      markdown: |
        The goals of wound care: **stop bleeding, prevent infection, assess damage
        to underlying structures, and promote healing.**

    - type: "prose"
      title: "Stop bleeding"
      markdown: |
        - **Direct pressure** controls most bleeding — elevate the limb, apply
          direct pressure, then a pressure bandage.
        - For **life-threatening extremity haemorrhage** that pressure will not
          control, apply a **tourniquet** — modern trauma tourniquets are **safe
          well beyond 10 minutes** (routinely up to **~2 hours**) and are
          **endorsed in children**. Note the time applied. **Sickle-cell disease
          is a relative, not absolute, contraindication** — use if the bleeding is
          life-threatening.

    - type: "prose"
      title: "Prevent infection"
      markdown: |
        Cleaning the wound is the **most important** step. Clean the surrounding
        skin with soap and water or antiseptic; pour water and antiseptic **into**
        the wound. After **local anaesthetic** (lidocaine ≤ 3 mg/kg, or bupivacaine
        ≤ 1 ml/kg), search for foreign bodies and excise dead tissue; major wounds
        need a general anaesthetic.

        Antibiotics are usually **not** necessary when wounds are carefully cleaned;
        treat with antibiotics if: **> 12 h old** (likely infected), or **deeply
        penetrating** (dirty stick, knife, animal bite).

    - type: "prose"
      title: "Tetanus prophylaxis"
      callout: true
      markdown: |
        Decide by **wound type × vaccine status** (ACIP):
        - **Clean, minor wound:** give **tetanus toxoid (Td/DTP-containing)** only
          if **< 3 prior doses** or the last dose was **> 10 years** ago.
        - **Dirty / tetanus-prone wound** (contaminated, puncture, crush, burn):
          give **toxoid** if **< 3 doses** or **> 5 years** since the last, **and**
          give **tetanus immune globulin (TIG)** — or anti-tetanus serum where TIG
          is unavailable — if the child has had **< 3 doses or unknown** status.
        - Give toxoid and TIG at **different sites** with different syringes.

    - type: "prose"
      title: "Wound closure"
      markdown: |
        - **< 24 h old, cleaned satisfactorily:** can be closed (**primary
          closure**).
        - **Do NOT close** if > 24 h, heavily contaminated, or an animal bite.
        - **Delayed primary closure:** pack lightly with damp sterile gauze; if
          clean at 48 h, close.
        - **Infected wound:** pack lightly and let it heal on its own.

    - type: "prose"
      title: "Wound infections"
      markdown: |
        Signs: pain, swelling, redness, warmth, pus drainage.
        - **Open** the wound if pus is suspected; clean with disinfectant; pack
          lightly with damp sterile gauze and change the dressing daily.
        - Antibiotics until surrounding cellulitis resolves (usually 5 days).
        - **Cloxacillin (25–50 mg/kg orally 4× daily)** for most wounds (possible
          **S. aureus**). Where **community-acquired MRSA** is prevalent, or for a
          purulent/abscess-forming infection, **cover MRSA** — e.g.
          **clindamycin** or **trimethoprim–sulfamethoxazole** — after incision and
          drainage. If bowel flora suspected: **ampicillin (25–50 mg/kg orally 4×
          daily) + gentamicin (7.5 mg/kg IM/IV once daily) + metronidazole
          (7.5 mg/kg 3× daily)**.
