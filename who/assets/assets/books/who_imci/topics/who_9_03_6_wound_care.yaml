# ============================================================
# WHO IMCI §9.3.6 — Principles of wound care. Pocket Book 2nd ed (2013),
# pp.279–281.
# ⚠️ OpenEvidence-reviewed 2026-07: modern trauma tourniquets are safe
# well beyond 10 min (routinely up to ~2 h) and endorsed in children for
# life-threatening extremity haemorrhage — sickle-cell disease is a
# RELATIVE, not absolute, contraindication; tetanus given by the
# ACIP wound-type × vaccine-status matrix (TIG for dirty wounds if < 3
# doses / unknown); cover MRSA for purulent wound infections where
# prevalent. Refs: ACIP/CDC tetanus; TCCC; IDSA SSTI.
# ============================================================

