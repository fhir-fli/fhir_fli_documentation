# WHO IMCI §9.4.8 — Testicular torsion. Pocket Book 2nd ed (2013),
# p.286.
# OpenEvidence-reviewed 2026-07:
#   - Salvage rates CORRECTED per Mellick 2019 systematic review (n=2116):
#     0–6 h ≈ 97% (not 90%); ≤12 h ≈ 90%; 13–24 h ≈ 54%; >24 h ≈ 18%.
#   - Added: do NOT abandon exploration on symptom duration alone —
#     meaningful salvage persists well past the traditional 6–8 h window.
#   - Added differential: torsion of the appendix testis — the MOST common
#     cause of the acute scrotum in prepubertal boys; "blue dot sign" at the
#     upper pole; mimics testicular torsion.
# ============================================================

