  title: "Testicular Torsion"
  list_subtitle: "9.4.8 · acute scrotal pain · time-critical salvage"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + Mellick 2019"
  tags: ["surgery", "testicular torsion", "acute scrotum", "urology", "pediatric"]
  aliases:
    - "Testicular torsion"
  category: "medical"

  page_number: 286

  blocks:

    - type: "prose"
      title: "A surgical emergency — 6-hour window"
      highlight: true
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        Torsion of a testis produces **acute swelling on one side of the scrotum**,
        with **severe pain** and a testis that is **extremely tender to touch**. To
        preserve the testis, **urgent surgical treatment** is needed — salvage is
        **~97% within 6 h** and **~90% within 12 h**, then falls (~54% at
        13–24 h, ~18% beyond 24 h). **Do NOT abandon exploration on symptom
        duration alone** — meaningful salvage persists well past the
        traditional 6–8 h window.

    - type: "prose"
      title: "Differential diagnosis"
      markdown: |
        - **Torsion of the appendix testis** — the **most common** cause of
          the acute scrotum in **prepubertal** boys; a tender **'blue dot'**
          at the upper pole; can mimic testicular torsion (if in doubt,
          explore).
        - **Incarcerated hernia** — extends up into the inguinal canal (its upper
          limit cannot be felt).
        - **Epididymo-orchitis** — rare in young children.
