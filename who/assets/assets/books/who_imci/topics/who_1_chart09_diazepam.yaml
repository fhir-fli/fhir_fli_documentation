# ============================================================
# WHO IMCI Chart 9 — How to give diazepam rectally (convulsions)
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.15
# OpenEvidence review applied 2026-06-18:
#   - First-line: add buccal midazolam 0.5 mg/kg / intranasal 0.2 mg/kg
#     (preferred; level-1 superiority over rectal diazepam — Kertam 2026
#     meta-analysis, Cochrane 2018, 2026 AAP). Diazepam PR = fallback.
#   - IV diazepam corrected 0.25 → 0.5 mg/kg (0.1 ml/kg, max 10 mg) per
#     WHO (was a transcription error; 0.25 was subtherapeutic).
#   - Status 2nd-line: add levetiracetam 40 mg/kg & valproate 20–40 mg/kg
#     (ESETT/EcLiPSE equivalence); fosphenytoin preferred over phenytoin;
#     phenytoin rate ≤ 1 mg/kg/min (was "over 60 min").
#   - Neonate phenobarbital: note 200 mg/ml generic vs SEZABY 10 mg/ml.
#   - Antipyretics don't prevent febrile-seizure recurrence.
# id kept (who-imci-chart9-diazepam) — cross-links target it.
# Diazepam PR table values are WHO Pocket Book verbatim (representative
# weight per band); exact dose = 0.1 ml/kg of the 5 mg/ml solution.
# OpenEvidence-reviewed 2026-07:
#   - Buccal midazolam: widened to 0.3–0.5 mg/kg (max 10 mg) — some
#     guidelines/EML use 0.3 mg/kg; the Kertam 2026 meta-analysis pooled
#     0.2–0.5 mg/kg. Intranasal 0.2 mg/kg unchanged.
#   - IV diazepam 0.5 mg/kg, second-line ladder (levetiracetam/valproate/
#     fosphenytoin, phenytoin ≤1 mg/kg/min), two-dose benzo cap, and
#     antipyretic note all re-confirmed accurate — unchanged.
# ============================================================

topic:
  id: "who-imci-chart9-diazepam"
  title: "Anticonvulsant (Convulsions)"
  list_subtitle: "IMCI Chart 9 · midazolam / rectal diazepam · status ladder"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · Kertam 2026 / ESETT / EcLiPSE / WHO"
  tags: ["convulsion", "seizure", "diazepam", "rectal", "status epilepticus", "phenobarbital", "imci", "pediatric"]
  aliases:
    - "Seizure"
    - "Anticonvulsant"
    - "Status Epilepticus"
  category: "medical"
  # Apnoea / airway safety warning renders red.
  palette:
    alert: "0xFFD32F2F"
    alert_fill: "0xFFFDECEA"
    alert_text: "0xFFB71C1C"

  page_number: 15

  blocks:

    - type: "prose"
      title: "First-line anticonvulsant"
      highlight: true
      markdown: |
        Where available, **midazolam is preferred** (faster, easier;
        level-1 evidence over rectal diazepam):
        - **Buccal midazolam 0.3–0.5 mg/kg** (max 10 mg), or
        - **Intranasal midazolam 0.2 mg/kg** (max 10 mg).

        If midazolam is unavailable, give **rectal diazepam 0.5 mg/kg**
        (0.1 ml/kg) — technique and doses below.

    - type: "prose"
      title: "Rectal diazepam — how to give"
      markdown: |
        - Draw the dose from a diazepam ampoule into a **1-ml tuberculin
          syringe** (dose by weight), then **remove the needle**.
        - Insert the syringe **4–5 cm into the rectum** and inject.
        - **Hold the buttocks together** for a few minutes.

    - type: "table"
      title: "Diazepam PR — 10 mg/2 ml, 0.1 ml/kg"
      columns: ["Age (weight)", "Dose (0.1 ml/kg)"]
      column_flex: [3, 2]
      rows:
        - cells: ["2 weeks–2 months (< 4 kg)", "0.3 ml"]
        - cells: ["2–< 4 months (4–< 6 kg)", "0.5 ml"]
        - cells: ["4–< 12 months (6–< 10 kg)", "1.0 ml"]
        - cells: ["1–< 3 years (10–< 14 kg)", "1.25 ml"]
        - cells: ["3–< 5 years (14–19 kg)", "1.5 ml"]

    - type: "prose"
      title: "Neonate < 2 weeks — use phenobarbital"
      markdown: |
        Give **phenobarbital 20 mg/kg IV/IM**, repeat **10 mg/kg** after
        30 min if convulsions continue. Volumes below assume the **200
        mg/ml** generic (the SEZABY neonatal form is **10 mg/ml** —
        recalculate):
        - **2 kg:** 0.2 ml, then 0.1 ml after 30 min
        - **3 kg:** 0.3 ml, then 0.15 ml after 30 min

    - type: "prose"
      title: "If convulsions continue"
      highlight: true
      markdown: |
        - **After 10 min:** give a **second dose** (midazolam or diazepam;
          or **IV diazepam 0.1 ml/kg = 0.5 mg/kg**, max 10 mg, if a line is
          running). **Do not exceed two benzodiazepine doses.**
        - **After another 10 min — suspect status epilepticus.** Give a
          **second-line agent** (all equivalent — choose by availability):
          - **Levetiracetam 40 mg/kg IV** over 15 min, or
          - **Phenobarbital 15–20 mg/kg IV/IM**, or
          - **Fosphenytoin/phenytoin 15–20 mg/kg IV** at **≤ 1 mg/kg/min**
            via a **separate line** (phenytoin is caustic — fosphenytoin
            preferred where available), or
          - **Valproate 20–40 mg/kg IV** where available.

    - type: "prose"
      title: "If high fever"
      markdown: |
        - **Undress** the child to reduce the fever.
        - Give **no oral medication** until the convulsion is controlled
          (aspiration risk).
        - Once it stops and the child can swallow, give **paracetamol or
          ibuprofen** (for comfort — antipyretics do **not** prevent
          febrile-seizure recurrence).

    - type: "prose"
      title: "⚠ Airway safety"
      callout: true
      markdown: |
        Always have a **working bag and mask** of the right size ready —
        diazepam can cause **apnoea**.
