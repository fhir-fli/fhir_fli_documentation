  blocks:

    - type: "prose"
      title: "Targeted by history & examination"
      highlight: true
      markdown: |
        Investigations are **targeted** by the history and examination to
        **narrow the differential** — not ordered blindly.

    - type: "prose"
      title: "Basic tests — every small paediatric hospital"
      markdown: |
        - **Hb** or packed cell volume
        - **Full blood count**
        - **Blood smear or malaria RDT** — confirm parasitologically **before**
          giving antimalarials (RDT where quality microscopy is unavailable)
        - **Blood glucose**
        - **CSF microscopy**
        - **Urinalysis** (including microscopy)
        - **Blood grouping & cross-matching**
        - **HIV testing** — infants **< 18 months** need a **virological (NAT)
          test** (DNA/RNA PCR); antibody tests become reliable only from **18
          months**, as maternal antibody persists before then
        - Sick newborns **< 1 week:** **blood bilirubin** is also essential

    - type: "prose"
      title: "Other valuable tests"
      markdown: |
        **Pulse oximetry**, **chest X-ray**, **stool microscopy**, **blood
        cultures**, and **stool Xpert MTB/RIF (Ultra)** for suspected TB when a
        child cannot produce sputum — indications are given in the relevant
        chapters. Take **blood cultures before starting antibiotics** in
        suspected sepsis or severe febrile illness: rising resistance of
        bloodstream pathogens to first-line agents (e.g. ceftriaxone) makes
        culture-guided therapy increasingly important where capacity allows.
