  category: "medical"

  page_number: 249

  blocks:

    - type: "prose"
      title: "When facilities aren't available, refer"
      highlight: true
      markdown: |
        If the necessary facilities are not available, consider referring a child
        with suspected HIV:
        - for **HIV testing** with pre- and post-test counselling.
        - to another centre/hospital for **further investigation or second-line
          treatment** if there has been little or no response.
        - to a **trained counsellor** for HIV and infant feeding, where the local
          health worker cannot do this.
        - to a **community or home-based care programme**, a voluntary counselling
          and testing centre, or a community social support programme for
          continuing psychosocial support.

    - type: "prose"
      title: "What has changed"
      markdown: |
        - **Point-of-care NAT** is now available in many settings — it **reduces
          the need to refer solely for HIV testing**.
        - Use **telemedicine** consultation with a **paediatric HIV specialist**
          where physical referral is not feasible.
        - Plan **transition to adult care** for adolescents with perinatally
          acquired HIV.

    - type: "prose"
      title: "Orphans"
      markdown: |
        Orphans must be referred to essential services, including **health care
        education and birth registration**.
