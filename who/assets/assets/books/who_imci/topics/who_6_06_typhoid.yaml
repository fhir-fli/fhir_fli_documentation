  blocks:

    - type: "prose"
      title: "When to suspect it"
      highlight: true
      markdown: |
        Consider typhoid if a child has fever **plus any of:** constipation,
        vomiting, abdominal pain, headache, cough, or a transient rash —
        particularly if fever has persisted **≥ 7 days and malaria has been
        excluded**.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Main features:
        - fever with **no obvious focus** of infection
        - **no meningitis signs** / negative LP (note: children with typhoid can
          occasionally have a stiff neck)
        - systemic upset — inability to drink/breastfeed, convulsions, lethargy,
          disorientation/confusion, or vomiting everything
        - **rose/pink spots** on the abdominal wall (light-skinned children)
        - **hepatosplenomegaly**, tender or distended abdomen.

        Typhoid can present **atypically in infants** as an acute febrile illness
        with **shock and hypothermia**. Where **typhus** is common, the two can
        be hard to distinguish clinically.

    - type: "prose"
      title: "Treatment — choose by local susceptibility"
      markdown: |
        **Fluoroquinolone resistance is now near-universal across South Asia**
        (and common elsewhere), so **ciprofloxacin is no longer a reliable
        empirical first-line** — treat according to **local resistance patterns**:
        - **Where fluoroquinolone susceptibility is confirmed:** **oral
          ciprofloxacin 15 mg/kg twice a day for 7–10 days** remains effective.
        - **Where fluoroquinolone resistance is prevalent** (most of South Asia,
          parts of Africa): **oral azithromycin 10–20 mg/kg/day for 5–7 days**,
          **or IV ceftriaxone 75–80 mg/kg/day for 10–14 days**.
        - **Poor response after 48 h** → suspect drug-resistant typhoid; escalate
          per local data and switch to azithromycin or ceftriaxone as above.

    - type: "prose"
      title: "🛑 Extensively drug-resistant (XDR) typhoid"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        An ongoing outbreak of **XDR Salmonella Typhi** (Sindh, Pakistan, since
        2016; also reported among travellers) is resistant to **ampicillin,
        chloramphenicol, co-trimoxazole, fluoroquinolones AND ceftriaxone** —
        leaving only **azithromycin and carbapenems**. Suspect XDR typhoid in a
        child from — or recently travelled to — an affected area who fails to
        respond to ceftriaxone. Treat with **azithromycin** (if susceptible) or a
        **carbapenem — meropenem 20 mg/kg every 8 h IV**.

    - type: "prose"
      title: "Prevention — typhoid conjugate vaccine"
      markdown: |
        The **typhoid conjugate vaccine (TCV)** is WHO-recommended for children
        **≥ 6 months** in endemic areas, and is being introduced into routine
        immunization in high-burden countries (Pakistan, Zimbabwe, Liberia and
        others). Combine with **safe water, sanitation and hygiene** measures.

    - type: "prose"
      title: "Supportive care & monitoring"
      markdown: |
        - **High fever ≥ 39 °C** causing distress → paracetamol.
        - Nurse checks at least **every 3 h**, doctor at least twice daily.

    - type: "prose"
      title: "Complications"
      callout: true
      markdown: |
        Convulsions, confusion or coma, diarrhoea, dehydration, shock, cardiac
        failure, pneumonia, osteomyelitis and anaemia. In **young infants**,
        shock and hypothermia can occur.

        **Acute gastrointestinal perforation** with haemorrhage and peritonitis
        can occur — severe abdominal pain, vomiting, abdominal tenderness on
        palpation, severe pallor and shock; an abdominal mass (abscess) and/or
        enlarged liver/spleen may be found. **If there are signs of GI
        perforation:** pass an **IV line and nasogastric tube**, start
        appropriate **fluids**, and obtain **urgent surgical attention**.
