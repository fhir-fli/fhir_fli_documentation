topic:
  id: "who-imci-5-2-3-no-dehydration"
  title: "No Dehydration (Plan A)"
  list_subtitle: "5.2.3 · home care · four rules"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07 (no change)"
  tags: ["no dehydration", "plan A", "home treatment", "ORS", "zinc", "feeding", "pediatric"]
  aliases:
