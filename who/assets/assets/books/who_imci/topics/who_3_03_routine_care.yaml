  title: "Routine Newborn Care"
  list_subtitle: "3.3 · warmth, feeding, vitamin K, cord & eye care, vaccines"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07 (2022 WHO cord care)"
  tags: ["routine care", "newborn", "vitamin k", "breastfeeding", "immunisation", "cord care", "pediatric"]
  aliases:
