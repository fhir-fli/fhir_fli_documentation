# ============================================================
# WHO IMCI Chart 8 — IV fluids for shock in a child WITH severe
# acute malnutrition (SAM)
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.14
# OpenEvidence review applied 2026-06-18 (GASTROSAM-driven):
#   - Rehydration: ReSoMal → "ReSoMal OR standard low-osmolarity WHO-ORS"
#     (GASTROSAM/Lancet Child Adolesc Health 2026: WHO-ORS equivalent;
#     ReSoMal → more severe hyponatraemia).
#   - IV fluid: prefer Ringer's lactate / Hartmann's (SSC peds 2026
#     balanced crystalloid); hypotonic dextrose options flagged for
#     hyponatraemia risk; add glucose separately if hypoglycaemic.
#   - Fluid-refractory: add epinephrine/norepinephrine vasoactive (2025
#     PALS); restrict transfusion to severe anaemia.
#   - Opening caveat softened: GASTROSAM (NEJM 2025) shows IV rehydration
#     is SAFE in SAM with NO overload observed; WHO revision pending. The
#     frank-shock gate is retained per current WHO guidance.
# Plan C / dehydration detail (GASTROSAM slow 8-h strategy) → Charts 11/13.
# Shock WITHOUT severe malnutrition = Chart 7.
# ============================================================

topic:
  id: "who-imci-chart8-iv-fluids-sam"
  title: "IV Fluids for Shock (with SAM)"
  list_subtitle: "IMCI Chart 8 · only if frank shock · 15 ml/kg over 1 h"
  last_reviewed: "OpenEvidence review 2026-06-18 · GASTROSAM 2025/26 / SSC peds 2026 / PALS 2025"
  tags: ["shock", "severe malnutrition", "sam", "iv fluids", "resomal", "f-75", "imci", "pediatric"]
  aliases:
    - "Malnutrition Shock"
    - "SAM Shock"
  category: "medical"
  # STOP / harm callout renders red.
  palette:
    alert: "0xFFD32F2F"
    alert_fill: "0xFFFDECEA"
    alert_text: "0xFFB71C1C"

  page_number: 14

  blocks:

    - type: "prose"
      title: "Give ONLY if in shock"
      highlight: true
      markdown: |
        Use this **only** if the malnourished child has **signs of shock**
        **and** is **lethargic or unconscious**. Current WHO guidance
        restricts IV fluids in SAM to frank shock; when not in shock,
        rehydrate by **mouth/NG**, not IV.

        Note: recent evidence (**GASTROSAM**, 2025) shows IV rehydration is
        actually **safe** in SAM, with **no fluid overload** observed — a
        WHO guideline revision is pending.

    - type: "prose"
      title: "First steps"
      markdown: |
        - **Insert an IV (or IO) line** and draw blood for emergency labs.
        - **Weigh** (or estimate) the child to calculate the volume.
        - Give IV fluid **15 ml/kg over 1 hour**. Prefer **Ringer's
          lactate (or Hartmann's)**.
          - Where unavailable, half-strength Darrow's or 0.45% saline
            (each with 5% glucose) — but these are **hypotonic** and may
            worsen the **hyponatraemia** common in SAM.
        - **Add 5% glucose** separately if hypoglycaemia is present or
          suspected.

    - type: "table"
      title: "Volume — 15 ml/kg over 1 hour"
      columns: ["Weight", "Over 1 h"]
      column_flex: [1, 1]
      rows:
        - cells: ["4 kg", "60 ml"]
        - cells: ["6 kg", "90 ml"]
        - cells: ["8 kg", "120 ml"]
        - cells: ["10 kg", "150 ml"]
        - cells: ["12 kg", "180 ml"]
        - cells: ["14 kg", "210 ml"]
        - cells: ["16 kg", "240 ml"]
        - cells: ["18 kg", "270 ml"]

    - type: "prose"
      title: "Monitor every 5–10 min"
      markdown: |
        Check **pulse rate, pulse volume, and breathing rate** at the
        start and **every 5–10 minutes**. Overload is uncommon (GASTROSAM
        observed **none** even with liberal IV) — but watch for it.

    - type: "prose"
      title: "If improving (and no pulmonary oedema)"
      highlight: true
      markdown: |
        Improvement = **pulse rate falls, pulse volume rises, or
        respiratory rate falls**.

        - **Repeat 15 ml/kg over 1 hour**, then
        - switch to **oral/NG rehydration at 10 ml/kg/h for up to 10 h** —
          **ReSoMal or standard low-osmolarity WHO-ORS** (p.204). WHO-ORS
          is a safe alternative; **ReSoMal carries a higher risk of severe
          hyponatraemia**.
        - start **re-feeding with F-75** (p.209).

    - type: "prose"
      title: "If no improvement after two boluses"
      markdown: |
        - Give **maintenance IV fluid 4 ml/kg/h**.
        - Where available, start a **vasoactive infusion — epinephrine or
          norepinephrine** (dopamine only if neither is available) for
          fluid-refractory shock.
        - Transfuse **only for severe anaemia** (Hb < 4 g/dL, or < 6 with
          respiratory distress): **whole blood 10 ml/kg slowly over 3 h**
          (packed cells if in cardiac failure).
        - Start **F-75** re-feeding (p.209) and **IV antibiotics** (p.207).

    - type: "prose"
      title: "⚠ If the child deteriorates — STOP"
      callout: true
      markdown: |
        Stop the infusion if any appear (IV fluid is causing **pulmonary
        oedema**):
        - **Respiratory rate up ≥ 5/min** or **pulse up ≥ 15/min**
        - **Liver enlarges**, **fine crackles** throughout the lungs
        - **Raised JVP** or a **gallop rhythm**
