  blocks:

    - type: "prose"
      title: "Most infections are the same — but think HIV"
      highlight: true
      markdown: |
        Management of most conditions in an HIV-infected child is the **same as
        in any other child** (Chapters 3–7). But infections may be **more
        frequent, more severe and recurrent**, and some are due to **unusual
        pathogens**. Many HIV-positive children die from common childhood
        illnesses — many of these deaths are **preventable** by early diagnosis,
        correct management, routine vaccination, improved nutrition, and
        **ART + co-trimoxazole prophylaxis**.

    - type: "prose"
      title: "Establish HIV status at first contact"
      markdown: |
        Establish every infant's and child's HIV status at their **first contact**
        with the health system — ideally at birth or the earliest opportunity.
        All maternal, neonatal and child services should offer **HIV serological
        testing** to mothers and their infants and children. For infants,
        **point-of-care nucleic acid testing (POC NAT)** now enables **same-visit
        early infant diagnosis** (see
        [§8.1.3](topic:who-imci-8-1-3-testing-diagnosis)).

    - type: "prose"
      title: "This section covers"
      markdown: |
