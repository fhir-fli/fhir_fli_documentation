          that should make you suspect HIV.
        - [HIV counselling](topic:who-imci-8-1-2-hiv-counselling) — provider-
          initiated testing and counselling, informed consent.
        - [Testing and diagnosis](topic:who-imci-8-1-3-testing-diagnosis) —
          serological vs virological tests; the < 18-month problem.
        - [Clinical staging](topic:who-imci-8-1-4-clinical-staging) — the WHO
          paediatric 4-stage system (Table 23).
