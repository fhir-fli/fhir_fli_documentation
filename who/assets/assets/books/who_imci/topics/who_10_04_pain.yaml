# WHO IMCI §10.4 — Pain control. Pocket Book 2nd ed (2013),
# pp.306–307.
# ⚠️ OpenEvidence-reviewed 2026-07: named the WHO two-step ladder and made
# the codeine/tramadol prohibition explicit (CYP2D6 ultra-rapid metabolism
# → fatal respiratory depression); added oral morphine STARTING dose
# (0.15–0.3 mg/kg q4h); TAC → LET as preferred topical (cocaine-free;
# never near mucosa); added amitriptyline (WHO-EML) for neuropathic pain.
# Refs: WHO persisting-pain guidelines 2012; FDA/EMA codeine; SIOP-PODC
# low-income supportive-care 2013.
# ============================================================

topic:
  id: "who-imci-10-4-pain"
  title: "Pain Control"
  list_subtitle: "10.4 · two-step ladder · morphine · no codeine · LET"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["supportive care", "pain", "analgesia", "morphine", "pediatric"]
  aliases:
