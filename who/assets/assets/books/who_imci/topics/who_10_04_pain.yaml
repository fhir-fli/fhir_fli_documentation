    - "Analgesia"
  category: "medical"

  page_number: 306

  blocks:

    - type: "prose"
      title: "Principles of effective analgesia"
      highlight: true
      markdown: |
        Correct use of analgesics relieves pain in most children. Follow the
        **WHO two-step analgesic ladder** (the old three-step ladder was retired in
        2012 — the intermediate "weak opioid" step is gone):
        - Give analgesics in **two steps** — a **non-opioid** for **mild** pain,
          moving directly to a **strong opioid (morphine)** for **moderate-to-severe**
          pain.
        - **Do not use codeine or tramadol in children.** Their effect depends on
          **CYP2D6** metabolism, which varies widely — ultra-rapid metabolizers can
          develop **fatal respiratory depression** — so they are no longer
          recommended.
        - Give analgesics **regularly ('by the clock')** so the child does not have
          to experience a recurrence of severe pain to earn the next dose.
        - Use the **most appropriate, simplest, most effective and least painful
          route** — **by mouth** when possible (IM injection is itself painful and,
          if shock is present, can delay the effect).
        - **Tailor the dose** for each child and **progressively titrate** to ensure
          adequate relief.

    - type: "prose"
      title: "Mild pain"
      markdown: |
        For headaches, post-traumatic pain and pain due to spasticity:
        - Give **paracetamol or ibuprofen** to children **> 3 months** who can take
          oral medication; for infants **< 3 months** use **paracetamol only**.
        - **Paracetamol 10–15 mg/kg every 4–6 h.**
        - **Ibuprofen 5–10 mg/kg every 6–8 h.**

    - type: "prose"
      title: "Moderate-to-severe pain — strong opioids"
      callout: true
      markdown: |
        For pain that does not respond to the above:
        - Give **morphine** — a usual **oral starting dose of 0.15–0.3 mg/kg every
          4 h** (or IV), or by **continuous IV infusion**; titrate to effect.
        - If morphine does not adequately relieve the pain, **switch to an
          alternative opioid** such as **fentanyl or hydromorphone**.
        - **Monitor carefully for respiratory depression.** If tolerance develops,
          **increase the dose** to maintain the same degree of relief.

    - type: "prose"
      title: "Adjuvant medicines"
      markdown: |
        In specific cases adjuvants are commonly used: **diazepam** for muscle
        spasm, **carbamazepine** or **amitriptyline** for **neuropathic / neuralgic
        pain** (both on the WHO Essential Medicines List), and **corticosteroids**
        (such as **dexamethasone**) for pain from inflammatory swelling pressing on
        a nerve.

    - type: "prose"
      title: "Pain control for procedures"
      markdown: |
        **Local anaesthetics** for painful lesions of skin or mucosa or during
        painful procedures (**lidocaine infiltrated at 1–2%**):
        - **Lidocaine:** apply (with gloves) on a gauze pad to **painful mouth
          ulcers before feeds** — acts within **2–5 min**.
        - **Topical anaesthetic for open wounds before suturing:** apply on a gauze
          pad. **LET (lidocaine 4%, epinephrine 0.1%, tetracaine 0.5%) is now
          preferred** over the older **TAC** (tetracaine, adrenaline, **cocaine**) —
          LET is cocaine-free with comparable efficacy and a better safety profile.
          **Never apply either near mucous membranes** (mucosal cocaine absorption
          has caused seizures and deaths).
