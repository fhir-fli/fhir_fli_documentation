# WHO IMCI Annex 1 — Practical procedures (overview).
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.333–334.
# OpenEvidence-reviewed 2026-07:
#   - Sedation: MIDAZOLAM now first-line benzodiazepine (shorter-acting,
#     multi-route IV/IM/IN/buccal/oral, WHO EMLc; consistent with Chart 9);
#     diazepam kept as alternative.
#   - Ketamine IM raised 2–4 → 4–5 mg/kg (IM bioavailability ~40%; higher
#     up to ~6–8 may be needed — Hornik 2018 PK); added IV 0.5–2 mg/kg.
#   - Added a cautious "flumazenil where available" reversal note.
# ============================================================

