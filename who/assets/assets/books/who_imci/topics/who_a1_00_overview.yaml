  page_number: 333

  blocks:

    - type: "prose"
      title: "Before any procedure"
      highlight: true
      markdown: |
        - **Explain** the procedure first to the parents — or to the child
          if old enough — and **discuss any risks** and obtain **consent**.
        - Carry out procedures on **young infants in warm surroundings** to
          **avoid hypothermia**.
        - **Good light is essential.** Tell older children what is going to
          happen.
        - Give **analgesia** when necessary.

    - type: "prose"
      title: "Analgesia & sedation for procedures"
      markdown: |
        For some procedures (e.g. **chest-tube insertion** or **femoral
        cannulation**), consider **sedation with midazolam** or **light
        anaesthesia with ketamine** (see
        [§9.1.2 intra-operative care](topic:who-imci-9-1-2-intraoperative)).
        - **Midazolam (preferred benzodiazepine):** **0.1–0.2 mg/kg IV**, or
          **0.3–0.5 mg/kg intranasal / buccal / oral** when there is no IV
          line (shorter-acting, multiple routes; on the WHO EMLc).
          **Diazepam 0.1–0.2 mg/kg IV** is an alternative if midazolam is
          unavailable.
        - **Ketamine: 4–5 mg/kg IM** (IM bioavailability is ~40%, so higher
          doses up to ~6–8 mg/kg may be needed) — acts in **5–10 min** and
          lasts about **20 min**; or **0.5–2 mg/kg IV** (faster onset).

    - type: "prose"
      title: "⚠ Airway safety during sedation"
      callout: true
      markdown: |
        When giving **any sedation or light anaesthesia**: **manage the
        child's airway**, **beware of respiratory depression**, and
        **monitor oxygen saturation** with a pulse oximeter when possible.
        **Make sure you have a resuscitation bag available — and, if
        possible, oxygen.** Where available, **flumazenil** can reverse
        benzodiazepine over-sedation (use **cautiously** — it can precipitate
        seizures) — but **airway support and oxygen come first**.

    - type: "prose"
      title: "Restraining & wrapping the child"
      markdown: |
        A child can be held securely by **wrapping in a folded sheet**:
        - Pull **one end** of the sheet **under the arms** on both sides.
        - Bring the **other end across the front** and **wrap it around**
          the child.

        The same hold is used to **restrain a child for examination** of the
        eyes, ears or mouth.

