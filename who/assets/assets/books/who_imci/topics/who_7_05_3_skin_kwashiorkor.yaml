  blocks:

    - type: "prose"
      title: "Zinc improves the skin"
      highlight: true
      markdown: |
        **Zinc deficiency is usual** in kwashiorkor, and the skin improves
        quickly with **zinc supplementation**. In addition:
        - **Bathe or soak** the affected areas for **10 min/day in 0.01%
          potassium permanganate** solution. **Dilute correctly** — the solution
          should be **light pink, not dark purple** (too strong causes **chemical
          burns**).
        - Apply a **barrier cream** (zinc-and-castor-oil ointment, petroleum
          jelly, or tulle gras) to the raw areas, and **gentian violet or
          nystatin cream** to skin sores.
        - **Secondary Candida infection** is common, especially in **moist skin
          folds / the perineum** — treat with **topical nystatin or miconazole**.
        - **Avoid using nappies** so the perineum can stay dry.
