topic:
  id: "who-imci-4-4-cough-cold"
  title: "Cough or Cold"
  list_subtitle: "4.4 · self-limited viral · no antibiotics"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["common cold", "cough", "viral", "supportive care", "honey", "respiratory", "pediatric"]
  aliases:
    - "Common Cold"
  category: "medical"

  page_number: 90

  blocks:

    - type: "prose"
      title: "Self-limited — support only"
      highlight: true
      markdown: |
        Common, **self-limited viral** infections that need only supportive
        care. **Antibiotics should not be given.** Wheeze or stridor may occur,
        especially in infants. Most episodes end within **14 days** — a cough
        lasting **≥ 14 days** may be TB, asthma, pertussis or symptomatic HIV
        ([chronic cough §4.7](topic:who-imci-4-7-chronic-cough)).

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Common features:
        - **cough**
        - **nasal discharge**
        - **mouth breathing**
        - **fever**

        **Absent:** general danger signs; signs of severe pneumonia or
        pneumonia; stridor when the child is calm.

    - type: "prose"
      title: "Treatment"
      markdown: |
        - **Outpatient** care.
        - **Soothe the throat** and relieve cough with a **safe remedy** (e.g. a
          warm, sweet drink). In a child **≥ 1 year**, **honey** (2.5–5 ml) is a
          safe soothing remedy that modestly eases night-time cough. **Never
          give honey under 1 year** — risk of **infant botulism**.
        - **High fever (≥ 39 °C)** causing distress → **paracetamol**.
        - **Clear the nose** before feeds with a cloth soaked in water and
          twisted to a pointed wick.
        - Normal fluids plus **extra breast milk / fluids**; small frequent
          drinks are better tolerated with fever.
        - **Do NOT give:** antibiotics (not effective, do not prevent
          pneumonia); remedies with **atropine, codeine/codeine derivatives or
          alcohol**; **mucolytics**; **medicated nose drops**.

    - type: "prose"
      title: "Follow-up"
      markdown: |
        Advise the mother to:
        - **feed the child**
        - watch for **fast or difficult breathing** and return if either
          develops
        - return if the child becomes **sicker** or cannot drink or breastfeed
