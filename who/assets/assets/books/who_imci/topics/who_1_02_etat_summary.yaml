# ============================================================
# WHO IMCI 1.2 — Summary of steps in emergency triage assessment
# and treatment (ETAT)
# Pocket Book of Hospital Care for Children (2nd ed, 2013), p.3
# OpenEvidence review applied (2026-06-18):
#   - Step 2 (CRITICAL): post-FEAST — "cautious" fluids, 10–20 ml/kg
#     over 30–60 min reassessing after each (balanced crystalloid
#     preferred); boluses avoided in severe malnutrition unless frank
#     shock w/ impaired consciousness. Cross-ref Chart 7.
#   - Step 3: note buccal/intranasal midazolam as alternative to
#     rectal diazepam (2023 WHO EML; faster cessation).
#   - Priority signs: add (where oximetry available) borderline SpO2
#     90–94% + prolonged capillary refill.
# OpenEvidence-reviewed 2026-07:
#   - Step 2: name Ringer's lactate/Hartmann's explicitly as the balanced
#     crystalloid (GASTROSAM used lactated Ringer's; it is the LMIC-available
#     balanced option, preferred over saline).
#   - Priority signs: flagged the SpO2 90–94% + prolonged-CRT items as a
#     suggested addition BEYOND the published WHO priority-sign list (they
#     are an evidence-based editorial enhancement, not WHO-verbatim).
#   - Step 3 buccal/IN midazolam confirmed well-supported (Kertam 2026
#     meta-analysis; Cochrane; WHO EMLc) — unchanged.
# ============================================================

topic:
  id: "who-imci-1-2-etat-summary"
  title: "ETAT — Summary of Steps"
  list_subtitle: "1.2 · ABCD check + 3TPR MOB priority signs"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · FEAST / SSC peds 2026 / WHO EML 2023"
  tags: ["etat", "emergency triage", "abcd", "priority signs", "3tpr mob", "imci", "pediatric"]
  aliases:
    - "Emergency Triage Assessment and Treatment"
    - "3TPR MOB"
  category: "medical"

  page_number: 3

  blocks:

    - type: "prose"
      title: "First check for emergency signs — 3 steps"
      highlight: true
      markdown: |
        Steps are detailed in the charts on **pp. 5–17**.

        - **Step 1 — Airway & Breathing.** Restore breathing: manage
          the airway and **give oxygen**.
        - **Step 2 — Circulation.** Check for **shock** or diarrhoea
          with **severe dehydration**. Give oxygen and start **cautious**
          IV fluids — **10–20 ml/kg over 30–60 min, reassess after each**
          (balanced crystalloid — **Ringer's lactate / Hartmann's** —
          preferred over saline). In **severe malnutrition,
          avoid boluses** unless frank shock with impaired consciousness
          ([Chart 8](topic:who-imci-chart8-iv-fluids-sam)).
          In trauma, **compress external bleeding**.
          (See [Chart 7](topic:who-imci-chart7-iv-fluids-shock).)
        - **Step 3 — Coma / Convulsion.** Check if unconscious or
          convulsing. Give **[IV glucose](topic:who-imci-chart10-glucose)**
          for hypoglycaemia and/or an
          **anti-convulsant** — rectal diazepam, or **buccal/intranasal
          midazolam** (see [Chart 9](topic:who-imci-chart9-diazepam)).

    - type: "prose"
      title: "If emergency signs are found"
      markdown: |
        - **Call for help** — but do **not** delay treatment. A very
          sick child may need **several treatments at once**.
        - Carry out **emergency investigations**: blood glucose, blood
          smear, haemoglobin. Send blood for **type & cross-match** if
          shocked, severely anaemic, or bleeding significantly.
        - After emergency treatment, proceed at once to
          **assess, diagnose and treat the underlying problem**
          (Chapter 2, p.41).

    - type: "prose"
      title: "If no emergency signs — check priority signs"
      markdown: |
        Move any child with a priority sign to the
        **front of the queue**. Remember the mnemonic **3TPR MOB**:

        - **T**iny infant — any sick child **< 2 months**
        - **T**emperature — child is very hot
        - **T**rauma or other urgent surgical condition
        - **P**allor (severe)
        - **P**oisoning (history of)
        - **P**ain (severe)
        - **R**espiratory distress
        - **R**estless, continuously irritable or lethargic
        - **R**eferral (urgent)
        - **M**alnutrition — visible severe wasting
        - **O**edema of both feet
        - **B**urns (major)

        Where pulse oximetry is available, also prioritize **SpO₂ 90–94%**
        (borderline hypoxemia) and **prolonged capillary refill** — a
        **suggested addition beyond the published WHO priority-sign list**.
