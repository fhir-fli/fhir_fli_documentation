  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        A **highly contagious viral disease** with serious complications
        (including **blindness** in children with pre-existing vitamin A
        deficiency) and high mortality. It is **rare in infants < 3 months**.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Diagnose measles if the child has **all** of:
        - **fever** (sometimes with a febrile convulsion), **and**
        - a **generalized maculopapular rash**, **and**
        - **one of:** cough, runny nose, or red eyes.

        In children with **HIV**, some of these signs may be absent and the
        diagnosis can be difficult. Then classify as **severe complicated**
        ([§6.4.1](topic:who-imci-6-4-1-severe-measles)) or **non-severe**
        ([§6.4.2](topic:who-imci-6-4-2-nonsevere-measles)).
