    - type: "prose"
      title: "Choosing a route"
      highlight: true
      markdown: |
        Establish IV access by the **least invasive route that works**.
        In order of preference:
        - [A1.2.1 Indwelling cannula in a peripheral vein](topic:who-imci-a1-2-1-peripheral-iv)
          — first choice (incl. scalp veins in infants).
        - [A1.2.2 Intraosseous infusion](topic:who-imci-a1-2-2-intraosseous)
          — safe, simple and reliable in an **emergency** when venous
          access fails.
        - [A1.2.3 Central vein cannulation](topic:who-imci-a1-2-3-central-vein)
          — external jugular or femoral; **not for routine use**.
        - [A1.2.4 Venous cut-down](topic:who-imci-a1-2-4-cutdown)
          — long saphenous; **less appropriate if speed is essential**.
        - [A1.2.5 Umbilical vein catheterization](topic:who-imci-a1-2-5-umbilical)
          — in neonates, first few days of life.
