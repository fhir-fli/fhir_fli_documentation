# ============================================================
# WHO IMCI §1.7 — Drowning. Pocket Book 2nd ed (2013), p.33.
# OpenEvidence review applied 2026-06-24:
#   - Drowning is primarily a RESPIRATORY event → A-B-C (ventilation
#     first); compression-only CPR ineffective (2024 AHA/AAP, 2025 AHA, WMS
#     2024).
#   - C-spine injury uncommon (~0.5–5%) → no routine immobilisation unless
#     axial-loading mechanism (diving/high fall) (Thom 2023).
#   - Removed routine NG tube + bronchoscopy (not guideline-supported).
#   - REMOVED prophylactic antibiotics (no benefit, selects resistant
#     organisms; WMS 2024 strong rec) → treat only if pneumonia develops.
#   - Rewarming: + forced-air warming first-line; ECMO for refractory
#     hypothermic arrest.
#   - Added submersion-duration prognosis (>5 min major risk factor).
# OpenEvidence-reviewed 2026-07:
#   - Softened "compression-only CPR is ineffective" → "unlikely to be
#     effective" (matches WMS 2024 / 2025 AHA wording; breaths must not
#     delay compressions).
#   - Prognosis: reworded ">5 min → lung injury" to "death or poor
#     neurological outcome" (the evidence is neuro/mortality, not lung
#     injury — Quan 2016; AAP 2021). Added that hypothermia does not
#     improve survival (counters the cold-water-protective misconception).
#   - Ventilation-first, C-spine, prophylactic-antibiotic removal all
#     re-confirmed accurate — unchanged.
# ============================================================

topic:
  id: "who-imci-1-7-drowning"
  title: "Drowning"
  list_subtitle: "1.7 · A-B-C, ventilation-first, rewarming"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · 2024 AHA/AAP drowning / WMS 2024 / 2025 AHA"
  tags: ["drowning", "submersion", "hypothermia", "rewarming", "ventilation", "imci", "pediatric"]
  aliases:
    - "Submersion"
    - "Near drowning"
  category: "medical"

  page_number: 33

  blocks:

    - type: "prose"
      title: "Resuscitate — ventilation first"
      highlight: true
      markdown: |
        Drowning is **primarily a respiratory event** — hypoxia drives the
        arrest.
        - **Prioritise airway and ventilation (A-B-C sequence).**
        - **Compression-only CPR is unlikely to be effective** in drowning
          — give **rescue breaths with chest compressions** (breaths should
          not delay starting compressions).
        - Then secure breathing, circulation and consciousness.

    - type: "prose"
      title: "Injuries & cervical spine"
      markdown: |
        - Check for injuries, especially after **diving or a fall**.
        - **Cervical-spine injury is uncommon** in drowning (~0.5–5%).
          **Do not routinely immobilise** — reserve it for an
          **axial-loading mechanism** (diving, high fall) or focal findings.

    - type: "prose"
      title: "Management"
      markdown: |
        - Give **oxygen** and ensure adequate oxygenation.
        - **Remove all wet clothes.**
        - Manage the airway with **standard BLS/ALS** techniques.
          **Bronchoscopy** is rarely needed — only for refractory mucus
          plugging or solid aspirated material. (Routine NG tube/
          bronchoscopy is no longer recommended.)

    - type: "prose"
      title: "Rewarming"
      markdown: |
        - Use **forced-air warming** as the first-line active method.
        - **Core > 32 °C:** external warming — radiant heaters / warm dry
          blankets.
        - **Core < 32 °C:** **warmed IV fluid (39 °C)** or gastric lavage
          with **warmed 0.9% saline**. Consider **ECMO** for refractory
          hypothermic cardiac arrest where available.

    - type: "prose"
      title: "Then"
      markdown: |
        - Check for **hypoglycaemia**
          ([Chart 10](topic:who-imci-chart10-glucose)) and **electrolytes**
          — especially **hyponatraemia** (raises cerebral-oedema risk).
        - **Do NOT give prophylactic antibiotics** — they select resistant
          organisms. Treat **only if pneumonia develops** (fever, increased
          sputum, persistent infiltrates after 48–72 h), guided by cultures.

    - type: "prose"
      title: "Prognosis"
      markdown: |
        **Submersion duration is a key prognostic factor** — submersion
        **> 5 min** markedly raises the risk of **death or poor neurological
        outcome**. Being cold does **not** improve the odds: hypothermia
        from cold-water submersion has **not** been shown to improve
        survival, so do not treat a cold child as more salvageable on that
        basis alone.
