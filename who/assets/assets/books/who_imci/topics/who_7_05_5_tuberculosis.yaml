  blocks:

    - type: "prose"
      title: "Screen every child — suspicion is high in SAM"
      highlight: true
      markdown: |
        TB is common and easily missed in SAM. **Screen systematically** — do
        **not** wait for classic features. The **Mantoux / tuberculin skin test
        is unreliable** in SAM (malnutrition causes **anergy → frequent
        false negatives**), so it cannot rule TB out.

    - type: "prose"
      title: "Diagnosis — molecular test first"
      markdown: |
        - **Xpert MTB/RIF Ultra** is the recommended **initial test** — on
          **sputum, gastric aspirate, OR stool**. **Stool Xpert** is a major
          practical advance: a **non-invasive** sample for children who cannot
          produce sputum.
        - **Chest X-ray** and clinical evaluation support the diagnosis.
        - **WHO treatment decision algorithms (TDAs, 2022)** integrate symptoms,
          CXR and Xpert to decide whether to start treatment — a **SAM-specific
          TDA** (systematic stool/gastric Xpert + CXR + abdominal ultrasound)
          exists for hospitalised children < 5 years.
        - **Urine LAM (lateral-flow lipoarabinomannan)** is an **emerging** bedside
          tool with potential utility even in **HIV-negative** children with SAM.

    - type: "prose"
      title: "Treatment"
      markdown: |
        If TB is confirmed or the TDA/clinical picture strongly supports it,
        **treat per national TB guidelines**
        ([§4.7.2](topic:who-imci-4-7-2-tuberculosis)). **In SAM, prefer the full
        6-month regimen** even for non-severe disease — the shortened **4-month**
        (SHINE) regimen was **not separately validated** in severely malnourished
        children.
