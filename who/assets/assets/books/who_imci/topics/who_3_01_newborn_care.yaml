  blocks:

    - type: "prose"
      title: "About this chapter"
      highlight: true
      markdown: |
        Guidance on **essential newborn care** and the management of problems
        in neonates and young infants, **birth to 2 months** — neonatal
        resuscitation, sepsis and other bacterial infections, and preterm /
        low-birth-weight infants. Drug doses are tabled at the end (§3.14).

    - type: "prose"
      title: "Most newborns need only simple support"
      markdown: |
        - **Dry** the infant with a clean towel.
        - **Observe** while drying (see
          [Chart 12 · §3.2](topic:who-imci-3-2-resuscitation)).
        - Keep the infant in **skin-to-skin contact** with the mother.
        - **Cover** to prevent heat loss.
        - **Delay cord clamping ≥ 1 min** in any infant not needing
          resuscitation (benefit is greatest at **≥ 120 s** in preterm
          infants; **≥ 30 s** is the minimum at term). **Do not milk the cord
          in infants < 28 weeks** — it raises the risk of intraventricular
          haemorrhage.
        - **Encourage breastfeeding within the first hour.**

    - type: "prose"
      title: "Skin-to-skin keeps them warm"
      markdown: |
        Skin-to-skin contact and early breastfeeding are the best ways to keep
        the infant **warm** and prevent **hypoglycaemia**. Term and
        low-birth-weight neonates **≥ 1000 g** who are clinically stable and
        without complications should be put skin-to-skin with the mother soon
        after birth (with experienced staff for the smallest infants), once
        **thoroughly dried** to prevent hypothermia.
