topic:
  id: "who-imci-9-2-4-myelomeningocoele"
  title: "Myelomeningocoele"
  list_subtitle: "9.2.4 · prenatal repair · sterile dressing · folic acid"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
