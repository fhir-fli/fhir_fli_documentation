  blocks:

    - type: "prose"
      title: "Diagnosis"
      highlight: true
      markdown: |
        A **small sac protruding through a bony defect** in the skull or vertebrae
        — commonest site is the **lumbar region**. May be associated with
        **neurological problems** (bowel, bladder and lower-limb motor deficits),
        **hydrocephalus**, and a **Chiari II malformation** (present in nearly all
        cases).

    - type: "prose"
      title: "Prenatal repair — refer for counselling"
      callout: true
      markdown: |
        When spina bifida is diagnosed **in utero**, refer for **prenatal
        counselling**. **Fetal repair at 19–26 weeks** (MOMS trial) roughly
        **halves the need for a VP shunt** (~40% vs 82%), **reverses hindbrain
        herniation** in most, and **doubles independent walking** vs postnatal
        repair — at specialised fetal-surgery centres (fetoscopic approaches
        reduce maternal morbidity).

    - type: "prose"
      title: "Postnatal treatment"
      callout: true
      markdown: |
        - Apply a **sterile dressing**.
        - **Close within 48 h of birth** (standard practice); give antibiotics if
          surgery will be delayed beyond 48 h.
        - If **ruptured / for prophylaxis**: **ampicillin** (25–50 mg/kg IM/IV
          4× daily) + **gentamicin** (5–7.5 mg/kg once daily) — this combination is
          well-supported (infection 6% vs 45%); **benzylpenicillin** (100–150 mg/kg
          daily in two divided doses) is an alternative — for **5 days**.
        - **Review** by a surgeon experienced in paediatric surgery.

    - type: "prose"
      title: "Longer-term care & prevention"
      markdown: |
        - **Urological assessment** — **neurogenic bladder** is common; **clean
          intermittent catheterization (CIC)** is often needed. Routine antibiotic
          prophylaxis is **not** needed for most newborns (reserve for high-grade
          hydronephrosis or those on CIC).
        - **Prevention:** maternal **periconceptional folic acid** (**400–800 µg/
          day**, or **4 mg/day** for high-risk women) markedly reduces neural-tube
          defects.
