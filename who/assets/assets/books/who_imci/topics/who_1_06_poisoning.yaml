  category: "medical"

  page_number: 26

  blocks:

    - type: "prose"
      title: "Suspect poisoning"
      highlight: true
      markdown: |
        **Suspect poisoning in any unexplained illness in a previously
        healthy child.** Note that **traditional medicines** can be a
        source of poisoning. Consult a **poison centre** or paediatric text
        for specific agents — only common-poison principles are given here.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        Base the diagnosis on **history, examination, and investigations**:
        - Obtain the **agent, amount, and time** of ingestion. Try to
          identify the exact agent — **ask to see the container**. Check
          **no other children** were involved. Symptoms vary widely by
          agent.
        - Check for **burns in/around the mouth** or **stridor** (upper
          airway/laryngeal damage) → suggests **corrosive** ingestion.

    - type: "prose"
      title: "Who to admit / observe"
      highlight: true
      markdown: |
        - **Admit** any child who deliberately ingested **iron,
          pesticides, paracetamol or aspirin, narcotics, antidepressants,
          calcium-channel or beta-blockers** (single-pill toddler ingestion
          can be lethal), or a **button battery** — and any child given a
          poison **intentionally** by another person.
        - **Corrosives or petroleum products:** observe **≥ 6 h** before
          discharge — oesophageal burns and aspiration pulmonary oedema may
          be delayed. **Some agents** (paraquat, sustained-release
          formulations) need **≥ 24 h**.

