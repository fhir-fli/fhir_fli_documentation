    - type: "prose"
      title: "The maintenance fluid formula"
      highlight: true
      markdown: |
        The total daily fluid requirement is calculated as: **100 ml/kg for the
        first 10 kg**, then **50 ml/kg for the next 10 kg**, then **25 ml/kg for
        each subsequent kg**.

        For example, an **8-kg** infant needs **8 × 100 = 800 ml/day**; a **15-kg**
        child needs **(10 × 100) + (5 × 50) = 1250 ml/day**.

        Give the sick child **more** than these amounts if there is **fever**
        (**increase by 10% for every 1 °C** of fever).

