    - type: "prose"
      title: "Monitoring fluid intake"
      callout: true
      markdown: |
        Pay careful attention to hydration in very sick children who have had no
        oral intake for some time. **Fluids should preferably be given orally (by
        mouth or nasogastric tube).**

        If fluids must be given **IV**, **monitor the infusion closely** because of
        the risk of **fluid overload**, which can cause **heart failure or cerebral
        oedema**. If close monitoring is impossible, use the IV route **only** for
        severe dehydration, septic shock, or when oral fluids are contraindicated
        (perforation, surgical abdomen).

        **Use an isotonic maintenance fluid** — **0.9% saline or a balanced
        crystalloid (Ringer's lactate)**, with **added glucose (5%)** and
        **potassium** once the child is passing urine. **Hypotonic fluids such as
        half-normal saline are no longer recommended for routine maintenance** —
        they cause **iatrogenic hyponatraemia**, which has led to deaths and
        permanent brain injury. Reserve hypotonic fluid for specific situations
        (correcting **hypernatraemia**, replacing **voluminous watery diarrhoea**).
        **Do not give 5% glucose alone** — it too causes hyponatraemia. Isotonic
        fluids are on the **WHO Essential Medicines List** and widely available.
