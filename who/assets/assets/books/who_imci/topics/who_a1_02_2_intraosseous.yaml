topic:
  id: "who-imci-a1-2-2-intraosseous"
  title: "Intraosseous Infusion"
  list_subtitle: "A1.2.2 · proximal tibia · emergency access"
  last_reviewed: "OpenEvidence-reviewed 2026-07 · WHO PB 2013 + PALS / EZ-IO"
  tags: ["procedures", "intraosseous", "io", "proximal tibia", "emergency access", "annex 1", "pediatric"]
