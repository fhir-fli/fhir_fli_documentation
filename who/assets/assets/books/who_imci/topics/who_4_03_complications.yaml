    - type: "prose"
      title: "Complications of pneumonia"
      highlight: true
      markdown: |
        **Septicaemia** is the most common complication — bacteria spread into
        the bloodstream and can cause **septic shock** or metastatic infection
        (meningitis, peritonitis, endocarditis — especially with valvular heart
        disease — or septic arthritis). Other common complications are:
        - **Pleural effusion & empyema**
          ([§4.3.1](topic:who-imci-4-3-1-effusion))
        - **Lung abscess** ([§4.3.2](topic:who-imci-4-3-2-abscess))
        - **Pneumothorax** ([§4.3.3](topic:who-imci-4-3-3-pneumothorax))
