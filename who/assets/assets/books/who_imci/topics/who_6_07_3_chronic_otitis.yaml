topic:
  id: "who-imci-6-7-3-chronic-otitis"
  title: "Chronic Otitis Media"
  list_subtitle: "6.7.3 · wicking · quinolone ear drops"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["chronic otitis media", "ear wicking", "ciprofloxacin drops", "pseudomonas", "pediatric"]
  aliases:
    - "Chronic Otitis Media"
  category: "medical"

  page_number: 184

  blocks:

    - type: "prose"
      title: "Diagnosis"
      highlight: true
      markdown: |
        Pus draining from the ear for **≥ 2 weeks** = a chronic ear infection.
        Confirm (where possible) by **otoscopy**.

    - type: "prose"
      title: "Treatment"
      markdown: |
        Treat as an **outpatient**.
        - Keep the ear dry by **wicking**.
        - **Aural toileting first:** clean/dry the ear canal (wicking) **before**
          instilling drops so the medicine reaches the middle ear.
        - Instill **topical antibiotic drops containing quinolones**
          (ciprofloxacin, norfloxacin, ofloxacin), with or without steroids,
          **twice a day for 2 weeks**. Quinolone drops are **more effective** than
          other antibiotic drops (and than systemic antibiotics — topical drops
          reach far higher middle-ear concentrations); **topical antiseptics are
          not effective** in children. After instilling, **pump the tragus** to
          push drops into the middle ear.

    - type: "prose"
      title: "Follow-up"
      markdown: |
        Return after **5 days**. If discharge persists:
        - check the mother is continuing to **wick** the ear
        - do **not** give repeated courses of **oral** antibiotics for a draining
          ear
        - consider **Pseudomonas** or **tuberculous** infection — continue
          wicking and give parenteral antibiotics effective against Pseudomonas
          (gentamicin, azlocillin, ceftazidime), or TB treatment after
          confirmation.
