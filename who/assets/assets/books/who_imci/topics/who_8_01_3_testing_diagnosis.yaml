topic:
  id: "who-imci-8-1-3-testing-diagnosis"
  title: "Testing & Diagnosis"
  list_subtitle: "8.1.3 · antibody vs virological · < 18 months"
  last_reviewed: "WHO Pocket Book 2nd ed (2013)"
  tags: ["HIV", "testing", "diagnosis", "virological", "pediatric"]
  aliases:
    - "HIV testing"
    - "Virological testing"
  category: "medical"

  page_number: 229

  blocks:

    - type: "prose"
      title: "The < 18-month problem"
      highlight: true
      markdown: |
        Diagnosis in exposed infants and young children **< 18 months** is
        difficult: **passively acquired maternal antibodies** may persist in the
        child's blood, and breastfeeding adds ongoing exposure. Most children
        lose maternal antibodies between **9 and 18 months**, so a **virological
        test** is the **only reliable method** of determining HIV status in a
        child < 18 months.

        Where the mother or child has a **positive antibody test** and the child
        has **symptoms suggestive of HIV**, but virological testing is not
        available, the child may be **presumptively diagnosed** as HIV-infected.
        Do virological testing at the earliest opportunity to confirm.

        All diagnostic HIV testing must be **confidential**, accompanied by
        counselling, and conducted only with **informed consent**.

    - type: "prose"
      title: "Serological antibody test (ELISA / rapid test)"
      markdown: |
        Rapid tests are widely available, sensitive and reliable for diagnosis in
        children **> 18 months**. For children **< 18 months**, an antibody test
        is a sensitive way of detecting **exposure** or **excluding** HIV in
        non-breastfeeding children.

        Rapid tests can be used to **exclude** HIV in a child with severe acute
        malnutrition, TB or other serious illness in high-prevalence areas. For
        children **< 18 months**, confirm all positive results by virological
        testing as soon as possible; if not possible, **repeat antibody testing at
        18 months**.

    - type: "prose"
      title: "Virological tests"
      markdown: |
        Testing for HIV **RNA or DNA** (nucleic acid testing, **NAT**) is the most
        reliable method in children **< 18 months**. It may require sending a
        sample to a specialized laboratory, but the tests are relatively cheap,
        easy to standardize, and can be done on **dried blood spots**. Available
        assays:
        - **HIV DNA** on whole blood or dried blood spots
        - **HIV RNA** on plasma or dried blood spots.

        (Ultrasensitive **p24 antigen** is still technically available but has been
        **superseded by NAT** and is no longer a primary recommendation.)

    - type: "prose"
      title: "Point-of-care NAT — a major advance"
      callout: true
      markdown: |
        **Point-of-care NAT (POC NAT)** — e.g. **Xpert HIV-1 Qual** and
        **m-PIMA HIV-1/2 Detect** — gives a result in **52–90 minutes** from a
        **finger/heel-prick** sample (sensitivity **~98.6%**, specificity
        **~99.9%**). Compared with conventional dried-blood-spot testing (results
        in weeks to months), POC NAT dramatically **shortens turnaround** and
        **increases ART-initiation rates**. Use POC NAT for early infant diagnosis
        wherever available.

    - type: "prose"
      title: "When to do virological tests"
      markdown: |
        Test **as early as birth** in high-risk infants, then on a routine
        schedule:
        - **first routine test at 14–21 days**
        - **at 1–2 months**
        - **at 4–6 months**.

        **One positive virological test** is sufficient to diagnose HIV — **start
        ART without delay**, and collect a **second specimen** to confirm. Return
        results to the clinic and family **within 4 weeks** of collection.

    - type: "prose"
      title: "Breastfeeding infants"
      markdown: |
        A breastfeeding infant remains **at risk** of acquiring HIV throughout
        breastfeeding. **Do not stop breastfeeding to perform testing.** Test
        **every 3 months while breastfeeding**, and again at **4–6 weeks and
        4–6 months after complete cessation**. A **negative** result only reliably
        excludes HIV once this post-cessation window has passed.
