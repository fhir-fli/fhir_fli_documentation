topic:
  id: "who-imci-7-3-organization-of-care"
  title: "Organization of Care"
  list_subtitle: "7.3 · outpatient vs inpatient · CHW · appetite test"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["organization of care", "SAM", "inpatient", "outpatient", "community health worker", "RUTF", "appetite test", "pediatric"]
  aliases:
