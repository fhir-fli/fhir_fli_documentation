  category: "medical"

  page_number: 200

  blocks:

    - type: "prose"
      title: "Who is treated where"
      highlight: true
      markdown: |
        **> 80% of children with SAM are uncomplicated** and can be treated as
        **outpatients**.
        - **Outpatient care:** children who have an **appetite** (pass the
          appetite test) and are **clinically well and alert**.
        - **Inpatient care:** children with **severe oedema (+++)**, a **poor
          appetite** (fail the appetite test), or **one or more general danger
          signs or medical conditions** requiring admission.

    - type: "prose"
      title: "Outpatient (community-based) management"
      markdown: |
        Uncomplicated SAM is managed in the community with:
        - **ready-to-use therapeutic food (RUTF)** by weight
          ([§7.4.8](topic:who-imci-7-4-8-catchup-feeding))
        - a **short course of oral amoxicillin**
          ([§7.4.5](topic:who-imci-7-4-5-infection))
        - **weekly follow-up visits** (typically up to **12 weeks**), with
          routine vitamin A and vaccination catch-up
        - **discharge** when **WHZ ≥ −2 AND MUAC ≥ 125 mm** with **no oedema for
          2 weeks** ([§7.6.2](topic:who-imci-7-6-2-discharge-criteria)).

        The **2023 WHO guideline** endorses **community health worker
        (CHW)-delivered** treatment of uncomplicated SAM (MUAC-based admission +
        RUTF) as an alternative to facility-based outpatient care, with similar
        recovery rates where the supply chain and supervision are in place.

    - type: "prose"
      title: "Oedema grading"
      markdown: |
        Grade the bilateral pitting oedema:
        - **Grade 1 (+):** both **feet**
        - **Grade 2 (++):** feet **plus legs / hands / lower arms**
        - **Grade 3 (+++):** **generalized**, including the **face** — always
          **inpatient** care.

    - type: "prose"
      title: "On admission for complicated SAM"
      markdown: |
        - **Separate** the child from infectious children.
        - Keep in a **warm area (25–30 °C, no draughts)** or a special nutrition
          unit if available, and **monitor constantly**.
        - Ensure facilities and staff can **correctly prepare therapeutic foods**
          and **feed the child regularly, day and night**.
        - Keep **accurate weighing machines / MUAC tapes** and records of feeds
          given and weight / anthropometry so progress can be monitored.
