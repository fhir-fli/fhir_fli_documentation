      title: "Surgical causes of the acute abdomen"
      highlight: true
      markdown: |
        Most abdominal pain is from **gastrointestinal infection**, but some causes
        need surgery. **Pain lasting > 4 h should be regarded as a potential
        abdominal emergency.**

