    - type: "prose"
      title: "Notes"
      markdown: |
        - **Gentamicin:** to use an **80 mg/2 ml** vial, dilute to 8 ml with
          sterile water (**10 mg/ml**), then use exactly the same doses as
          above. The week-1 jump between the 2–2.5 kg and 2.5–3 kg columns is
          real — smaller (low-birth-weight) infants get **3 mg/kg**, larger
          (normal-weight) infants **5 mg/kg**.
        - **Aminophylline, caffeine citrate, phenobarbital (injection):**
          **calculate the exact dose** from the infant's weight rather than
          reading a range. For **caffeine citrate**, do not exceed a
          **maintenance of 10 mg/kg/day**.
        - **Ceftriaxone:** avoid in infants **≤ 28 days** — it displaces
          bilirubin (kernicterus risk) and forms fatal precipitates with
          **calcium-containing IV fluids**. Use **cefotaxime** instead
          ([§3.9](topic:who-imci-3-9-meningitis)).
