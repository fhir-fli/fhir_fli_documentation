    - type: "prose"
      title: "How to use this table"
      highlight: true
      markdown: |
        Doses of common drugs for neonates and low-birth-weight infants.
        - Columns are **weight bands in kg** — **scroll the table sideways** to
          see them all.
        - Cell values are the **volume (or tablet fraction) per dose**;
          reconstitution is in the **Form** column.
        - **Ranges are approximate** — where the drug says **calculate the
          exact dose**, compute it from the infant's exact weight.

