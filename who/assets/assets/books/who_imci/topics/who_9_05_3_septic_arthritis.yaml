  blocks:

    - type: "prose"
      title: "Like osteomyelitis, but in the joint"
      highlight: true
      markdown: |
        Similar to osteomyelitis, but involving the **joint**.
        - **Pain and swelling** of the joint.
        - Usually **intermittent fever**.
        - Two key signs: **swelling and tenderness over the joint** and
          **decreased range of movement**.

    - type: "prose"
      title: "Treatment"
      callout: true
      markdown: |
        - **Aspirate the joint** to confirm the diagnosis (under sterile
          conditions) — commonest organism **S. aureus**. Send fluid for Gram stain
          and culture; check **CRP** where available.
        - **Drain the joint urgently — pus under pressure destroys a joint.**
          Formal surgical washout (arthrotomy) is effective, but **repeated needle
          aspiration is a valid alternative** and is often the practical choice
          **where theatre or general anaesthesia is not immediately available**
          (~10% need a second aspiration). **Exception: the hip and shoulder**
          usually need **open or arthroscopic drainage** (risk of avascular
          necrosis).
        - **Antibiotics** (as for osteomyelitis; chloramphenicol is **no longer
          recommended**): **cloxacillin 50 mg/kg IV 4× daily** first-line (low
          MRSA); **clindamycin** where MRSA is prevalent; **ceftriaxone** for
          Salmonella / sickle-cell disease.
        - **Duration — much shorter than before:** **10–14 days total** for
          uncomplicated primary septic arthritis with rapid clinical improvement
          and a falling CRP; give IV until improving, then switch to oral. If there
          is **adjacent osteomyelitis**, treat for the longer **3–4 weeks**.
        - **Do not add corticosteroids** — the harms outweigh any benefit.
