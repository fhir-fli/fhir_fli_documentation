# ============================================================
# WHO IMCI §9.5.3 — Septic arthritis. Pocket Book 2nd ed (2013),
# pp.289–290.
# ⚠️ OpenEvidence-reviewed 2026-07: DROP chloramphenicol → cloxacillin
# (low MRSA) / clindamycin (MRSA) / ceftriaxone (Salmonella-SCD). Duration
# ≥3 weeks → 10–14 days TOTAL for uncomplicated primary septic arthritis
# with rapid improvement + CRP fall (PIDS/IDSA 2023; Finnish RCT). Repeated
# NEEDLE ASPIRATION is a valid alternative to arthrotomy — important where
# theatre/GA is not immediately available (Malawi RCT) — EXCEPT hip/shoulder
# (AVN risk → open/arthroscopic drainage). No adjunctive corticosteroids.
# CRP q2–3 days guides IV→oral. Refs: PIDS/IDSA 2023 (Woods); NEJM Li 2019.
# ============================================================

