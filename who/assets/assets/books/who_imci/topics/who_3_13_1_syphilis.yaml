  blocks:

    - type: "prose"
      title: "Clinical signs"
      highlight: true
      markdown: |
        - often **low birth weight**
        - **palms and soles**: red rash, grey patches, blisters or skin peeling
        - **'snuffles'** — highly infectious rhinitis with nasal obstruction
        - **abdominal distension** from an enlarged liver and spleen
        - **jaundice**
        - **anaemia**

        Some very-low-birth-weight infants with syphilis have signs of **severe
        sepsis** (lethargy, respiratory distress, skin petechiae or other
        bleeding). If you suspect syphilis, do a **VDRL** test if possible.

    - type: "prose"
      title: "Treatment"
      markdown: |
        - **Asymptomatic** neonates born to women with a positive VDRL or rapid
          plasma reagin test (with a normal evaluation): **benzathine
          benzylpenicillin 50 000 U/kg (≈ 37.5 mg/kg) as a single IM dose**.
        - **Symptomatic** infants — preferred: **aqueous crystalline
          penicillin G 100 000–150 000 U/kg/day IV** (50 000 U/kg **every 12 h**
          for the first 7 days, then **every 8 h** to complete **10 days**).
          Where IV is not feasible: **procaine benzylpenicillin 50 mg/kg** as a
          single deep IM dose daily for **10 days**.
        - Treat the **mother and her partner** for syphilis and check for other
          sexually transmitted infections.
