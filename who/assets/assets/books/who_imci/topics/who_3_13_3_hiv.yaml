# WHO IMCI §3.13.3 — Infants of mothers with HIV infection. Pocket Book 2nd
# ed (2013), p.68.
# ✅ OpenEvidence review applied (2026-07): expanded from a bare Chapter-8
#    pointer to the immediate postnatal essentials, to parity with its
#    siblings §3.13.1/§3.13.2 (WHO/LMIC PMTCT: infant NVP, cotrimoxazole,
#    breastfeed-with-maternal-ART, early infant diagnosis). Full PMTCT/ART
#    still lives in Chapter 8. Scope confirmed with Grey (modest LMIC
#    expansion, not the US risk-stratified ZDV/3-drug apparatus).
# ============================================================

topic:
  id: "who-imci-3-13-3-hiv"
  title: "Infant of a Mother with HIV"
  list_subtitle: "3.13.3 · infant NVP · feeding · early diagnosis"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07 (WHO 2016/2021 PMTCT)"
  tags: ["hiv", "pmtct", "nevirapine", "cotrimoxazole", "breastfeeding", "neonate", "young infant", "pediatric"]
  aliases:
    - "Maternal HIV"
  category: "medical"

  page_number: 68

  blocks:

    - type: "prose"
      title: "At the point of care"
      highlight: true
      markdown: |
        Every infant born to a mother with HIV is **HIV-exposed** and needs
        immediate postnatal care. Full PMTCT and antiretroviral therapy live in
        **Chapter 8 (HIV/AIDS)** — the essentials the delivery clinician needs
        are below.

    - type: "prose"
      title: "Immediate postnatal care"
      markdown: |
        - Ensure the **mother is on lifelong ART**.
        - Start **infant antiretroviral prophylaxis** as soon as possible after
          birth (ideally within hours): **nevirapine (NVP) once daily**.
          - **6 weeks** for most breastfed infants.
          - **Extend to 12 weeks** if the mother's ART started **late**, her
            **adherence is poor**, or her **viral load is high/unknown**
            (higher-risk infant).
        - Start **cotrimoxazole (co-trimoxazole) at 4–6 weeks of age** and
          continue until HIV is **excluded** and the infant is **no longer
          breastfeeding** — it also protects against pneumonia, malaria and
          diarrhoea.

    - type: "prose"
      title: "Feeding"
      markdown: |
        **Breastfeed with the mother on ART.** Where safe replacement feeding
        is not reliably available, the survival benefit of breastfeeding
        outweighs the small residual transmission risk. Support **exclusive
        breastfeeding for the first 6 months**. Only stop if the **mother's
        viral load becomes detectable**.

    - type: "prose"
      title: "Early infant diagnosis"
      markdown: |
        Use a **virological (NAT/PCR) test** — antibody tests **cannot**
        diagnose HIV before 18 months.
        - First **NAT at 4–6 weeks** of age (transmission risk peaks in the
          first 6–14 weeks); test at **birth** for higher-risk infants.
        - **Repeat** during and after breastfeeding.
        - Confirm final status with an **antibody test at ~18 months** (or after
          breastfeeding stops).
        - A **positive** test → start ART and refer (**Chapter 8**).
