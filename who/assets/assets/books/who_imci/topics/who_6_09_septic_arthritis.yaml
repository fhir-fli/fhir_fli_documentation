# (2013), pp.186–187.
# ✅ OpenEvidence-reviewed 2026-07: shortened uncomplicated durations
# (10–14 days septic arthritis; 3–4 weeks osteomyelitis) per 2023 PIDS/IDSA
# guideline + RCT evidence; added Kingella kingae (6 mo–4 yr) and cephalosporin
# coverage; noted the guideline recommends AGAINST adjunctive corticosteroids.
# ============================================================

topic:
  id: "who-imci-6-9-septic-arthritis"
  title: "Septic Arthritis or Osteomyelitis"
  list_subtitle: "6.9 · aspirate · cephalosporin · 10–14 days"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["septic arthritis", "osteomyelitis", "cephalosporin", "kingella kingae", "staphylococcus aureus", "salmonella", "pediatric"]
  aliases:
    - "Septic Arthritis"
    - "Osteomyelitis"
  category: "medical"

  page_number: 186

  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        Acute infection of a **bone or joint**, usually from **blood-borne
        spread**; sometimes from an adjacent focus or a penetrating injury.
        Occasionally several bones or joints are involved.

    - type: "prose"
      title: "Diagnosis"
      markdown: |
        - **Acute:** the child looks ill, is febrile, and **refuses to move** the
          affected limb/joint or bear weight on the leg. **Osteomyelitis** —
          swelling and tenderness over the bone. **Septic arthritis** — a **hot,
          swollen, tender joint** with reduced range of movement.
        - **Chronic:** sometimes presents as chronic illness (less ill, less
          marked local signs, may have no fever); **discharging sinuses** suggest
          **tuberculous osteomyelitis**.

    - type: "prose"
      title: "Investigations"
      markdown: |
        - **X-rays are not helpful early.**
        - If septic arthritis is strongly suspected, introduce a **sterile
          needle** (under strictly aseptic conditions, after 1% lignocaine) and
          **aspirate the joint**. If there is pus, use a **wide-bore needle** to
          obtain a sample; examine for white cells and **culture**.
        - **Organisms:** **Staphylococcus aureus** (> 3 years); in younger
          children **H. influenzae type b, Streptococcus pneumoniae or S.
          pyogenes group A**; **Salmonella** in malarious areas and sickle-cell
          disease. In children **6 months–4 years**, **Kingella kingae** is now a
          common cause — it is **susceptible to cephalosporins and ampicillin but
          resistant to cloxacillin/vancomycin**, so a **first-generation
          cephalosporin** is a good empirical choice (covers both S. aureus and
          K. kingae).

    - type: "prose"
      title: "Treatment"
      markdown: |
        Base the antibiotic on the organism and sensitivities; otherwise:
        - **IM/IV cloxacillin or flucloxacillin 50 mg/kg every 6 h** (children
          > 3 years); if unavailable, **chloramphenicol**. A **first-generation
          cephalosporin** (e.g. cefazolin IV, then cefalexin orally) is preferred
          in children **6 months–4 years** to cover **Kingella kingae**.
          **Clindamycin** or a 2nd/3rd-generation cephalosporin may also be used.
        - **Short parenteral course, then oral:** give **2–4 days of parenteral**
          antibiotics, then — once the child is improving with a **falling CRP**
          — change to **equivalent oral** treatment for the remainder.
        - **Total duration (uncomplicated):** **10–14 days for septic arthritis**;
          **3–4 weeks for osteomyelitis**. RCT evidence shows these short courses
          are as effective as the older longer regimens.
        - **Complicated cases** (virulent S. aureus, adjacent osteomyelitis, poor
          response): extend to **3–4 weeks** (septic arthritis) or **6 weeks**
          (osteomyelitis).
        - **Septic arthritis:** remove pus by **aspiration**. If swelling recurs
          after aspiration, or the infection responds poorly → **surgical**
          exploration, drainage of pus, and excision of dead bone.
        - **Do NOT add corticosteroids** — the potential harms outweigh the
          marginal benefit shown in small studies (2023 PIDS/IDSA guideline).
        - **Tuberculous osteomyelitis** (slow onset, chronic course, poor
          response): treat per the **national TB programme**; surgery is almost
          never needed as abscesses subside with anti-TB treatment.

    - type: "prose"
      title: "Supportive care"
      markdown: |
        **Rest** the affected limb or joint; if it is the leg, no weight-bearing
        until pain-free. Treat pain or high fever causing discomfort with
        **paracetamol**.
