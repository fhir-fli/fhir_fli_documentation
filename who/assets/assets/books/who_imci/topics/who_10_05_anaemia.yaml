  blocks:

    - type: "prose"
      title: "Non-severe anaemia"
      highlight: true
      markdown: |
        **WHO defines anaemia** in children **6–59 months** as **Hb < 11 g/dl**
        (moderate < 10, **severe < 7 g/dl**). The Pocket Book uses **Hb < 9.3 g/dl**
        (about **EVF < 27%**) as the **threshold to start home iron treatment** in
        young children (**< 6 years**). Begin treatment when the Hb is below this —
        **unless the child has severe acute malnutrition** (iron is withheld during
        the stabilization phase).
        - Give **home iron treatment** — a daily **iron–folate tablet** or **iron
          syrup**, providing **2–3 mg/kg/day of elemental iron**.
        - Ask the parent to **return in 14 days**. The **standard course is 3
          months** — it takes **2–4 weeks** to correct the anaemia and **1–3
          months** to build up iron stores.
        - If the child is **≥ 1 year** and has not had **mebendazole** in the
          previous 6 months, give **one dose of mebendazole (500 mg)** for possible
          hookworm or whipworm.
        - Advise the mother about **good feeding practice**.

    - type: "prose"
      title: "Severe anaemia — transfuse"
      callout: true
      palette:
        alert: "0xFFD32F2F"
        alert_fill: "0xFFFDECEA"
        alert_text: "0xFFB71C1C"
      markdown: |
        Give a **blood transfusion as soon as possible** to:
        - **all children with an EVF ≤ 12% or Hb ≤ 4 g/dl**, and
        - **less severely anaemic children (EVF 13–18%; Hb 4–6 g/dl)** who **also**
          have any of: clinically detectable **dehydration, shock, impaired
          consciousness, heart failure, deep laboured breathing**, or **very high
          malaria parasitaemia (> 10% of red cells)**.

        **Transfusion volume is now guided by fever** (TRACT trial, African
        children) — transfuse over **3–4 h**:
        - **Afebrile (T < 37.5 °C):** give the **higher volume — whole blood
          30 ml/kg (or packed cells 20 ml/kg)** — it **lowers** mortality.
        - **Febrile (T ≥ 37.5 °C):** give the **lower volume — whole blood 20 ml/kg
          (or packed cells 10 ml/kg)** — higher volumes **increased** mortality in
          febrile children.

        Packed cells are preferred to whole blood where available. Check **RR and
        pulse every 15 min** — if either rises or heart failure appears (basal
        crepitations, enlarged liver, raised JVP), transfuse **more slowly** and
        give **IV furosemide 1–2 mg/kg** (max 20 mg). Repeat the transfusion if the
        Hb stays low.

    - type: "prose"
      title: "Anaemia in severe acute malnutrition"
      markdown: |
        In children with **severe acute malnutrition**, **fluid overload is a common
        and serious complication**. Give **packed cells (or whole blood) at
        10 ml/kg (not 20 ml/kg)**, and **do not repeat** the transfusion based on
        the Hb level or within **4 days**.
