# (anaemia < 11, severe < 7 g/dl at 6–59 mo — the 9.3 g/dl figure is the
# Pocket Book's home-iron ACTION threshold, kept); TRACT trial (African
# severe anaemia) — transfusion volume is now FEVER-GUIDED: afebrile
# children benefit from a HIGHER volume, febrile children (T ≥ 37.5 °C)
