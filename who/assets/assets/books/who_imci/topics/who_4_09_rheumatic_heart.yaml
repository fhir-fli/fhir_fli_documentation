topic:
  id: "who-imci-4-9-rheumatic-heart"
  title: "Rheumatic Heart Disease"
  list_subtitle: "4.9 · valve damage · penicillin prophylaxis"
  last_reviewed: "WHO Pocket Book 2nd ed (2013) · OpenEvidence-reviewed 2026-07"
  tags: ["rheumatic heart disease", "rheumatic fever", "valve", "penicillin", "benzathine penicillin", "secondary prophylaxis", "endocarditis", "cardiac", "pediatric"]
  aliases:
