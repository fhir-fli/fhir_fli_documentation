  blocks:

    - type: "prose"
      title: "What it is"
      highlight: true
      markdown: |
        Chronic rheumatic heart disease is a complication of **acute rheumatic
        fever** that leaves **permanent valve damage** — group A β-haemolytic
        streptococcal antibodies cause pancarditis with valve insufficiency.
        Risk rises with **repeated episodes** of rheumatic fever, leading to
        valve stenosis/regurgitation, atrial dilatation, arrhythmia and
        ventricular dysfunction. It is a major cause of **mitral stenosis** in
        children.

    - type: "prose"
      title: "When to suspect"
      markdown: |
        Suspect it in any child with a **previous history of rheumatic fever**
        who presents with **heart failure or a heart murmur**. Diagnosis matters
        because **penicillin prophylaxis** prevents further episodes of rheumatic
        fever and worse valve damage. Mild disease may cause only a murmur in an
        otherwise well child; severe disease reflects the extent of heart damage
        or infective endocarditis.

    - type: "prose"
      title: "History & examination"
      markdown: |
        - **History:** chest pain; palpitations; heart-failure symptoms
          (orthopnoea, paroxysmal nocturnal dyspnoea, oedema); fever or stroke
          (endocarditis of damaged valves); breathlessness on exertion; syncope.
        - **Examination:** signs of heart failure; **cardiomegaly with a
          murmur**; signs of **infective endocarditis** — conjunctival/retinal
          haemorrhages, hemiparesis, **Osler nodes, Roth spots**, splenomegaly.

    - type: "prose"
      title: "Investigations"
      markdown: |
        - **Chest X-ray:** cardiomegaly with congested lungs.
        - **Echocardiogram** (if available) — confirms the diagnosis, the extent
          of valve damage, and evidence of infective endocarditis.
        - **Full blood count** and **blood culture**.

    - type: "prose"
      title: "Management"
      markdown: |
        - **Admit** if in heart failure or with suspected bacterial
          endocarditis.
        - Treatment depends on the type and extent of valve damage; **manage
          heart failure** if present ([§4.8](topic:who-imci-4-8-heart-failure)).
        - **Diuretics and vasodilators** to relieve pulmonary congestion when
          needed.
        - For **infective endocarditis:** **penicillin or ampicillin — or
          ceftriaxone — plus gentamicin IV/IM for 4–6 weeks**.
        - **Refer** for echocardiographic evaluation and a long-term plan;
          severe valve stenosis or regurgitation may need **surgery**.

    - type: "prose"
      title: "Secondary prophylaxis — the key to preventing progression"
      highlight: true
      markdown: |
        Regular penicillin prevents recurrent rheumatic fever, which is what
        drives worsening valve damage. Start it in **every** child with rheumatic
        fever or RHD:
        - **Benzathine penicillin G (BPG) 1.2 million U IM every 4 weeks** —
          **preferred** (use **every 3 weeks** in high-risk/high-incidence
          settings). Use **600 000 U** if body weight is **< 30 kg**.
        - **Oral penicillin V 250 mg twice daily** — alternative, but less
          effective (depends on daily adherence).
        - **Penicillin-allergic:** **sulfadiazine** (0.5 g/day if < 30 kg, 1 g/day
          if ≥ 30 kg) **or a macrolide** (e.g. erythromycin).

    - type: "table"
      title: "How long to continue prophylaxis"
      column_flex: [5, 4]
      columns: ["Situation", "Duration"]
      rows:
        - cells: ["RF **without** carditis", "**≥ 5 years** or until **age 21** — whichever is longer"]
        - cells: ["RF **with** carditis, **no** residual valve disease", "**≥ 10 years** or until **age 21** — whichever is longer"]
        - cells: ["RHD with **persistent** valve disease", "**≥ 10 years** or until **age 40** — whichever is longer; **lifelong** if high ongoing strep exposure or severe disease"]

    - type: "prose"
      title: "Echocardiographic screening in endemic settings"
      markdown: |
        In endemic populations, **echocardiographic screening** detects
        **latent/subclinical RHD** before symptoms appear. Starting secondary
        prophylaxis in children with echo-detected latent RHD **slows or halts
        progression** (RCT evidence, Uganda 2022) — consider screening where the
        disease burden and resources support it.
